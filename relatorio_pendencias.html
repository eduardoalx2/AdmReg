<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Pendências Financeiras - Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Security Check
        let perms = [];
        try { perms = JSON.parse(localStorage.getItem('userPerms') || '[]'); } catch(e) {}
        if (!perms.includes('admin')) {
            window.location.replace('index.html');
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @media print {
            body { background-color: white !important; }
            @page { size: portrait; margin: 10mm; }
        }
    </style>
</head>
<body class="pb-10 print:bg-white">

    <!-- Header -->
    <header class="w-full shadow-sm bg-white border-b print:hidden">
        <div class="max-w-6xl mx-auto px-4 py-1.5">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo.png" alt="Logo IEQ" class="h-8 w-auto object-contain">
                    <div class="border-l border-gray-200 pl-2">
                        <div class="text-xs font-bold text-slate-800 leading-none">Região 655</div>
                        <div class="text-[9px] font-medium text-slate-500 uppercase leading-none mt-0.5">Londrina/PR</div>
                    </div>
                </a>
                <a href="index.html" class="text-[10px] font-semibold text-slate-500 hover:text-blue-600 flex items-center gap-1 uppercase tracking-wider">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Painel Admin
                </a>
            </div>
        </div>
        <div class="header-gradient py-3 px-4">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <h1 class="text-sm md:text-base font-bold text-white tracking-wide uppercase flex items-center gap-2">
                    <i data-lucide="file-warning" class="w-5 h-5"></i> Relatório de Pendências
                </h1>
                <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition-colors uppercase shadow-md">
                    <i data-lucide="printer" class="w-3.5 h-3.5"></i> Imprimir
                </button>
            </div>
        </div>
    </header>

    <!-- Print Header -->
    <div class="hidden print:block w-full bg-white text-black px-2 py-4">
        <div class="flex justify-between items-center mb-4 border-b-2 border-slate-800 pb-2">
            <div class="flex items-center gap-4">
                <img src="logo.png" alt="Logo IEQ" class="h-10 object-contain">
                <div>
                    <h1 class="text-lg font-black uppercase tracking-widest text-slate-900 leading-tight">Relatório de Pendências</h1>
                    <p class="text-xs font-bold text-slate-600 mt-0.5" id="print-subtitle">Região 655 • Londrina/PR</p>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4 md:p-6 space-y-4">
        
        <!-- Filters -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 print:hidden">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Filtrar por Igreja</label>
                    <select id="filterIgreja" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-xs font-semibold">
                        <option value="Todas">Todas as Igrejas</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Filtrar por Mês</label>
                    <select id="filterMes" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-xs font-semibold">
                        <option value="Todos">Todos os Meses</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Filtrar por Status</label>
                    <select id="filterStatus" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-xs font-semibold">
                        <option value="Todos">Todos os Status</option>
                        <option value="Aguardando Lançamento">Aguardando Lançamento do Pastor</option>
                        <option value="Aguardando Emissão">Aguardando Emissão do Recibo</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- KPIs -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total de Pendências</p>
                <p id="kpi-total-pendencias" class="text-3xl font-black text-red-600 mt-1">0</p>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Igrejas com Pendências</p>
                <p id="kpi-igrejas-pendentes" class="text-3xl font-black text-amber-600 mt-1">0</p>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Valor Estimado Pendente</p>
                <p id="kpi-valor-estimado" class="text-3xl font-black text-blue-600 mt-1">R$ 0,00</p>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead class="print:text-sm">
                        <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 bg-slate-50">
                            <th class="p-3">Igreja</th>
                            <th class="p-3">Mês de Referência</th>
                            <th class="p-3">Status da Pendência</th>
                            <th class="p-3 text-right">Valor Estimado</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-pendencias" class="text-sm">
                        <tr><td colspan="4" class="text-center py-10 text-slate-400 text-xs font-bold uppercase tracking-wider">Analisando dados...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        let allIgrejas = [];
        let allRecibos = [];
        let allSaldos = [];
        let configPainel = {};
        let allPendencias = [];

        const formatMoeda = (val) => (parseFloat(val) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        async function loadData() {
            try {
                const [igrejasSnap, recibosSnap, saldosSnap, configSnap] = await Promise.all([
                    getDocs(collection(db, "igrejas")),
                    getDocs(collection(db, "recibos")),
                    getDocs(collection(db, "saldos_virada")),
                    getDoc(doc(db, "configuracoes", "painel_pastores"))
                ]);

                igrejasSnap.forEach(d => allIgrejas.push({ id: d.id, ...d.data() }));
                recibosSnap.forEach(d => allRecibos.push({ id: d.id, ...d.data() }));
                saldosSnap.forEach(d => allSaldos.push({ id: d.id, ...d.data() }));
                if (configSnap.exists()) configPainel = configSnap.data();

                allIgrejas.sort((a,b) => (a.nome || '').localeCompare(b.nome || ''));

                gerarRelatorioPendencias();
                buildFilters();
                renderTable();

            } catch (error) {
                console.error("Erro ao carregar dados:", error);
                document.getElementById('tabela-pendencias').innerHTML = '<tr><td colspan="4" class="text-center py-10 text-red-500 text-xs font-bold uppercase">Erro ao carregar dados.</td></tr>';
            }
        }

        function gerarRelatorioPendencias() {
            allPendencias = [];
            const hoje = new Date();
            const mesAtual = hoje.getMonth();
            const anoAtual = hoje.getFullYear();
            
            const mesLimite = mesAtual === 0 ? 11 : mesAtual - 1;
            const anoLimite = mesAtual === 0 ? anoAtual - 1 : anoAtual;
            const dataLimite = new Date(anoLimite, mesLimite, 1);

            const dataInicio = new Date(2026, 0, 1); // Janeiro de 2026

            for (const igreja of allIgrejas) {
                let cursor = new Date(dataInicio);
                while (cursor <= dataLimite) {
                    const mm = String(cursor.getMonth() + 1).padStart(2, '0');
                    const yyyy = cursor.getFullYear();
                    const mesRef = `${mm}/${yyyy}`;

                    const reciboPago = allRecibos.find(r => 
                        r.referenceDate === mesRef && 
                        (r.igrejaNome === igreja.nome || (r.igrejaFormatada || '').includes(igreja.nome)) &&
                        (parseFloat(r.regionalTax) || 0) > 0
                    );

                    if (!reciboPago) {
                        const saldoEnviado = allSaldos.find(s => 
                            s.periodoChave === `${yyyy}-${mm}` &&
                            (s.igrejaNome === igreja.nome || (s.igrejaFormatada || '').includes(igreja.nome))
                        );

                        let status = 'Aguardando Lançamento';
                        let valorEstimado = 0;

                        if (saldoEnviado) {
                            status = 'Aguardando Emissão';
                            const taxadas = saldoEnviado.entradasTaxadas || 0;
                            const seguroValor = configPainel.valorSeguro || 0;
                            const qtdSeguros = igreja.seguros || 0;
                            valorEstimado = (taxadas * 0.04) + 100 + (qtdSeguros * seguroValor);
                        }
                        
                        allPendencias.push({
                            id: `${igreja.id}_${mesRef}`,
                            igrejaNome: igreja.nome,
                            mesRef,
                            status,
                            valorEstimado
                        });
                    }
                    cursor.setMonth(cursor.getMonth() + 1);
                }
            }
        }

        function buildFilters() {
            const igrejasPendentes = [...new Set(allPendencias.map(p => p.igrejaNome))].sort();
            const mesesPendentes = [...new Set(allPendencias.map(p => p.mesRef))].sort((a,b) => {
                const [mA, yA] = a.split('/');
                const [mB, yB] = b.split('/');
                return new Date(yB, mB - 1) - new Date(yA, mA - 1);
            });

            const selIgreja = document.getElementById('filterIgreja');
            igrejasPendentes.forEach(nome => selIgreja.innerHTML += `<option value="${nome}">${nome}</option>`);

            const selMes = document.getElementById('filterMes');
            mesesPendentes.forEach(mes => selMes.innerHTML += `<option value="${mes}">${mes}</option>`);

            document.getElementById('filterIgreja').addEventListener('change', renderTable);
            document.getElementById('filterMes').addEventListener('change', renderTable);
            document.getElementById('filterStatus').addEventListener('change', renderTable);
        }

        function renderTable() {
            const filterIgreja = document.getElementById('filterIgreja').value;
            const filterMes = document.getElementById('filterMes').value;
            const filterStatus = document.getElementById('filterStatus').value;

            const filtered = allPendencias.filter(p => {
                if (filterIgreja !== 'Todos' && p.igrejaNome !== filterIgreja) return false;
                if (filterMes !== 'Todos' && p.mesRef !== filterMes) return false;
                if (filterStatus !== 'Todos' && p.status !== filterStatus) return false;
                return true;
            });

            const totalPendencias = filtered.length;
            const igrejasUnicas = new Set(filtered.map(p => p.igrejaNome)).size;
            const valorTotalEstimado = filtered.reduce((sum, p) => sum + p.valorEstimado, 0);

            document.getElementById('kpi-total-pendencias').textContent = totalPendencias;
            document.getElementById('kpi-igrejas-pendentes').textContent = igrejasUnicas;
            document.getElementById('kpi-valor-estimado').textContent = formatMoeda(valorTotalEstimado);
            document.getElementById('print-subtitle').textContent = `Região 655 • ${totalPendencias} pendências encontradas`;

            const tbody = document.getElementById('tabela-pendencias');
            tbody.innerHTML = '';

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-slate-400 text-xs font-bold uppercase">Nenhuma pendência encontrada para os filtros.</td></tr>';
                return;
            }

            filtered.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                
                const statusClass = p.status === 'Aguardando Lançamento' 
                    ? 'bg-red-100 text-red-700' 
                    : 'bg-amber-100 text-amber-700';

                tr.innerHTML = `
                    <td class="p-3 font-bold text-slate-700">${p.igrejaNome}</td>
                    <td class="p-3 font-semibold text-blue-600">${p.mesRef}</td>
                    <td class="p-3">
                        <span class="px-2 py-1 rounded text-[9px] font-black uppercase tracking-wider ${statusClass}">
                            ${p.status.replace(/ /g, ' ')}
                        </span>
                    </td>
                    <td class="p-3 text-right font-semibold text-slate-600">
                        ${p.valorEstimado > 0 ? formatMoeda(p.valorEstimado) : '-'}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        loadData();
        if (window.lucide) lucide.createIcons();
    </script>
</body>
</html>
