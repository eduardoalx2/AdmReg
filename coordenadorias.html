<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordenadorias - Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        let perms = [];
        try { perms = JSON.parse(localStorage.getItem('userPerms') || '[]'); } catch(e) {}
        if (!perms.includes('admin') && !perms.includes('coordenadorias')) {
            window.location.replace('index.html');
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #334155; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .table-custom { font-size: 0.8rem; }
        .table-custom th { padding: 8px 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.025em; }
        .table-custom td { padding: 8px 12px; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>

    <!-- CABEÇALHO -->
    <header class="w-full shadow-sm bg-white border-b">
        <div class="max-w-5xl mx-auto px-4 py-1.5">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo.png" alt="Logo IEQ" class="h-8 w-auto object-contain" onerror="this.src='https://via.placeholder.com/32?text=IEQ'">
                    <div class="border-l border-gray-200 pl-2">
                        <div class="text-xs font-bold text-slate-800 leading-none">Região 655</div>
                        <div class="text-[9px] font-medium text-slate-500 uppercase leading-none mt-0.5">Londrina/PR</div>
                    </div>
                </a>
                <a href="index.html" class="text-[10px] font-semibold text-slate-500 hover:text-blue-600 flex items-center gap-1 uppercase tracking-wider">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Painel Admin
                </a>
            </div>
        </div>
        <div class="header-gradient py-3 px-4">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <h1 class="text-sm md:text-base font-bold text-white tracking-wide uppercase">Coordenadorias</h1>
                <button onclick="abrirModal()" class="bg-purple-600 hover:bg-purple-500 text-white text-[10px] md:text-xs font-bold px-3 py-1.5 rounded flex items-center gap-1 transition-colors uppercase shadow-md">
                    <i data-lucide="plus" class="w-3 h-3"></i> Nova Coordenadoria
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto py-6 px-4">

        <!-- Tabela -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse table-custom whitespace-nowrap">
                    <thead>
                        <tr class="bg-slate-50 text-slate-600 border-b border-slate-200">
                            <th>Nome da Coordenadoria</th>
                            <th>Coordenador(a)</th>
                            <th>WhatsApp</th>
                            <th>E-mail</th>
                            <th class="w-16 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-coordenadorias" class="divide-y divide-slate-100">
                        <tr><td colspan="5" class="text-center py-6 text-slate-400">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Modal -->
        <div id="modal-coord" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden">
                <div class="bg-slate-800 px-5 py-4 flex justify-between items-center">
                    <h2 id="modal-titulo" class="text-white font-bold text-sm uppercase tracking-wide flex items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i> Nova Coordenadoria
                    </h2>
                    <button onclick="fecharModal()" class="text-slate-400 hover:text-white">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <form id="form-coord" class="p-6 space-y-4">
                    <input type="hidden" id="coord-id">

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nome da Coordenadoria <span class="text-red-500">*</span></label>
                        <input type="text" id="coord-nome" required class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-1 focus:ring-purple-500 outline-none text-sm font-bold uppercase" placeholder="Ex: COORD. DE MISSÕES">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Coordenador(a) <span class="text-red-500">*</span></label>
                        <div class="border border-slate-200 rounded-xl bg-slate-50 overflow-hidden focus-within:border-purple-500 focus-within:ring-1 focus-within:ring-purple-500">
                            <input type="text" id="search-pastor-coord" oninput="filtrarPastoresCoord()" class="w-full p-2.5 border-b border-slate-200 outline-none text-xs bg-white focus:bg-slate-50 font-medium" placeholder="Pesquisar coordenador...">
                            <div id="lista-pastores-coord" class="max-h-40 overflow-y-auto p-2 space-y-1 bg-slate-50 text-sm font-semibold"></div>
                        </div>
                        <input type="hidden" id="coord-pastor-id">
                        <input type="hidden" id="coord-pastor-nome">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">WhatsApp</label>
                            <input type="tel" id="coord-whatsapp" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-1 focus:ring-purple-500 outline-none text-sm font-semibold" placeholder="(43) 99999-9999">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">E-mail</label>
                            <input type="email" id="coord-email" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-1 focus:ring-purple-500 outline-none text-sm" placeholder="email@exemplo.com">
                        </div>
                    </div>

                    <div class="pt-4 flex gap-3">
                        <button type="button" onclick="fecharModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-2.5 rounded uppercase text-[11px] hover:bg-slate-200">Cancelar</button>
                        <button type="submit" id="btn-salvar" class="flex-1 bg-purple-600 text-white font-bold py-2.5 rounded uppercase text-[11px] hover:bg-purple-700 shadow-md">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="py-4 text-center text-slate-400 text-[10px]">
        &copy; 2024 Região 655 - IEQ Londrina/PR
    </footer>

    <script>
        window.abrirModal = () => {
            document.getElementById('form-coord').reset();
            document.getElementById('coord-id').value = '';
            document.getElementById('coord-pastor-id').value = '';
            document.getElementById('coord-pastor-nome').value = '';
            document.getElementById('search-pastor-coord').value = '';
            document.querySelectorAll('.pastor-coord-radio').forEach(r => r.checked = false);
            document.getElementById('modal-titulo').innerHTML = '<i data-lucide="plus" class="w-4 h-4"></i> Nova Coordenadoria';
            document.getElementById('modal-coord').classList.remove('hidden');
            if (window.lucide) window.lucide.createIcons();
        };
        window.fecharModal = () => document.getElementById('modal-coord').classList.add('hidden');
    </script>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        let coordList = [];
        let pastoresList = [];

        lucide.createIcons();

        const tabela = document.getElementById('tabela-coordenadorias');
        const form = document.getElementById('form-coord');

        async function carregarPastores() {
            try {
                const snap = await getDocs(collection(db, "pastores"));
                pastoresList = [];
                snap.forEach(d => pastoresList.push({ id: d.id, ...d.data() }));
                pastoresList.sort((a, b) => {
                    const aT = a.funcao === 'Pastor Titular';
                    const bT = b.funcao === 'Pastor Titular';
                    if (aT && !bT) return -1;
                    if (!aT && bT) return 1;
                    return a.nome.localeCompare(b.nome);
                });
                renderizarListaPastores(pastoresList);
            } catch (e) {
                console.error(e);
            }
        }

        function renderizarListaPastores(lista) {
            const container = document.getElementById('lista-pastores-coord');
            container.innerHTML = '';
            lista.forEach(p => {
                const label = document.createElement('label');
                label.className = 'flex items-center gap-3 cursor-pointer p-2 hover:bg-slate-200/50 rounded-lg transition-colors pastor-coord-item';
                const tags = [];
                if (p.funcao === 'Pastor Titular') tags.push('TITULAR');
                if (p.coordenador) tags.push('COORD.');
                const badge = tags.length > 0 ? `<span class="text-[8px] text-purple-600 font-bold">${tags.join(' | ')}</span>` : '';
                label.innerHTML = `
                    <input type="radio" name="pastor-coord-radio" value="${p.id}" data-nome="${p.nome}" class="pastor-coord-radio w-4 h-4 text-purple-600">
                    <span class="text-xs text-slate-700 leading-tight flex-1">${p.nome} ${badge}</span>
                `;
                label.querySelector('input').addEventListener('change', function() {
                    document.getElementById('coord-pastor-id').value = this.value;
                    document.getElementById('coord-pastor-nome').value = this.dataset.nome;
                });
                container.appendChild(label);
            });
        }

        window.filtrarPastoresCoord = () => {
            const termo = document.getElementById('search-pastor-coord').value.toLowerCase();
            const filtrados = pastoresList.filter(p => p.nome.toLowerCase().includes(termo));
            renderizarListaPastores(filtrados);
        };

        async function carregarCoordenadorias() {
            try {
                const snap = await getDocs(query(collection(db, "coordenadorias"), orderBy("nome")));
                coordList = [];
                snap.forEach(d => coordList.push({ id: d.id, ...d.data() }));
                renderizarTabela();
            } catch (e) {
                console.error(e);
                tabela.innerHTML = '<tr><td colspan="5" class="text-center py-6 text-red-500 font-bold">Erro ao carregar.</td></tr>';
            }
        }

        function renderizarTabela() {
            tabela.innerHTML = '';
            if (coordList.length === 0) {
                tabela.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-slate-400">Nenhuma coordenadoria cadastrada.</td></tr>';
                return;
            }
            coordList.forEach(c => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-purple-50/40 transition-colors group';
                tr.innerHTML = `
                    <td class="font-bold text-slate-800">${c.nome}</td>
                    <td class="font-semibold text-slate-700 text-xs">${c.coordenadorNome || '-'}</td>
                    <td class="text-slate-500 text-xs">${c.whatsapp || '-'}</td>
                    <td class="text-slate-500 text-xs">${c.email || '-'}</td>
                    <td class="text-center">
                        <div class="flex items-center justify-center gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="editarCoord('${c.id}')" class="text-blue-500 hover:text-blue-700" title="Editar">
                                <i data-lucide="edit" class="w-4 h-4"></i>
                            </button>
                            <button onclick="excluirCoord('${c.id}')" class="text-red-400 hover:text-red-600" title="Excluir">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </td>
                `;
                tabela.appendChild(tr);
            });
            lucide.createIcons();
        }

        window.editarCoord = (id) => {
            const c = coordList.find(x => x.id === id);
            if (!c) return;
            document.getElementById('coord-id').value = c.id;
            document.getElementById('coord-nome').value = c.nome;
            document.getElementById('coord-whatsapp').value = c.whatsapp || '';
            document.getElementById('coord-email').value = c.email || '';
            document.getElementById('coord-pastor-id').value = c.coordenadorId || '';
            document.getElementById('coord-pastor-nome').value = c.coordenadorNome || '';
            document.getElementById('search-pastor-coord').value = '';
            renderizarListaPastores(pastoresList);
            // Marca o radio do coordenador atual
            setTimeout(() => {
                const radio = document.querySelector(`.pastor-coord-radio[value="${c.coordenadorId}"]`);
                if (radio) radio.checked = true;
            }, 50);
            document.getElementById('modal-titulo').innerHTML = '<i data-lucide="edit" class="w-4 h-4"></i> Editar Coordenadoria';
            document.getElementById('modal-coord').classList.remove('hidden');
            if (window.lucide) window.lucide.createIcons();
        };

        window.excluirCoord = async (id) => {
            if (confirm("Tem certeza que deseja excluir esta coordenadoria?")) {
                try {
                    const c = coordList.find(x => x.id === id);
                    await deleteDoc(doc(db, "coordenadorias", id));
                    if (c?.coordenadorId) {
                        const ainda = coordList.filter(x => x.coordenadorId === c.coordenadorId && x.id !== id);
                        if (ainda.length === 0) {
                            await updateDoc(doc(db, "pastores", c.coordenadorId), { coordenador: false });
                        }
                    }
                    carregarCoordenadorias();
                } catch (e) {
                    alert("Erro ao excluir!");
                }
            }
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-salvar');
            btn.textContent = "Salvando...";
            btn.disabled = true;

            const coordenadorId = document.getElementById('coord-pastor-id').value;
            const coordenadorNome = document.getElementById('coord-pastor-nome').value;

            if (!coordenadorNome) {
                alert("Selecione um coordenador da lista.");
                btn.textContent = "Salvar";
                btn.disabled = false;
                return;
            }

            const payload = {
                nome: document.getElementById('coord-nome').value.trim().toUpperCase(),
                coordenadorId,
                coordenadorNome,
                whatsapp: document.getElementById('coord-whatsapp').value.trim(),
                email: document.getElementById('coord-email').value.trim().toLowerCase(),
                updatedAt: serverTimestamp()
            };

            try {
                const id = document.getElementById('coord-id').value;
                const oldCoordId = id ? coordList.find(x => x.id === id)?.coordenadorId : null;

                if (id) {
                    await updateDoc(doc(db, "coordenadorias", id), payload);
                } else {
                    payload.createdAt = serverTimestamp();
                    await addDoc(collection(db, "coordenadorias"), payload);
                }

                // Marca novo coordenador
                if (coordenadorId) {
                    await updateDoc(doc(db, "pastores", coordenadorId), { coordenador: true });
                }

                // Se trocou o coordenador, verifica se o antigo ainda coordena algo
                if (oldCoordId && oldCoordId !== coordenadorId) {
                    const ainda = coordList.filter(x => x.coordenadorId === oldCoordId && x.id !== id);
                    if (ainda.length === 0) {
                        await updateDoc(doc(db, "pastores", oldCoordId), { coordenador: false });
                    }
                }

                window.fecharModal();
                carregarCoordenadorias();
            } catch (err) {
                console.error(err);
                alert("Erro ao salvar.");
            } finally {
                btn.textContent = "Salvar";
                btn.disabled = false;
            }
        });

        carregarCoordenadorias();
        carregarPastores();
    </script>
</body>
</html>
