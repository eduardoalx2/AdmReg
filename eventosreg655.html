<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Eventos - Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { requireAuth, hasAnyPermission } from './js/auth.js';
        try {
            await requireAuth();
            if (!hasAnyPermission(['admin', 'gestao_eventos'])) {
                window.location.replace('index.html');
            }
        } catch (e) {}
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- CABEÇALHO COMPACTO -->
    <header class="w-full shadow-sm bg-white border-b">
        <div class="max-w-5xl mx-auto px-4 py-1.5">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo.png" alt="Logo IEQ" class="h-8 w-auto object-contain" onerror="this.src='https://via.placeholder.com/32?text=IEQ'">
                    <div class="border-l border-gray-200 pl-2">
                        <div class="text-xs font-bold text-slate-800 leading-none">Região 655</div>
                        <div class="text-[9px] font-medium text-slate-500 uppercase leading-none mt-0.5">Londrina/PR</div>
                    </div>
                </a>
                <a href="index.html" class="text-[10px] font-semibold text-slate-500 hover:text-blue-600 flex items-center gap-1 uppercase tracking-wider">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Painel Admin
                </a>
            </div>
        </div>
        <div class="header-gradient py-2 px-4">
            <div class="max-w-5xl mx-auto">
                <h1 class="text-sm md:text-base font-bold text-white tracking-wide uppercase">Gestão de Eventos</h1>
            </div>
        </div>
    </header>

    <div class="max-w-5xl mx-auto space-y-6 p-4 md:p-8">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <!-- FORMULÁRIO (Novo / Editar) -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 md:col-span-1 h-fit">
                <div class="flex items-center justify-between mb-4">
                    <h2 id="formTitulo" class="text-sm font-black text-slate-800 uppercase tracking-widest">Novo Evento</h2>
                    <span id="badgeEditando" class="hidden text-[9px] font-black uppercase tracking-widest bg-amber-100 text-amber-700 px-2 py-1 rounded-lg">Editando</span>
                </div>

                <form id="eventoForm" class="space-y-4">
                    <input type="hidden" id="editingId">

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Nome / Tipo do Evento *</label>
                        <input type="text" id="nome" required placeholder="Ex: CONVOCAÇÃO REGIONAL" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold uppercase">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Descrição do Evento</label>
                        <textarea id="descricao" rows="3" placeholder="Ex: CED trimestral com pauta de finanças e agenda regional..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm resize-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Data do Evento *</label>
                        <input type="date" id="data" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Local / Endereço</label>
                        <input type="text" id="local" placeholder="Ex: IEQ Central - Londrina/PR" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Público-alvo *</label>
                        <select id="publico" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold">
                            <option value="Todos" selected>TODOS (TITULARES + PASTORES + COORDENADORES)</option>
                            <option value="Titulares">SOMENTE TITULARES</option>
                            <option value="Coordenadores">SOMENTE COORDENADORES</option>
                            <option value="TitularesECoordenadores">TITULARES E COORDENADORES</option>
                            <option value="PublicoGeral">ABERTO AO PÚBLICO (pastores registrados + convidados)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Status *</label>
                        <select id="status" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold">
                            <option value="Ativo" selected>ATIVO (Aparece na Presença)</option>
                            <option value="Inativo">INATIVO</option>
                        </select>
                    </div>

                    <div class="flex gap-2">
                        <button type="submit" id="btnSubmit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl shadow-lg transition-all text-xs tracking-widest uppercase">
                            Salvar Evento
                        </button>
                        <button type="button" id="btnCancelar" onclick="cancelarEdicao()" class="hidden bg-slate-100 hover:bg-slate-200 text-slate-600 font-black py-3 px-4 rounded-xl transition-all text-xs tracking-widest uppercase">
                            ✕
                        </button>
                    </div>
                </form>

                <div id="feedback" class="hidden mt-4 p-3 rounded-xl text-center text-[10px] font-black uppercase tracking-widest"></div>
            </div>

            <!-- LISTA DE EVENTOS -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 md:col-span-2">
                <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-4">Eventos Cadastrados</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                                <th class="pb-3 px-2">Evento</th>
                                <th class="pb-3 px-2">Data</th>
                                <th class="pb-3 px-2">Público</th>
                                <th class="pb-3 px-2 text-center">Status</th>
                                <th class="pb-3 px-2 text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaEventos" class="text-sm">
                            <tr>
                                <td colspan="5" class="text-center py-8 text-slate-400 text-xs font-bold uppercase tracking-wider">CARREGANDO EVENTOS...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, getDocs, updateDoc, deleteDoc, doc, serverTimestamp, orderBy, query, where } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const publicoCores  = { Todos: 'bg-slate-100 text-slate-600', Titulares: 'bg-blue-100 text-blue-700', Coordenadores: 'bg-purple-100 text-purple-700', TitularesECoordenadores: 'bg-indigo-100 text-indigo-700', PublicoGeral: 'bg-emerald-100 text-emerald-700' };
        const publicoLabels = { Todos: 'Todos', Titulares: 'Somente Titulares', Coordenadores: 'Somente Coordenadores', TitularesECoordenadores: 'Titulares e Coordenadores', PublicoGeral: 'Aberto ao Público' };

        // Cache dos eventos carregados para preencher o formulário de edição
        let eventosCache = new Map();

        async function prePopularAusencias(eventoId, tipoEvento, dataEvento, publico) {
            try {
                const pastoresSnap = await getDocs(collection(db, "pastores"));
                let lista = [];
                pastoresSnap.forEach(d => lista.push(d.data()));

                if (publico === 'Titulares') {
                    lista = lista.filter(p => p.funcao === 'Pastor Titular');
                } else if (publico === 'Coordenadores') {
                    lista = lista.filter(p => p.coordenador === true);
                } else if (publico === 'TitularesECoordenadores') {
                    lista = lista.filter(p => p.funcao === 'Pastor Titular' || p.coordenador === true);
                }

                const agora = new Date().toLocaleString('pt-BR');
                const promises = lista.map(p => {
                    const igrejaArr = Array.isArray(p.igreja) ? p.igreja : (p.igreja ? [p.igreja] : []);
                    return addDoc(collection(db, "presencas"), {
                        nome: p.nome,
                        igreja: igrejaArr[0] || '',
                        eventoId, tipoEvento, dataEvento,
                        status: 'Ausente', motivo: '', declaracao: '',
                        dataPostagem: agora, obs: '',
                        preRegistrado: true,
                        createdAt: serverTimestamp()
                    });
                });
                await Promise.all(promises);
            } catch(e) {
                console.error("Erro ao pré-popular ausências:", e);
            }
        }

        const form = document.getElementById('eventoForm');
        const tabelaEventos = document.getElementById('tabelaEventos');
        const feedback = document.getElementById('feedback');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnCancelar = document.getElementById('btnCancelar');
        const formTitulo = document.getElementById('formTitulo');
        const badgeEditando = document.getElementById('badgeEditando');

        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('data').value = hoje;

        document.getElementById('nome').addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });

        async function carregarEventos() {
            try {
                const q = query(collection(db, "eventos"), orderBy("data", "desc"));
                const querySnapshot = await getDocs(q);
                eventosCache.clear();
                tabelaEventos.innerHTML = '';

                if (querySnapshot.empty) {
                    tabelaEventos.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-slate-400 text-[10px] font-bold uppercase tracking-widest">NENHUM EVENTO CADASTRADO</td></tr>`;
                    return;
                }

                querySnapshot.forEach((documento) => {
                    const ev = documento.data();
                    eventosCache.set(documento.id, ev);

                    const tr = document.createElement('tr');
                    tr.className = 'border-b border-slate-50 hover:bg-slate-50 transition-colors group';

                    const dataFormatada = ev.data.split('-').reverse().join('/');
                    const badgeClass = ev.status === 'Ativo' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500';
                    const pubCor   = publicoCores[ev.publico]  || publicoCores.Todos;
                    const pubLabel = publicoLabels[ev.publico] || 'Todos';

                    const descHtml = ev.descricao
                        ? `<p class="text-[9px] text-slate-400 font-medium mt-0.5 truncate max-w-[180px]" title="${ev.descricao}">${ev.descricao}</p>`
                        : '';
                    const localHtml = ev.local
                        ? `<p class="text-[9px] text-slate-400 font-medium mt-0.5">📍 ${ev.local}</p>`
                        : '';

                    tr.innerHTML = `
                        <td class="py-3 px-2">
                            <p class="font-bold text-slate-700 text-xs uppercase leading-tight">${ev.nome}</p>
                            ${descHtml}${localHtml}
                        </td>
                        <td class="py-3 px-2 font-semibold text-slate-500 text-xs whitespace-nowrap">${dataFormatada}</td>
                        <td class="py-3 px-2"><span class="px-2 py-1 rounded text-[9px] font-black uppercase ${pubCor}">${pubLabel}</span></td>
                        <td class="py-3 px-2 text-center">
                            <span class="px-2 py-1 rounded-md text-[10px] font-black uppercase tracking-wider cursor-pointer select-none transition-colors hover:opacity-70 ${badgeClass}" onclick="window.alternarStatus('${documento.id}', '${ev.status}')">
                                ${ev.status}
                            </span>
                        </td>
                        <td class="py-3 px-2 text-right flex items-center justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="window.editarEvento('${documento.id}')" class="text-blue-400 hover:text-blue-600 transition-colors p-1" title="Editar Evento">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                            </button>
                            <button onclick="window.excluirEvento('${documento.id}')" class="text-red-400 hover:text-red-600 transition-colors p-1" title="Excluir Evento">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </td>
                    `;
                    tabelaEventos.appendChild(tr);
                });
            } catch (error) {
                console.error("Erro ao carregar eventos:", error);
                tabelaEventos.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-red-500 text-[10px] font-bold uppercase tracking-widest">ERRO AO CARREGAR EVENTOS</td></tr>`;
            }
        }

        window.editarEvento = function(id) {
            const ev = eventosCache.get(id);
            if (!ev) return;

            document.getElementById('editingId').value = id;
            document.getElementById('nome').value = ev.nome || '';
            document.getElementById('descricao').value = ev.descricao || '';
            document.getElementById('data').value = ev.data || '';
            document.getElementById('local').value = ev.local || '';
            document.getElementById('publico').value = ev.publico || 'Todos';
            document.getElementById('status').value = ev.status || 'Ativo';

            formTitulo.textContent = 'Editar Evento';
            badgeEditando.classList.remove('hidden');
            btnSubmit.textContent = 'ATUALIZAR EVENTO';
            btnSubmit.classList.replace('bg-blue-600', 'bg-amber-500');
            btnSubmit.classList.replace('hover:bg-blue-700', 'hover:bg-amber-600');
            btnCancelar.classList.remove('hidden');

            // Rola até o formulário
            document.getElementById('eventoForm').scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        window.cancelarEdicao = function() {
            form.reset();
            document.getElementById('editingId').value = '';
            document.getElementById('data').value = hoje;
            formTitulo.textContent = 'Novo Evento';
            badgeEditando.classList.add('hidden');
            btnSubmit.textContent = 'SALVAR EVENTO';
            btnSubmit.classList.replace('bg-amber-500', 'bg-blue-600');
            btnSubmit.classList.replace('hover:bg-amber-600', 'hover:bg-blue-700');
            btnCancelar.classList.add('hidden');
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const editingId = document.getElementById('editingId').value;
            btnSubmit.textContent = editingId ? 'ATUALIZANDO...' : 'SALVANDO...';
            btnSubmit.disabled = true;

            const payload = {
                nome: document.getElementById('nome').value.trim(),
                descricao: document.getElementById('descricao').value.trim(),
                data: document.getElementById('data').value,
                local: document.getElementById('local').value.trim(),
                publico: document.getElementById('publico').value,
                status: document.getElementById('status').value,
            };

            try {
                if (editingId) {
                    // EDIÇÃO — não repopula ausências
                    await updateDoc(doc(db, "eventos", editingId), { ...payload, updatedAt: serverTimestamp() });
                    showFeedback("Evento atualizado com sucesso!", "success");
                    window.cancelarEdicao();
                } else {
                    // NOVO — cria evento e pré-popula ausências
                    payload.createdAt = serverTimestamp();
                    const docRef = await addDoc(collection(db, "eventos"), payload);
                    showFeedback("Evento cadastrado! Registrando ausências...", "success");
                    await prePopularAusencias(docRef.id, payload.nome, payload.data, payload.publico);
                    showFeedback("Evento cadastrado com sucesso! Ausências pré-registradas.", "success");
                    form.reset();
                    document.getElementById('data').value = hoje;
                }
                carregarEventos();
            } catch (error) {
                console.error("Erro:", error);
                showFeedback("Erro ao salvar evento.", "error");
            } finally {
                btnSubmit.textContent = editingId ? 'ATUALIZAR EVENTO' : 'SALVAR EVENTO';
                btnSubmit.disabled = false;
            }
        });

        window.alternarStatus = async function(id, statusAtual) {
            const novoStatus = statusAtual === 'Ativo' ? 'Inativo' : 'Ativo';
            try {
                await updateDoc(doc(db, "eventos", id), { status: novoStatus });
                carregarEventos();
            } catch (error) {
                console.error("Erro ao atualizar status:", error);
                alert("Erro ao alterar o status do evento.");
            }
        };

        window.excluirEvento = async function(id) {
            if (confirm("Tem certeza que deseja EXCLUIR este evento? ATENÇÃO: Todas as listas de presenças e faltas registradas para este evento também serão APAGADAS permanentemente!")) {
                try {
                    // 1. Localiza e apaga todas as presenças vinculadas a este evento em cascata
                    const presencasSnap = await getDocs(query(collection(db, "presencas"), where("eventoId", "==", id)));
                    const deletePromises = [];
                    presencasSnap.forEach(docSnap => {
                        deletePromises.push(deleteDoc(doc(db, "presencas", docSnap.id)));
                    });
                    await Promise.all(deletePromises); // Executa todas as exclusões em paralelo

                    // 2. Apaga o evento em si
                    await deleteDoc(doc(db, "eventos", id));
                    
                    if (document.getElementById('editingId').value === id) window.cancelarEdicao();
                    carregarEventos();
                } catch (error) {
                    console.error("Erro ao excluir evento e presenças:", error);
                    alert("Erro ao excluir o evento e suas presenças.");
                }
            }
        };

        function showFeedback(message, type) {
            feedback.textContent = message;
            feedback.classList.remove('hidden', 'bg-green-50', 'text-green-600', 'bg-red-50', 'text-red-600');
            feedback.classList.add(type === 'success' ? 'bg-green-50' : 'bg-red-50');
            feedback.classList.add(type === 'success' ? 'text-green-600' : 'text-red-600');
            setTimeout(() => feedback.classList.add('hidden'), 4000);
        }

        carregarEventos();
    </script>

    <footer class="py-4 text-center text-slate-400 text-[10px]">
        &copy; 2024 Região 655 - IEQ Londrina/PR
    </footer>
</body>
</html>
