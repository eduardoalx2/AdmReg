<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Presença - Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        <!-- Cabeçalho -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4 relative w-full md:w-auto">
                <a href="index.html" class="absolute left-0 top-1/2 -translate-y-1/2 md:static md:translate-y-0 text-slate-400 hover:text-blue-600 transition-colors font-bold uppercase tracking-wider text-[10px]">
                    ← Voltar
                </a>
                <img src="logo.png" alt="Logo da Região" class="h-12 w-auto object-contain mx-auto md:mx-0" onerror="this.src='https://via.placeholder.com/150x80?text=LOGO'">
                <div class="hidden md:block">
                    <h1 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Controle de Presença</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Painel de Acompanhamento</p>
                </div>
            </div>
            
            <!-- Filtros Superiores -->
            <div class="flex flex-col md:flex-row items-center gap-3 w-full md:w-auto">
                <input type="text" id="filtroNome" placeholder="BUSCAR POR NOME..." class="w-full md:w-48 p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-[10px] font-bold uppercase tracking-widest placeholder:text-slate-300">
                
                <select id="filtroIgreja" class="w-full md:w-64 p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-[10px] font-bold uppercase tracking-widest">
                    <option value="">TODAS AS IGREJAS</option>
                </select>

                <select id="filtroEvento" class="w-full md:w-64 p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-[10px] font-bold uppercase tracking-widest">
                    <option value="">TODOS OS EVENTOS</option>
                </select>
            </div>
        </div>

        <!-- Indicadores Rápidos -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Registros Exibidos</p>
                <h3 class="text-2xl font-black text-slate-800" id="countTotal">0</h3>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Presentes</p>
                <h3 class="text-2xl font-black text-green-600" id="countPresentes">0</h3>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Ausentes</p>
                <h3 class="text-2xl font-black text-red-600" id="countAusentes">0</h3>
            </div>
            <button onclick="window.print()" class="bg-slate-900 text-white p-4 rounded-2xl shadow-sm hover:bg-blue-600 transition-colors flex flex-col items-center justify-center gap-1 group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400 group-hover:text-blue-200 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                <span class="text-[10px] font-bold uppercase tracking-widest">Imprimir</span>
            </button>
        </div>

        <!-- Tabela -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr class="text-[10px] font-black text-slate-500 uppercase tracking-widest">
                            <th class="p-4 whitespace-nowrap">Pastor(a) / Obreiro(a)</th>
                            <th class="p-4 whitespace-nowrap">Igreja</th>
                            <th class="p-4 whitespace-nowrap">Evento & Data</th>
                            <th class="p-4 whitespace-nowrap text-center">Status</th>
                            <th class="p-4 w-1/3">Justificativa (Ausentes)</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaPresencas" class="text-sm">
                        <tr>
                            <td colspan="5" class="text-center py-12 text-slate-400 text-xs font-bold uppercase tracking-wider">
                                <svg class="animate-spin h-6 w-6 text-blue-500 mx-auto mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                CARREGANDO DADOS...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        let todasPresencas = [];
        
        const tabela = document.getElementById('tabelaPresencas');
        const filtroNome = document.getElementById('filtroNome');
        const filtroIgreja = document.getElementById('filtroIgreja');
        const filtroEvento = document.getElementById('filtroEvento');

        // Labels Dinâmicos
        const countTotal = document.getElementById('countTotal');
        const countPresentes = document.getElementById('countPresentes');
        const countAusentes = document.getElementById('countAusentes');

        async function inicializar() {
            try {
                // 1. Puxa os Eventos para colocar no select
                const eventosSnapshot = await getDocs(query(collection(db, "eventos"), orderBy("data", "desc")));
                eventosSnapshot.forEach(doc => {
                    const ev = doc.data();
                    const dataFormatada = ev.data.split('-').reverse().join('/');
                    const option = document.createElement('option');
                    option.value = doc.id; // Id do evento
                    option.textContent = `${ev.nome} (${dataFormatada})`;
                    filtroEvento.appendChild(option);
                });

                // 2. Puxa as Igrejas (apenas extraindo os nomes que existem nas presenças para o select é uma opção, 
                // mas vamos puxar da coleção para garantir a lista limpa)
                const igrejasSnapshot = await getDocs(collection(db, "igrejas"));
                const arrayIgrejas = [];
                igrejasSnapshot.forEach(doc => arrayIgrejas.push(doc.data()));
                arrayIgrejas.sort((a, b) => parseInt(a.codigo || 0) - parseInt(b.codigo || 0));
                
                arrayIgrejas.forEach(ig => {
                    const cod = String(ig.codigo).padStart(4, '0');
                    const desc = `${cod} - ${ig.nome}`;
                    const option = document.createElement('option');
                    option.value = desc;
                    option.textContent = desc;
                    filtroIgreja.appendChild(option);
                });

                // 3. Busca Presenças
                const q = query(collection(db, "presencas"), orderBy("createdAt", "desc"));
                const pSnapshot = await getDocs(q);
                
                pSnapshot.forEach(doc => {
                    todasPresencas.push({ id: doc.id, ...doc.data() });
                });

                renderizarTabela();

            } catch (error) {
                console.error("Erro ao buscar dados:", error);
                tabela.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-red-500 text-[10px] font-bold uppercase tracking-widest">ERRO AO CARREGAR OS DADOS DO BANCO</td></tr>`;
            }
        }

        function renderizarTabela() {
            const fNome = filtroNome.value.toUpperCase();
            const fIgreja = filtroIgreja.value;
            const fEvento = filtroEvento.value;

            // Filtragem array em memoria
            const filtrados = todasPresencas.filter(p => {
                const matchNome = (p.nome || '').toUpperCase().includes(fNome);
                // Retira a verificação exata e aceita se conter o texto, caso tenha havido mudanças
                const matchIgreja = fIgreja === "" || p.igreja === fIgreja;
                // eventoId foi injetado na modificação da tela presencareg655.html
                const matchEvento = fEvento === "" || p.eventoId === fEvento; 
                return matchNome && matchIgreja && matchEvento;
            });

            tabela.innerHTML = '';

            let cPres = 0;
            let cAus = 0;

            if (filtrados.length === 0) {
                tabela.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-slate-400 text-xs font-bold uppercase tracking-wider">NENHUM REGISTRO ENCONTRADO PARA OS FILTROS APLICADOS.</td></tr>`;
            } else {
                filtrados.forEach(p => {
                    if(p.status === 'Presente') cPres++;
                    if(p.status === 'Ausente') cAus++;

                    const tr = document.createElement('tr');
                    tr.className = 'border-b border-slate-50 hover:bg-slate-50 transition-colors';
                    
                    const isPresente = p.status === 'Presente';
                    const statusBadge = isPresente 
                        ? '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-md text-[10px] font-black uppercase tracking-wider">Presente</span>'
                        : '<span class="bg-red-100 text-red-700 px-3 py-1 rounded-md text-[10px] font-black uppercase tracking-wider">Ausente</span>';

                    const dataEventoFormatada = p.dataEvento ? p.dataEvento.split('-').reverse().join('/') : '';

                    tr.innerHTML = `
                        <td class="p-4 font-bold text-slate-800 uppercase text-xs">${p.nome || '-'}</td>
                        <td class="p-4 text-slate-600 font-medium text-xs whitespace-nowrap truncate max-w-[200px]" title="${p.igreja}">${p.igreja || '-'}</td>
                        <td class="p-4">
                            <div class="font-bold text-slate-700 text-xs">${p.tipoEvento || '-'}</div>
                            <div class="text-[10px] text-slate-400 font-semibold">${dataEventoFormatada}</div>
                        </td>
                        <td class="p-4 text-center">${statusBadge}</td>
                        <td class="p-4 text-xs text-slate-500 italic">${!isPresente ? (p.motivo || 'Sem justificativa') : '<span class="opacity-30">-</span>'}</td>
                    `;
                    tabela.appendChild(tr);
                });
            }

            // Update Indicadores
            countTotal.textContent = filtrados.length;
            countPresentes.textContent = cPres;
            countAusentes.textContent = cAus;
        }

        // Listeners dos Filtros
        filtroNome.addEventListener('input', renderizarTabela);
        filtroIgreja.addEventListener('change', renderizarTabela);
        filtroEvento.addEventListener('change', renderizarTabela);

        window.onload = inicializar;

    </script>
    
    <style>
        @media print {
            body { background: white; padding: 0; }
            .max-w-6xl { max-width: 100%; }
            select, input, button, a { display: none !important; }
            .bg-slate-50 { background: white !important; }
            .border-slate-200 { border-color: #eee !important; }
            .shadow-sm { box-shadow: none !important; }
            /* Ajustar exibição da tabela na impressão */
            table { width: 100%; border: 1px solid #ddd; }
            th, td { padding: 8px !important; border-bottom: 1px solid #eee; }
        }
    </style>
</body>
</html>
