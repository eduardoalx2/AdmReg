<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Eventos e Presenças - Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        let perms = [];
        try { perms = JSON.parse(localStorage.getItem('userPerms') || '[]'); } catch(e) {}
        // Verifica acesso com base na permissão correta
        if (!perms.includes('admin') && !perms.includes('controle_presencas')) {
            window.location.replace('index.html');
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <!-- CABEÇALHO COMPACTO -->
    <header class="w-full shadow-sm bg-white border-b">
        <div class="max-w-6xl mx-auto px-4 py-1.5">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo.png" alt="Logo IEQ" class="h-8 w-auto object-contain" onerror="this.src='https://via.placeholder.com/32?text=IEQ'">
                    <div class="border-l border-gray-200 pl-2">
                        <div class="text-xs font-bold text-slate-800 leading-none">Região 655</div>
                        <div class="text-[9px] font-medium text-slate-500 uppercase leading-none mt-0.5">Londrina/PR</div>
                    </div>
                </a>
                <a href="index.html" class="text-[10px] font-semibold text-slate-500 hover:text-blue-600 flex items-center gap-1 uppercase tracking-wider">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Painel Admin
                </a>
            </div>
        </div>
        <div class="header-gradient py-3 px-4">
            <div class="max-w-6xl mx-auto">
                <h1 class="text-sm md:text-base font-bold text-white tracking-wide uppercase flex items-center gap-2">
                    <i data-lucide="clipboard-check" class="w-5 h-5"></i> Controle de Presenças
                </h1>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8 space-y-6">
        
        <!-- FILTROS -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-4 flex items-center gap-2">
                <i data-lucide="filter" class="w-4 h-4 text-blue-600"></i> Filtros de Busca
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Filtrar por Evento</label>
                    <select id="filterEvento" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold">
                        <option value="Todos">Carregando eventos...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Filtrar por Status</label>
                    <select id="filterStatus" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold">
                        <option value="Todos">Todos os Status</option>
                        <option value="Presente">Presentes</option>
                        <option value="Ausente">Ausentes (Pendentes)</option>
                        <option value="Justificado">Justificados</option>
                        <option value="Consolidado">Ausências Consolidadas</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Buscar Pastor</label>
                    <input type="text" id="filterNome" placeholder="Digite o nome..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold">
                </div>
            </div>
        </div>

        <!-- TABELA -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest flex items-center gap-2">
                    <i data-lucide="users" class="w-4 h-4 text-blue-600"></i> Lista de Lançamentos
                </h2>
                <span id="contador" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest bg-slate-100 px-2 py-1 rounded-lg">Carregando...</span>
            </div>
            
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead>
                        <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                            <th class="pb-3 px-2">Pastor / Igreja</th>
                            <th class="pb-3 px-2">Evento</th>
                            <th class="pb-3 px-2">Status</th>
                            <th class="pb-3 px-2">Motivo</th>
                            <th class="pb-3 px-2 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaPresencas" class="text-sm">
                        <tr>
                            <td colspan="5" class="text-center py-8 text-slate-400 text-xs font-bold uppercase tracking-wider">
                                Sincronizando com banco de dados...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- MODAL DE EDIÇÃO -->
    <div id="modalEdit" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
            <div class="bg-slate-800 px-6 py-4 flex justify-between items-center">
                <h3 class="text-white font-bold text-sm uppercase tracking-wide flex items-center gap-2">
                    <i data-lucide="edit" class="w-4 h-4"></i> Editar Lançamento
                </h3>
                <button onclick="window.closeModal()" class="text-slate-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="editId">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Pastor</label>
                    <input type="text" id="editNome" readonly class="w-full p-3 bg-slate-100 border border-slate-200 rounded-xl text-sm font-bold text-slate-600 outline-none">
                </div>
                
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Status</label>
                    <select id="editStatus" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold">
                        <option value="Presente">PRESENTE</option>
                        <option value="Ausente">AUSENTE</option>
                        <option value="Justificado">JUSTIFICADO</option>
                    </select>
                </div>

                <div id="containerMotivo">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Motivo / Justificativa</label>
                    <textarea id="editMotivo" rows="3" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm resize-none"></textarea>
                </div>

                <div id="containerConsolidada" class="hidden bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" id="editConsolidada" class="mt-1 h-4 w-4 rounded border-blue-300 text-blue-600 focus:ring-blue-500">
                        <span class="text-xs font-bold text-blue-800 leading-tight">
                            Marcar como Ausência Consolidada
                            <span class="block text-[10px] font-medium text-blue-600 mt-0.5">Essa ausência já foi conversada, justificada e resolvida internamente.</span>
                        </span>
                    </label>
                </div>

                <div class="pt-2 flex gap-3">
                    <button onclick="window.closeModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition-colors text-xs uppercase tracking-widest">Cancelar</button>
                    <button id="btnSave" onclick="window.saveEdit()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors text-xs uppercase tracking-widest shadow-lg flex justify-center items-center gap-2">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        let allPresencas = [];
        let allEventos = [];

        async function loadData() {
            try {
                // Carrega todos os Eventos
                const evSnap = await getDocs(query(collection(db, "eventos"), orderBy("data", "desc")));
                const selectEv = document.getElementById("filterEvento");
                selectEv.innerHTML = '<option value="Todos">Todos os Eventos</option>';
                
                evSnap.forEach(d => {
                    const ev = {id: d.id, ...d.data()};
                    allEventos.push(ev);
                    const dataFormatada = ev.data ? ev.data.split('-').reverse().join('/') : '';
                    selectEv.innerHTML += `<option value="${ev.id}">${ev.nome} (${dataFormatada})</option>`;
                });

                // Carrega todas as Presenças
                const prSnap = await getDocs(collection(db, "presencas"));
                prSnap.forEach(d => allPresencas.push({id: d.id, ...d.data()}));

                window.renderTable();
            } catch (error) {
                console.error("Erro ao carregar dados:", error);
                document.getElementById("tabelaPresencas").innerHTML = '<tr><td colspan="5" class="text-center py-6 text-red-500 text-[10px] font-bold uppercase tracking-widest">Erro ao carregar dados.</td></tr>';
            }
        }

        window.renderTable = () => {
            const filterEv = document.getElementById("filterEvento").value;
            const filterSt = document.getElementById("filterStatus").value;
            const filterNome = document.getElementById("filterNome").value.toLowerCase();

            const tbody = document.getElementById("tabelaPresencas");
            tbody.innerHTML = '';

            let filtered = allPresencas.filter(p => {
                // Filtro Evento
                if(filterEv !== "Todos" && p.eventoId !== filterEv) return false;
                
                // Filtro Status com a lógica de Consolidação
                const isConsolidated = p.consolidada === true;
                if(filterSt === "Presente" && p.status !== "Presente") return false;
                if(filterSt === "Justificado" && p.status !== "Justificado") return false;
                if(filterSt === "Ausente" && (p.status !== "Ausente" || isConsolidated)) return false;
                if(filterSt === "Consolidado" && (!isConsolidated || p.status !== "Ausente")) return false;

                // Filtro Nome
                if(filterNome && !p.nome.toLowerCase().includes(filterNome)) return false;

                return true;
            });

            // Ordena os registros (Data do evento DECRESCENTE -> Nome)
            filtered.sort((a,b) => {
                const dA = a.dataEvento || '';
                const dB = b.dataEvento || '';
                if(dA !== dB) return dB.localeCompare(dA);
                return a.nome.localeCompare(b.nome);
            });

            document.getElementById('contador').textContent = `${filtered.length} REGISTRO(S)`;

            filtered.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-slate-50 hover:bg-slate-50 transition-colors group';

                let statusBadge = '';
                if(p.status === 'Presente') {
                    statusBadge = '<span class="bg-emerald-100 text-emerald-700 px-2.5 py-1 rounded-lg text-[9px] font-black uppercase tracking-wider shadow-sm">Presente</span>';
                } else if(p.status === 'Justificado') {
                    statusBadge = '<span class="bg-amber-100 text-amber-700 px-2.5 py-1 rounded-lg text-[9px] font-black uppercase tracking-wider shadow-sm">Justificado</span>';
                } else if(p.status === 'Ausente') {
                    if(p.consolidada) {
                        statusBadge = '<span class="bg-blue-100 text-blue-700 px-2.5 py-1 rounded-lg text-[9px] font-black uppercase tracking-wider shadow-sm">Consolidada</span>';
                    } else {
                        statusBadge = '<span class="bg-red-100 text-red-700 px-2.5 py-1 rounded-lg text-[9px] font-black uppercase tracking-wider shadow-sm animate-pulse">Ausente</span>';
                    }
                }

                // Botões de Ação
                let actions = `
                    <div class="flex items-center justify-end gap-2 opacity-100 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity">
                        <button onclick="window.openEdit('${p.id}')" class="text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 p-2 rounded-lg transition-colors shadow-sm" title="Editar Lançamento">
                            <i data-lucide="edit-2" class="w-4 h-4"></i>
                        </button>
                `;
                
                // Botão Rápido de Consolidar diretamente na tabela (só aparece se estiver Ausente e ainda não consolidada)
                if (p.status === 'Ausente' && !p.consolidada) {
                    actions += `
                        <button onclick="window.markConsolidated('${p.id}')" class="text-emerald-500 hover:text-emerald-700 bg-emerald-50 hover:bg-emerald-100 p-2 rounded-lg transition-colors shadow-sm" title="Marcar como Ausência Consolidada">
                            <i data-lucide="check-circle" class="w-4 h-4"></i>
                        </button>
                    `;
                }
                actions += `</div>`;

                const dataFormatada = p.dataEvento ? p.dataEvento.split('-').reverse().join('/') : '';

                tr.innerHTML = `
                    <td class="py-3 px-2">
                        <p class="font-bold text-xs text-slate-800">${p.nome}</p>
                        <p class="text-[10px] font-medium text-slate-500 max-w-[180px] truncate" title="${p.igreja || '-'}">${p.igreja || '-'}</p>
                    </td>
                    <td class="py-3 px-2">
                        <p class="font-semibold text-xs text-slate-600">${p.tipoEvento}</p>
                        <p class="text-[9px] font-bold text-slate-400 uppercase">${dataFormatada}</p>
                    </td>
                    <td class="py-3 px-2">${statusBadge}</td>
                    <td class="py-3 px-2">
                        <p class="text-[11px] font-medium text-slate-600 max-w-[200px] truncate" title="${p.motivo || ''}">${p.motivo || '-'}</p>
                    </td>
                    <td class="py-3 px-2 text-right">${actions}</td>
                `;
                tbody.appendChild(tr);
            });

            if(filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-slate-400 text-[10px] font-bold uppercase tracking-widest">NENHUM REGISTRO ENCONTRADO PARA OS FILTROS.</td></tr>';
            }

            if(window.lucide) window.lucide.createIcons();
        }

        window.openEdit = (id) => {
            const p = allPresencas.find(x => x.id === id);
            if(!p) return;
            document.getElementById('editId').value = p.id;
            document.getElementById('editNome').value = p.nome;
            document.getElementById('editStatus').value = p.status;
            document.getElementById('editMotivo').value = p.motivo || '';
            document.getElementById('editConsolidada').checked = p.consolidada === true;
            
            const st = p.status;
            const container = document.getElementById('containerConsolidada');
            if(st === 'Ausente') {
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
                document.getElementById('editConsolidada').checked = false;
            }

            document.getElementById('modalEdit').classList.remove('hidden');
        }

        window.closeModal = () => {
            document.getElementById('modalEdit').classList.add('hidden');
        }

        document.getElementById('editStatus').addEventListener('change', () => {
            const st = document.getElementById('editStatus').value;
            const container = document.getElementById('containerConsolidada');
            if(st === 'Ausente') {
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
                document.getElementById('editConsolidada').checked = false;
            }
        });

        window.saveEdit = async () => {
            const id = document.getElementById('editId').value;
            const status = document.getElementById('editStatus').value;
            const motivo = document.getElementById('editMotivo').value.trim();
            const consolidada = document.getElementById('editConsolidada').checked;

            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> SALVANDO...';
            if(window.lucide) window.lucide.createIcons();

            try {
                await updateDoc(doc(db, "presencas", id), {
                    status,
                    motivo,
                    consolidada: status === 'Ausente' ? consolidada : false
                });
                
                // Atualiza localmente
                const idx = allPresencas.findIndex(x => x.id === id);
                if(idx !== -1) {
                    allPresencas[idx].status = status;
                    allPresencas[idx].motivo = motivo;
                    allPresencas[idx].consolidada = status === 'Ausente' ? consolidada : false;
                }
                window.renderTable();
                window.closeModal();
            } catch(e) {
                console.error(e);
                alert("Erro ao salvar alterações!");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Salvar';
            }
        }

        // Função rápida de consolidação direto da tabela
        window.markConsolidated = async (id) => {
            if(confirm("Deseja marcar esta ausência como CONSOLIDADA?\n\nIsso significa que a ausência já foi devidamente conversada, justificada e resolvida com o pastor, mas ela continuará visível no histórico para fins de documentação.")) {
                try {
                    await updateDoc(doc(db, "presencas", id), { consolidada: true });
                    
                    // Atualiza array local para refletir UI sem recarregar banco
                    const idx = allPresencas.findIndex(x => x.id === id);
                    if(idx !== -1) allPresencas[idx].consolidada = true;
                    
                    window.renderTable();
                } catch(e) {
                    console.error(e);
                    alert("Erro ao atualizar!");
                }
            }
        }

        // Ouvintes de eventos para re-filtrar on the fly
        document.getElementById('filterEvento').addEventListener('change', window.renderTable);
        document.getElementById('filterStatus').addEventListener('change', window.renderTable);
        document.getElementById('filterNome').addEventListener('input', window.renderTable);

        // Inicia a vida
        loadData();
        if(window.lucide) window.lucide.createIcons();
    </script>
</body>
</html>
