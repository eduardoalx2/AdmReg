<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin — Região 655</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        // Bloqueio ultra-rápido via perms
        const permsStr = localStorage.getItem('userPerms');
        const email = localStorage.getItem('userEmail');
        const igreja = localStorage.getItem('userIgreja');
        
        if (!permsStr || !email) {
            window.location.replace('login.html');
        } else {
            let p = [];
            try { p = JSON.parse(permsStr); } catch(e) {}
            const isAdmin = p.includes('admin');
            const isEquipe = p.length > 0 && !igreja;
            
            // Trava de segurança: Se for Pastor, expulsa para o painel exclusivo
            if (!isAdmin && !isEquipe) {
                window.location.replace('painel_pastor.html');
            }
        }
    </script>
    <style>
        :root {
            --bg: #0c0f1a;
            --surface: #111827;
            --border: rgba(255,255,255,0.07);
            --border-hover: rgba(99,179,237,0.4);
            --accent: #63b3ed;
            --accent2: #4299e1;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #4a5568;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        .brand-header {
            position: relative;
            padding: 48px 24px 56px;
            text-align: center;
            overflow: hidden;
            z-index: 1;
        }

        .header-glow {
            position: absolute;
            top: -60px; left: 50%;
            transform: translateX(-50%);
            width: 600px; height: 300px;
            background: radial-gradient(ellipse at center, rgba(66,153,225,0.18) 0%, transparent 70%);
            pointer-events: none;
        }

        .header-ring {
            position: absolute;
            top: -80px; left: 50%;
            transform: translateX(-50%);
            width: 500px; height: 500px;
            border: 1px solid rgba(99,179,237,0.06);
            border-radius: 50%;
            pointer-events: none;
        }

        .logo-wrap { display: inline-block; margin-bottom: 20px; }
        .logo-wrap img {
            max-height: 56px; max-width: 200px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(99,179,237,0.3));
        }

        .badge-regional {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(99,179,237,0.1);
            border: 1px solid rgba(99,179,237,0.2);
            border-radius: 100px;
            padding: 4px 14px;
            font-family: 'Sora', sans-serif;
            font-size: 9px; font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .badge-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.7); }
        }

        .portal-title {
            font-family: 'Sora', sans-serif;
            font-size: clamp(26px, 5vw, 44px);
            font-weight: 800;
            letter-spacing: -0.03em;
            color: #fff;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .portal-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            margin-bottom: 0;
        }

        main {
            flex: 1;
            max-width: 860px;
            width: 100%;
            margin: 0 auto;
            padding: 0 16px 64px;
            position: relative;
            z-index: 1;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            margin-top: 32px;
        }

        .section-label-line { height: 1px; flex: 1; background: var(--border); }

        .section-label span {
            font-family: 'Sora', sans-serif;
            font-size: 9px; font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            white-space: nowrap;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 8px;
        }

        @media (max-width: 480px) {
            .cards-grid { grid-template-columns: 1fr; gap: 6px; }
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 11px;
            background: rgba(255,255,255,0.025);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 11px 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(99,179,237,0.05) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .link-card:hover::before { opacity: 1; }

        .link-card:hover {
            border-color: var(--border-hover);
            background: rgba(99,179,237,0.06);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(99,179,237,0.1);
        }

        .card-icon {
            flex-shrink: 0;
            width: 36px; height: 36px;
            border-radius: 9px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 17px;
            transition: all 0.22s;
        }

        .link-card:hover .card-icon {
            background: rgba(99,179,237,0.12);
            border-color: rgba(99,179,237,0.25);
        }

        .card-texts { flex: 1; min-width: 0; }

        .card-title {
            font-size: 13px; font-weight: 600;
            color: var(--text-primary);
            line-height: 1.35;
            transition: color 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .link-card:hover .card-title { color: var(--accent); }

        .card-obs {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-arrow {
            flex-shrink: 0;
            font-size: 14px;
            color: var(--text-muted);
            transition: color 0.2s, transform 0.2s;
        }

        .link-card:hover .card-arrow {
            color: var(--accent);
            transform: translate(2px, -2px);
        }

        .fade-in { animation: fadeUp 0.5s ease-out both; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        footer {
            position: relative; z-index: 1;
            border-top: 1px solid var(--border);
            padding: 28px 24px;
            text-align: center;
        }

        .footer-inner { max-width: 600px; margin: 0 auto; }

        .footer-brand {
            font-family: 'Sora', sans-serif;
            font-size: 11px; font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.06em;
            margin-bottom: 10px;
        }

        .footer-names {
            display: flex; flex-wrap: wrap;
            justify-content: center;
            gap: 6px 24px;
        }

        .footer-item { font-size: 11px; color: var(--text-muted); }
        .footer-item span { color: var(--text-secondary); font-weight: 600; }

        .footer-copy {
            margin-top: 16px;
            font-size: 9px; color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.5;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99,179,237,0.3); }
    </style>
</head>
<body>

    <header class="brand-header">
        
        <!-- MÓDULO DO USUÁRIO E LOGOUT -->
        <div style="position: absolute; top: 24px; right: 24px; z-index: 20; display: flex; align-items: center; gap: 12px;">
            <div class="text-right hidden sm:block" style="text-align: right;">
                <p id="top-user-name" class="text-[12px] font-bold text-white leading-none mb-1"></p>
                <p id="top-user-role" class="text-[9px] font-bold text-[var(--accent)] uppercase tracking-widest leading-none"></p>
            </div>
            <button onclick="fazerLogout()" class="bg-white/5 hover:bg-white/10 border border-white/10 text-white p-2.5 rounded-xl transition-all shadow-lg" title="Sair do Sistema">
                <i class="ph ph-sign-out" style="font-size: 18px;"></i>
            </button>
        </div>

        <div class="header-glow"></div>
        <div class="header-ring"></div>

        <div class="fade-in" style="animation-delay:.05s">
            <div class="logo-wrap">
                <img src="logo.png" alt="Logo Região 655" onerror="this.style.display='none'">
            </div>
        </div>

        <div class="fade-in" style="animation-delay:.12s">
            <div class="badge-regional">
                <div class="badge-dot"></div>
                Escritório Regional
            </div>
        </div>

        <h1 class="portal-title fade-in" style="animation-delay:.18s">Painel Admin</h1>
        <p class="portal-subtitle fade-in" style="animation-delay:.24s">Gestão Eclesiástica &amp; Administração — Região 655 · Londrina/PR</p>
    </header>

    <main id="main-content">
        <div style="display:flex;align-items:center;justify-content:center;height:200px;">
            <div style="text-align:center;">
                <div style="width:32px;height:32px;border:2px solid rgba(99,179,237,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;"></div>
                <p style="color:var(--text-muted);font-size:13px;">Carregando...</p>
            </div>
        </div>
    </main>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

    <footer>
        <div class="footer-inner">
            <p class="footer-brand">Região 655 — Londrina / PR</p>
            <div class="footer-names">
                <p class="footer-item">Superintendente: <span>Rev. Valdir Ávila Ramos</span></p>
                <p class="footer-item">Secretário Regional: <span>Pr. Eduardo Silva</span></p>
            </div>
            <p class="footer-copy">© 2026 · Todos os direitos reservados</p>
        </div>
    </footer>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const DEFAULT_LAYOUT = [
            {
                id: 'g-master', nome: 'Segurança & Acessos', ordem: 0,
                itens: [
                    { id: 'i-usuarios', tipo: 'sistema', titulo: 'Gestão de Usuários', obs: 'Controle de níveis e permissões', url: 'gestao_usuarios.html', icone: '🔐', perm: 'admin', visivel: true, ordem: 0 },
                    { id: 'i-layout', tipo: 'sistema', titulo: 'Gerenciar Layout', obs: 'Organizar grupos e links do painel', url: 'gerenciar_layout.html', icone: '🎛️', perm: 'admin', visivel: true, ordem: 1 },
                    { id: 'i-configpastores', tipo: 'sistema', titulo: 'Config. Pastores', obs: 'Avisos e configurações do painel', url: 'editpagpastores.html', icone: '📢', perm: 'admin', visivel: true, ordem: 2 },
                    { id: 'i-painelpastor', tipo: 'externo', titulo: 'Ver Painel (Teste)', obs: 'Visualizar a tela do pastor', url: 'painel_pastor.html', icone: '👀', perm: 'admin', visivel: true, ordem: 3 }
                ]
            },
            {
                id: 'g-cadastros', nome: 'Cadastros', ordem: 1,
                itens: [
                    { id: 'i-pastores', tipo: 'sistema', titulo: 'Pastores', obs: 'Obreiros, Aspirantes e Ministros', url: 's_pastores.html', icone: '👨‍💼', perm: 'pastores', visivel: true, ordem: 0 },
                    { id: 'i-igrejas', tipo: 'sistema', titulo: 'Igrejas', obs: 'Unidades Locais e vinculação de Pastores', url: 's_igrejas.html', icone: '⛪', perm: 'igrejas', visivel: true, ordem: 1 },
                    { id: 'i-coord', tipo: 'sistema', titulo: 'Coordenadorias', obs: 'Coordenadores e departamentos regionais', url: 'coordenadorias.html', icone: '🏛️', perm: 'coordenadorias', visivel: true, ordem: 2 }
                ]
            },
            {
                id: 'g-financeiro', nome: 'Financeiro', ordem: 2,
                itens: [
                    { id: 'i-saldo', tipo: 'sistema', titulo: 'Saldo de Virada', obs: 'Lançador financeiro de virada de mês', url: 'saldodeviradareg655.html', icone: '💰', perm: 'saldo_virada', visivel: true, ordem: 0 },
                    { id: 'i-gersaldos', tipo: 'sistema', titulo: 'Gerenciar Saldos', obs: 'Edição e exclusão de lançamentos', url: 'gerenciar_saldos.html', icone: '⚙️', perm: 'gerenciar_saldos', visivel: true, ordem: 1 },
                    { id: 'i-recibos', tipo: 'sistema', titulo: 'Recibos', obs: 'Emissor de recibos e controle financeiro', url: 'recibosreg655.html', icone: '🧾', perm: 'recibos', visivel: true, ordem: 2 },
                    { id: 'i-gerrecibos', tipo: 'sistema', titulo: 'Gerenciar Recibos', obs: 'Edição e visualização de recibos', url: 'editarrecibos.html', icone: '📝', perm: 'gerenciar_recibos', visivel: true, ordem: 3 }
                ]
            },
            {
                id: 'g-dash', nome: 'Dashboards', ordem: 3,
                itens: [
                    { id: 'i-dashrecibos', tipo: 'sistema', titulo: 'Dash Recibos', obs: 'Dashboard analítico de arrecadações', url: 'dashreg655.html', icone: '📊', perm: 'dash_recibos', visivel: true, ordem: 0 },
                    { id: 'i-dashsaldos', tipo: 'sistema', titulo: 'Dash Saldos', obs: 'Dashboard financeiro consolidado', url: 'dashsaldo.html', icone: '📈', perm: 'dash_saldos', visivel: true, ordem: 1 }
                ]
            },
            {
                id: 'g-regional', nome: 'Regional', ordem: 4,
                itens: [
                    { id: 'i-agenda', tipo: 'sistema', titulo: 'Agenda Regional', obs: 'Cronograma de eventos CED e CND', url: 'agendareg655.html', icone: '📅', perm: 'agenda', visivel: true, ordem: 0 }
                ]
            },
            {
                id: 'g-eventos', nome: 'Eventos & Presença', ordem: 5,
                itens: [
                    { id: 'i-gestaoev', tipo: 'sistema', titulo: 'Gestão de Eventos', obs: 'Criar e gerenciar eventos ativos', url: 'eventosreg655.html', icone: '⚙️', perm: 'gestao_eventos', visivel: true, ordem: 0 },
                    { id: 'i-presenca', tipo: 'sistema', titulo: 'Lançar Presença', obs: 'Registro individual nas convocações', url: 'presencareg655.html', icone: '✅', perm: 'presenca', visivel: true, ordem: 1 },
                    { id: 'i-controle', tipo: 'sistema', titulo: 'Controle de Presenças', obs: 'Painel de acompanhamento e faltas', url: 'controleeventosreg655.html', icone: '📋', perm: 'controle_presencas', visivel: true, ordem: 2 }
                ]
            }
        ];

        const userEmail = localStorage.getItem('userEmail');
        const userName = localStorage.getItem('userName');
        let userPerms = [];
        try { userPerms = JSON.parse(localStorage.getItem('userPerms') || '[]'); } catch(e) {}

        onAuthStateChanged(auth, async (user) => {
            if (!user || user.email !== userEmail) { fazerLogout(); return; }

            document.getElementById('top-user-name').textContent = userName ? `Olá, ${userName.split(' ')[0]}` : 'Olá!';
            document.getElementById('top-user-role').textContent = userPerms.includes('admin') ? 'GESTOR MASTER' : 'ACESSO PERSONALIZADO';

            let grupos = DEFAULT_LAYOUT;
            try {
                const snap = await getDoc(doc(db, 'configuracoes', 'layout'));
                if (snap.exists() && snap.data().grupos?.length) grupos = snap.data().grupos;
            } catch(e) { console.warn('Layout do Firestore indisponível, usando padrão.', e); }

            renderMain(grupos, userPerms);
        });

        function renderMain(grupos, perms) {
            // Hierarquia de Acesso
            const hierarquia = {
                'admin': 100,
                'secretario': 90,
                'superintendente': 80,
                'pastor_titular': 70,
                'coordenador': 60,
                'obreiro': 50,
                'membro': 10
            };
            let userNivelStr = perms[0];
            // Transição: se a permissão não faz parte da nova hierarquia, força 'secretario'
            if (userNivelStr && !hierarquia[userNivelStr]) userNivelStr = 'secretario';
            if (!userNivelStr) userNivelStr = 'secretario';
            
            const userNivel = perms.includes('admin') ? 100 : hierarquia[userNivelStr];

            const has = (p) => {
                if (!p) return true;
                if (userNivel === 100) return true; // admin vê tudo
                const itemNivel = hierarquia[p] || 100; // previne vazamento se p for desconhecido
                return userNivel >= itemNivel;
            };

            const main = document.getElementById('main-content');
            main.innerHTML = '';

            const sorted = [...grupos].sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
            let delay = 0.25;

            sorted.forEach(grupo => {
                const visibleItems = [...(grupo.itens || [])]
                    .filter(it => it.visivel !== false && has(it.perm))
                    .sort((a, b) => (a.ordem || 0) - (b.ordem || 0));

                if (!visibleItems.length) return;

                const isAdmin = grupo.itens.every(it => it.perm === 'admin');

                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="section-label fade-in" style="animation-delay:${delay.toFixed(2)}s">
                        <div class="section-label-line"></div>
                        <span>${escHtml(grupo.nome)}</span>
                        <div class="section-label-line"></div>
                    </div>
                    <div class="cards-grid fade-in" style="animation-delay:${(delay + 0.04).toFixed(2)}s">
                        ${visibleItems.map(item => renderCard(item, isAdmin)).join('')}
                    </div>
                `;
                main.appendChild(section);
                delay += 0.08;
            });
        }

        function renderCard(item, adminGroup) {
            const isExterno = item.tipo === 'externo';
            const target = isExterno ? ' target="_blank" rel="noopener noreferrer"' : '';
            const borderStyle = adminGroup
                ? 'border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.05);'
                : '';
            const iconStyle = adminGroup
                ? 'color: #ef4444; border-color: rgba(239, 68, 68, 0.2); background: rgba(239, 68, 68, 0.1);'
                : '';
            const titleStyle = adminGroup ? 'color: #fca5a5;' : '';
            return `
                <a href="${escAttr(item.url || '#')}" class="link-card" style="${borderStyle}"${target}>
                    <div class="card-icon" style="${iconStyle}">${escHtml(item.icone || '🔗')}</div>
                    <div class="card-texts">
                        <div class="card-title" style="${titleStyle}">${escHtml(item.titulo)}</div>
                        <div class="card-obs">${escHtml(item.obs || '')}</div>
                    </div>
                    <i class="ph ph-arrow-up-right card-arrow"></i>
                </a>
            `;
        }

        function escHtml(s) {
            return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }
        function escAttr(s) {
            return String(s || '').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        window.fazerLogout = async () => {
            await signOut(auth);
            localStorage.clear();
            window.location.replace('login.html');
        };
    </script>
</body>
</html>
