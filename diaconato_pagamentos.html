<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamentos — Congresso do Diaconato</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.300.0"></script>
    <script type="module">
        import { requireAuth, hasAnyPermission } from './js/auth.js';
        try {
            await requireAuth();
            if (!hasAnyPermission(['admin', 'secretario', 'coordenador'])) {
                window.location.replace('index.html');
            }
        } catch (e) {}
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #334155; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .accordion-body { display: none; }
        .accordion-body.open { display: block; }
    </style>
</head>
<body>

    <header class="w-full shadow-sm bg-white border-b">
        <div class="max-w-5xl mx-auto px-4 py-1.5">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo.png" alt="Logo IEQ" class="h-8 w-auto object-contain" onerror="this.src='https://via.placeholder.com/32?text=IEQ'">
                    <div class="border-l border-gray-200 pl-2">
                        <div class="text-xs font-bold text-slate-800 leading-none">Região 655</div>
                        <div class="text-[9px] font-medium text-slate-500 uppercase leading-none mt-0.5">Londrina/PR</div>
                    </div>
                </a>
                <div class="flex items-center gap-3">
                    <a href="diaconato_inscricoes.html" class="text-[10px] font-semibold text-blue-600 hover:text-blue-700 flex items-center gap-1 uppercase tracking-wider">
                        <i data-lucide="users" class="w-3 h-3"></i> Inscrições
                    </a>
                    <a href="index.html" class="text-[10px] font-semibold text-slate-500 hover:text-blue-600 flex items-center gap-1 uppercase tracking-wider">
                        <i data-lucide="arrow-left" class="w-3 h-3"></i> Painel Admin
                    </a>
                </div>
            </div>
        </div>
        <div class="header-gradient py-3 px-4">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-sm md:text-base font-bold text-white tracking-wide uppercase">Pagamentos — Congresso do Diaconato</h1>
                    <p class="text-[10px] text-white/50 mt-0.5 uppercase tracking-wider">IEQ Região 655 · R$ 150,00 por inscrito</p>
                </div>
                <button onclick="window.location.reload()" class="p-2 text-white/70 hover:text-white hover:bg-white/10 rounded-lg transition-colors" title="Atualizar">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto py-6 px-4 space-y-4">

        <div id="loading" class="flex items-center justify-center py-20">
            <div class="flex flex-col items-center gap-3">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
                <p class="text-slate-500 text-sm font-semibold">Carregando pagamentos...</p>
            </div>
        </div>

        <div id="content" class="hidden space-y-4">

            <!-- Resumo Geral -->
            <div id="resumo-geral" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>

            <!-- Lista por Igreja -->
            <div id="lista-igrejas" class="space-y-3"></div>

        </div>
    </main>

    <!-- Modal Pagamento -->
    <div id="modal-pagamento" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
            <div class="bg-slate-800 px-5 py-4 flex justify-between items-center">
                <h2 class="text-white font-bold text-sm uppercase tracking-wide flex items-center gap-2">
                    <i data-lucide="credit-card" class="w-4 h-4"></i> Lançar Pagamento
                </h2>
                <button onclick="window.fecharModalPagamento()" class="text-slate-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form id="form-pagamento" class="p-6 space-y-4">
                <input type="hidden" id="pag-igreja-id">
                <input type="hidden" id="pag-igreja-nome">

                <div class="bg-slate-50 rounded-lg p-3 border border-slate-200">
                    <div class="text-[10px] font-bold text-slate-500 uppercase mb-1">Igreja</div>
                    <div id="pag-nome-display" class="text-sm font-bold text-slate-800"></div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Valor (R$) *</label>
                    <input type="number" id="pag-valor" required min="0.01" step="0.01" class="w-full p-2 bg-slate-50 border border-slate-200 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm font-bold text-slate-800" placeholder="0,00">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Forma de Pagamento *</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="flex items-center gap-2 p-3 bg-slate-50 border border-slate-200 rounded-lg cursor-pointer hover:border-blue-400 transition-colors">
                            <input type="radio" name="forma-pag" value="pix" required class="accent-blue-600">
                            <span class="text-sm font-semibold text-slate-700">🔵 Pix</span>
                        </label>
                        <label class="flex items-center gap-2 p-3 bg-slate-50 border border-slate-200 rounded-lg cursor-pointer hover:border-blue-400 transition-colors">
                            <input type="radio" name="forma-pag" value="dinheiro" class="accent-blue-600">
                            <span class="text-sm font-semibold text-slate-700">💵 Dinheiro</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Observação</label>
                    <input type="text" id="pag-observacao" class="w-full p-2 bg-slate-50 border border-slate-200 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm" placeholder="Opcional">
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="window.fecharModalPagamento()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-2.5 rounded uppercase text-[11px] hover:bg-slate-200 transition-colors">Cancelar</button>
                    <button type="submit" id="btn-salvar-pag" class="flex-1 bg-emerald-600 text-white font-bold py-2.5 rounded uppercase text-[11px] hover:bg-emerald-700 transition-colors shadow-md">Lançar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        window.fecharModalPagamento = () => document.getElementById('modal-pagamento').classList.add('hidden');
        window.toggleAcordeon = (id) => {
            const body = document.getElementById('acc-' + id);
            const icon = document.getElementById('acc-icon-' + id);
            const open = body.classList.toggle('open');
            if (icon) icon.style.transform = open ? 'rotate(180deg)' : '';
        };
    </script>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getCurrentEmail } from './js/auth.js';

        const VALOR_INSCRICAO = 150;
        let inscritosPorIgreja = {};
        let pagamentosPorIgreja = {};

        if (window.lucide) lucide.createIcons();

        function fmt(v) {
            return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function fmtTs(ts) {
            if (!ts) return '—';
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        async function carregar() {
            try {
                const [inscSnap, pagSnap] = await Promise.all([
                    getDocs(collection(db, 'diaconato_inscritos')),
                    getDocs(collection(db, 'diaconato_pagamentos'))
                ]);

                inscritosPorIgreja = {};
                inscSnap.forEach(d => {
                    const data = d.data();
                    const k = data.igrejaNome || '(sem igreja)';
                    if (!inscritosPorIgreja[k]) inscritosPorIgreja[k] = { igrejaId: data.igrejaId || '', inscritos: [] };
                    inscritosPorIgreja[k].inscritos.push({ id: d.id, ...data });
                });

                pagamentosPorIgreja = {};
                pagSnap.forEach(d => {
                    const data = { id: d.id, ...d.data() };
                    const k = data.igrejaNome || '(sem igreja)';
                    if (!pagamentosPorIgreja[k]) pagamentosPorIgreja[k] = [];
                    pagamentosPorIgreja[k].push(data);
                });
                Object.values(pagamentosPorIgreja).forEach(lista => {
                    lista.sort((a, b) => {
                        const ta = a.dataLancamento?.toDate ? a.dataLancamento.toDate().getTime() : 0;
                        const tb = b.dataLancamento?.toDate ? b.dataLancamento.toDate().getTime() : 0;
                        return tb - ta;
                    });
                });

                renderResumoGeral();
                renderLista();

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                lucide.createIcons();
            } catch (e) {
                console.error(e);
                document.getElementById('loading').innerHTML = '<p class="text-red-500 font-bold text-center">Erro ao carregar dados. Recarregue a página.</p>';
            }
        }

        function calcIgreja(nome) {
            const qtd = (inscritosPorIgreja[nome]?.inscritos || []).length;
            const devido = qtd * VALOR_INSCRICAO;
            const pags = pagamentosPorIgreja[nome] || [];
            const pago = pags.reduce((s, p) => s + (p.valor || 0), 0);
            const pendente = Math.max(0, devido - pago);
            let status = 'pendente';
            if (devido > 0 && pago >= devido) status = 'quitado';
            else if (pago > 0) status = 'parcial';
            return { qtd, devido, pago, pendente, status };
        }

        function renderResumoGeral() {
            const todasIgrejas = [...new Set([...Object.keys(inscritosPorIgreja), ...Object.keys(pagamentosPorIgreja)])];
            let totalInscritos = 0, totalDevido = 0, totalPago = 0;
            todasIgrejas.forEach(nome => {
                const c = calcIgreja(nome);
                totalInscritos += c.qtd;
                totalDevido += c.devido;
                totalPago += c.pago;
            });
            const totalPendente = Math.max(0, totalDevido - totalPago);

            document.getElementById('resumo-geral').innerHTML = `
                <div class="bg-white rounded-lg border border-slate-200 shadow-sm p-4 text-center">
                    <div class="text-2xl font-black text-blue-600">${totalInscritos}</div>
                    <div class="text-[10px] font-bold text-slate-500 uppercase mt-1 tracking-wider">Total Inscritos</div>
                </div>
                <div class="bg-white rounded-lg border border-slate-200 shadow-sm p-4 text-center">
                    <div class="text-lg font-black text-slate-700">${fmt(totalDevido)}</div>
                    <div class="text-[10px] font-bold text-slate-500 uppercase mt-1 tracking-wider">Valor Total</div>
                </div>
                <div class="bg-white rounded-lg border border-slate-200 shadow-sm p-4 text-center">
                    <div class="text-lg font-black text-emerald-600">${fmt(totalPago)}</div>
                    <div class="text-[10px] font-bold text-slate-500 uppercase mt-1 tracking-wider">Total Pago</div>
                </div>
                <div class="bg-white rounded-lg border border-slate-200 shadow-sm p-4 text-center">
                    <div class="text-lg font-black text-red-500">${fmt(totalPendente)}</div>
                    <div class="text-[10px] font-bold text-slate-500 uppercase mt-1 tracking-wider">Total Pendente</div>
                </div>
            `;
        }

        function statusBadge(status) {
            if (status === 'quitado') return '<span class="px-2 py-1 bg-emerald-100 text-emerald-700 rounded text-[10px] font-bold uppercase tracking-wider">✓ Quitado</span>';
            if (status === 'parcial') return '<span class="px-2 py-1 bg-amber-100 text-amber-700 rounded text-[10px] font-bold uppercase tracking-wider">◑ Parcial</span>';
            return '<span class="px-2 py-1 bg-red-100 text-red-600 rounded text-[10px] font-bold uppercase tracking-wider">✕ Pendente</span>';
        }

        function renderLista() {
            const todasIgrejas = [...new Set([...Object.keys(inscritosPorIgreja), ...Object.keys(pagamentosPorIgreja)])]
                .sort((a, b) => a.localeCompare(b, 'pt-BR'));

            if (todasIgrejas.length === 0) {
                document.getElementById('lista-igrejas').innerHTML = '<div class="bg-white rounded-lg border border-slate-200 p-10 text-center text-slate-400 text-sm">Nenhuma inscrição registrada ainda.</div>';
                return;
            }

            const container = document.getElementById('lista-igrejas');
            container.innerHTML = todasIgrejas.map(nome => {
                const c = calcIgreja(nome);
                const igrejaId = inscritosPorIgreja[nome]?.igrejaId || '';
                const pags = pagamentosPorIgreja[nome] || [];
                const accId = encodeURIComponent(nome).replace(/%/g, '_');

                const historico = pags.length === 0
                    ? '<p class="text-slate-400 text-xs italic py-2 text-center">Nenhum pagamento registrado.</p>'
                    : pags.map(p => {
                        const formaBadge = p.formaPagamento === 'pix'
                            ? '<span class="px-1.5 py-0.5 bg-blue-100 text-blue-700 rounded text-[9px] font-bold">PIX</span>'
                            : '<span class="px-1.5 py-0.5 bg-slate-100 text-slate-600 rounded text-[9px] font-bold">DINHEIRO</span>';
                        return `
                        <div class="flex items-center justify-between py-2 border-b border-slate-100 last:border-0">
                            <div>
                                <div class="flex items-center gap-2">
                                    <span class="text-sm font-bold text-emerald-600">${fmt(p.valor)}</span>
                                    ${formaBadge}
                                </div>
                                <div class="text-[10px] text-slate-400 mt-0.5">${fmtTs(p.dataLancamento)} · ${p.lancadoPor || '—'}</div>
                                ${p.observacao ? `<div class="text-[10px] text-slate-500 italic mt-0.5">${p.observacao}</div>` : ''}
                            </div>
                        </div>`;
                    }).join('');

                return `
                <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                    <!-- Cabeçalho da Igreja -->
                    <div class="flex items-center justify-between px-5 py-4">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-3 flex-wrap">
                                <span class="font-bold text-slate-800">${nome}</span>
                                ${statusBadge(c.status)}
                            </div>
                            <div class="flex items-center gap-4 mt-2 flex-wrap">
                                <span class="text-[11px] text-slate-500"><span class="font-bold text-slate-700">${c.qtd}</span> inscrito${c.qtd !== 1 ? 's' : ''}</span>
                                <span class="text-[11px] text-slate-500">Devido: <span class="font-bold text-slate-700">${fmt(c.devido)}</span></span>
                                <span class="text-[11px] text-slate-500">Pago: <span class="font-bold text-emerald-600">${fmt(c.pago)}</span></span>
                                ${c.pendente > 0 ? `<span class="text-[11px] text-slate-500">Pendente: <span class="font-bold text-red-500">${fmt(c.pendente)}</span></span>` : ''}
                            </div>
                        </div>
                        <div class="flex items-center gap-2 ml-4 flex-shrink-0">
                            <button onclick="window.abrirModalPagamento('${igrejaId}', '${nome.replace(/'/g, "\\'")}')"
                                class="bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] font-bold px-3 py-1.5 rounded flex items-center gap-1 transition-colors uppercase shadow-sm">
                                <i data-lucide="plus" class="w-3 h-3"></i> Lançar
                            </button>
                            <button onclick="window.toggleAcordeon('${accId}')"
                                class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded transition-colors" title="Histórico">
                                <i data-lucide="chevron-down" class="w-4 h-4 transition-transform" id="acc-icon-${accId}"></i>
                            </button>
                        </div>
                    </div>
                    <!-- Accordion: Histórico de Pagamentos -->
                    <div id="acc-${accId}" class="accordion-body border-t border-slate-100 bg-slate-50">
                        <div class="px-5 py-3">
                            <div class="text-[10px] font-bold text-slate-500 uppercase mb-2 tracking-wider">Histórico de Pagamentos</div>
                            ${historico}
                        </div>
                    </div>
                </div>`;
            }).join('');

            lucide.createIcons();
        }

        window.abrirModalPagamento = (igrejaId, igrejaNome) => {
            document.getElementById('form-pagamento').reset();
            document.getElementById('pag-igreja-id').value = igrejaId;
            document.getElementById('pag-igreja-nome').value = igrejaNome;
            document.getElementById('pag-nome-display').textContent = igrejaNome;
            document.getElementById('modal-pagamento').classList.remove('hidden');
            lucide.createIcons();
        };

        document.getElementById('form-pagamento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-salvar-pag');
            btn.textContent = 'Salvando...';
            btn.disabled = true;

            const forma = document.querySelector('input[name="forma-pag"]:checked')?.value;
            if (!forma) {
                alert('Selecione a forma de pagamento.');
                btn.textContent = 'Lançar';
                btn.disabled = false;
                return;
            }

            const payload = {
                igrejaId: document.getElementById('pag-igreja-id').value,
                igrejaNome: document.getElementById('pag-igreja-nome').value,
                valor: parseFloat(document.getElementById('pag-valor').value),
                formaPagamento: forma,
                observacao: document.getElementById('pag-observacao').value.trim(),
                dataLancamento: serverTimestamp(),
                lancadoPor: getCurrentEmail()
            };

            try {
                await addDoc(collection(db, 'diaconato_pagamentos'), payload);
                window.fecharModalPagamento();
                await carregar();
            } catch (err) {
                alert('Erro ao lançar pagamento. Tente novamente.');
                console.error(err);
            } finally {
                btn.textContent = 'Lançar';
                btn.disabled = false;
            }
        });

        await carregar();
    </script>
</body>
</html>
