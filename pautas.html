<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pautas da Reunião - Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.300.0"></script>
    <script type="module">
        import { requireAuth, hasAnyPermission } from './js/auth.js';
        try {
            await requireAuth();
            if (!hasAnyPermission(['admin', 'secretario', 'superintendente'])) {
                window.location.replace('index.html');
            }
        } catch (e) {}
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @media print {
            body { background: white !important; margin: 0; padding: 0; }
            @page { size: A4; margin: 15mm; }
            .print-hide { display: none !important; }
            .print-only { display: block !important; }
            #print-container {
                display: block !important;
                width: 100% !important;
                max-width: none !important;
                margin: 0 !important;
                padding: 0 !important;
                font-size: 13pt !important;
                line-height: 1.6 !important;
                color: #000 !important;
            }
            #print-container * {
                font-size: inherit !important;
                line-height: inherit !important;
                color: #000 !important;
            }
            #print-container h1, #print-container h2, #print-container h3,
            #print-container h4, #print-container h5, #print-container h6 {
                font-size: 14pt !important;
                font-weight: 700 !important;
                margin: 12pt 0 6pt 0 !important;
                color: #000 !important;
            }
            #print-container p, #print-container li, #print-container td, #print-container th {
                font-size: 12pt !important;
            }
            #print-container small, #print-container .small {
                font-size: 10pt !important;
            }
        }
    </style>
</head>
<body class="pb-10">

    <!-- Header -->
    <header class="w-full shadow-sm bg-white border-b print-hide sticky top-0 z-30">
        <div class="max-w-6xl mx-auto px-4 py-1.5">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo.png" alt="Logo IEQ" class="h-8 w-auto object-contain">
                    <div class="border-l border-gray-200 pl-2">
                        <div class="text-xs font-bold text-slate-800 leading-none">Região 655</div>
                        <div class="text-[9px] font-medium text-slate-500 uppercase leading-none mt-0.5">Londrina/PR</div>
                    </div>
                </a>
                <a href="index.html" class="text-[10px] font-semibold text-slate-500 hover:text-blue-600 flex items-center gap-1 uppercase tracking-wider">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Painel Admin
                </a>
            </div>
        </div>
        <div class="header-gradient py-3 px-4">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <h1 class="text-sm md:text-base font-bold text-white tracking-wide uppercase flex items-center gap-2">
                    <i data-lucide="clipboard-list" class="w-5 h-5"></i> Pautas das Reuniões
                </h1>
                <div class="flex items-center gap-2">
                    <button onclick="window.mudarAba('lista')" id="tab-btn-lista" class="px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all bg-white/20 text-white">Lista</button>
                    <button onclick="window.mudarAba('criar')" id="tab-btn-criar" class="px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all bg-transparent text-white/70 hover:bg-white/10">Nova Pauta</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Print Header -->
    <div id="print-header" class="print-only hidden print:block w-full bg-white text-black px-0 py-4 mb-4">
        <div class="flex justify-between items-center border-b-2 border-gray-800 pb-3">
            <div class="flex items-center gap-4">
                <img src="logo.png" alt="Logo IEQ" class="h-12 object-contain">
                <div>
                    <h1 id="print-titulo" class="text-lg font-black uppercase tracking-widest text-gray-900 leading-tight"></h1>
                    <p id="print-data" class="text-sm font-bold text-gray-600 mt-0.5"></p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-sm font-bold text-gray-800">Região 655</p>
                <p class="text-xs text-gray-500">Londrina/PR</p>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4 md:p-6 space-y-4">

        <!-- ── TAB LISTA ─────────────────────────────────────────────── -->
        <div id="tab-lista">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 border-b border-slate-100 flex items-center justify-between">
                    <h2 class="text-xs font-black uppercase tracking-widest text-slate-600 flex items-center gap-2">
                        <i data-lucide="list" class="w-4 h-4 text-blue-500"></i> Pautas Cadastradas
                    </h2>
                    <button onclick="window.mudarAba('criar')" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition-colors uppercase shadow-sm">
                        <i data-lucide="plus" class="w-3 h-3"></i> Nova
                    </button>
                </div>
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left whitespace-nowrap">
                        <thead>
                            <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 bg-slate-50">
                                <th class="px-4 py-3">Título</th>
                                <th class="px-4 py-3 text-center">Data da Reunião</th>
                                <th class="px-4 py-3 text-center">Criada em</th>
                                <th class="px-4 py-3 text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-pautas" class="text-sm divide-y divide-slate-50">
                            <tr><td colspan="4" class="text-center py-10 text-slate-400 text-xs font-bold uppercase tracking-wider">Carregando pautas...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ── TAB CRIAR ─────────────────────────────────────────────── -->
        <div id="tab-criar" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4">
                <h2 class="text-xs font-black uppercase tracking-widest text-slate-600 flex items-center gap-2">
                    <i data-lucide="file-plus" class="w-4 h-4 text-emerald-500"></i> Nova Pauta
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Título da Pauta</label>
                        <input id="inputTitulo" type="text" placeholder="Ex: Reunião de Pastores — Maio 2026" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold text-slate-700">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Data da Reunião</label>
                        <input id="inputData" type="date" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold text-slate-700">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Conteúdo HTML da Pauta</label>
                    <textarea id="inputHtml" rows="18" placeholder="Cole aqui o HTML da pauta..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-mono text-slate-700 custom-scrollbar"></textarea>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="window.salvarPauta()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 px-6 rounded-lg text-xs uppercase tracking-wider transition-colors shadow-sm flex items-center gap-2">
                        <i data-lucide="check" class="w-3.5 h-3.5"></i> Salvar Pauta
                    </button>
                    <p id="msg-criar" class="text-xs text-slate-400 hidden"></p>
                </div>
            </div>
        </div>

        <!-- ── MODAL VISUALIZAR ──────────────────────────────────────── -->
        <div id="modal-visualizar" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 bg-slate-900/60 backdrop-blur-sm print:hidden" onclick="if(event.target===this)window.fecharVisualizar()">
            <div class="bg-white w-full sm:max-w-3xl rounded-t-3xl sm:rounded-2xl shadow-2xl flex flex-col max-h-[92vh] sm:max-h-[85vh]">
                <div class="px-5 pt-5 pb-4 border-b border-slate-100 flex-shrink-0 flex items-center justify-between">
                    <div class="min-w-0">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Visualizar Pauta</p>
                        <h2 id="modal-titulo" class="text-base font-black text-slate-900 leading-tight truncate"></h2>
                        <p id="modal-data" class="text-xs text-slate-500 font-medium mt-0.5"></p>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <button onclick="window.imprimirPauta()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition-colors uppercase shadow-sm">
                            <i data-lucide="printer" class="w-3.5 h-3.5"></i> Imprimir
                        </button>
                        <button onclick="window.fecharVisualizar()" class="text-slate-400 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-full w-8 h-8 flex items-center justify-center transition-colors">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <div id="modal-conteudo" class="overflow-y-auto custom-scrollbar flex-1 px-5 py-4">
                </div>
            </div>
        </div>

    </main>

    <!-- Área de impressão oculta -->
    <div id="print-container" class="hidden print-only print:block" style="display:none;"></div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, addDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        let allPautas = [];
        let pautaSelecionada = null;
        let abaAtiva = 'lista';

        window.mudarAba = (aba) => {
            abaAtiva = aba;
            document.getElementById('tab-lista').classList.toggle('hidden', aba !== 'lista');
            document.getElementById('tab-criar').classList.toggle('hidden', aba !== 'criar');
            document.getElementById('tab-btn-lista').className = (aba === 'lista' ? 'bg-white/20 text-white' : 'bg-transparent text-white/70 hover:bg-white/10') + ' px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all';
            document.getElementById('tab-btn-criar').className = (aba === 'criar' ? 'bg-white/20 text-white' : 'bg-transparent text-white/70 hover:bg-white/10') + ' px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all';
            if (aba === 'lista') carregarPautas();
            if (window.lucide) lucide.createIcons();
        };

        async function carregarPautas() {
            const tbody = document.getElementById('tabela-pautas');
            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-blue-500 text-xs font-bold uppercase tracking-wider"><div class="animate-spin inline-block w-5 h-5 border-2 border-blue-600 border-t-transparent rounded-full mr-2 align-middle"></div> Buscando pautas...</td></tr>';

            try {
                const snap = await getDocs(query(collection(db, "pautas"), orderBy("criadoEm", "desc")));
                allPautas = [];
                snap.forEach(d => allPautas.push({ id: d.id, ...d.data() }));
                renderLista();
            } catch (e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-red-500 text-xs font-bold uppercase">Erro ao carregar pautas.</td></tr>';
            }
        }

        function renderLista() {
            const tbody = document.getElementById('tabela-pautas');
            tbody.innerHTML = '';

            if (allPautas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-slate-400 text-xs font-bold uppercase tracking-wider">Nenhuma pauta cadastrada.</td></tr>';
                return;
            }

            allPautas.forEach(p => {
                const dataFmt = p.data ? p.data.split('-').reverse().join('/') : '—';
                const criadoEm = p.criadoEm ? new Date(p.criadoEm.seconds * 1000).toLocaleDateString('pt-BR') : '—';
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-4 py-3">
                            <div class="text-xs font-bold text-slate-800">${p.titulo || 'Sem título'}</div>
                        </td>
                        <td class="px-4 py-3 text-center text-xs font-semibold text-blue-600">${dataFmt}</td>
                        <td class="px-4 py-3 text-center text-xs text-slate-500">${criadoEm}</td>
                        <td class="px-4 py-3 text-center">
                            <div class="flex items-center justify-center gap-1">
                                <button onclick="window.visualizarPauta('${p.id}')" class="bg-slate-100 hover:bg-blue-50 text-slate-500 hover:text-blue-600 p-1.5 rounded-lg transition-colors" title="Visualizar">
                                    <i data-lucide="eye" class="w-4 h-4"></i>
                                </button>
                                <button onclick="window.excluirPauta('${p.id}')" class="bg-slate-100 hover:bg-red-50 text-slate-500 hover:text-red-600 p-1.5 rounded-lg transition-colors" title="Excluir">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            });
            if (window.lucide) lucide.createIcons();
        }

        window.salvarPauta = async () => {
            const titulo = document.getElementById('inputTitulo').value.trim();
            const data = document.getElementById('inputData').value;
            const html = document.getElementById('inputHtml').value.trim();
            const msg = document.getElementById('msg-criar');

            if (!titulo || !data || !html) {
                msg.textContent = 'Preencha todos os campos.';
                msg.className = 'text-xs text-red-500';
                msg.classList.remove('hidden');
                return;
            }

            msg.textContent = 'Salvando...';
            msg.className = 'text-xs text-blue-500';
            msg.classList.remove('hidden');

            try {
                await addDoc(collection(db, "pautas"), {
                    titulo,
                    data,
                    html,
                    criadoPor: localStorage.getItem('userEmail') || '',
                    criadoEm: new Date()
                });
                document.getElementById('inputTitulo').value = '';
                document.getElementById('inputData').value = '';
                document.getElementById('inputHtml').value = '';
                msg.textContent = 'Pauta salva com sucesso!';
                msg.className = 'text-xs text-emerald-600';
                setTimeout(() => msg.classList.add('hidden'), 2000);
                window.mudarAba('lista');
            } catch (e) {
                console.error(e);
                msg.textContent = 'Erro ao salvar: ' + e.message;
                msg.className = 'text-xs text-red-500';
            }
        };

        window.visualizarPauta = (id) => {
            pautaSelecionada = allPautas.find(p => p.id === id);
            if (!pautaSelecionada) return;

            document.getElementById('modal-titulo').textContent = pautaSelecionada.titulo;
            const dataFmt = pautaSelecionada.data ? pautaSelecionada.data.split('-').reverse().join('/') : '—';
            document.getElementById('modal-data').textContent = 'Data da reunião: ' + dataFmt;
            document.getElementById('modal-conteudo').innerHTML = pautaSelecionada.html;
            document.getElementById('modal-visualizar').classList.remove('hidden');
            if (window.lucide) lucide.createIcons();
        };

        window.fecharVisualizar = () => {
            document.getElementById('modal-visualizar').classList.add('hidden');
            pautaSelecionada = null;
        };

        window.imprimirPauta = () => {
            if (!pautaSelecionada) return;

            const printContainer = document.getElementById('print-container');
            const printHeader = document.getElementById('print-header');
            const dataFmt = pautaSelecionada.data ? pautaSelecionada.data.split('-').reverse().join('/') : '—';

            document.getElementById('print-titulo').textContent = pautaSelecionada.titulo;
            document.getElementById('print-data').textContent = 'Data da reunião: ' + dataFmt;

            printHeader.classList.remove('hidden');
            printContainer.innerHTML = pautaSelecionada.html;
            printContainer.style.display = 'block';

            setTimeout(() => {
                window.print();
                setTimeout(() => {
                    printContainer.style.display = 'none';
                    printContainer.innerHTML = '';
                    printHeader.classList.add('hidden');
                }, 500);
            }, 200);
        };

        window.excluirPauta = async (id) => {
            if (!confirm('Tem certeza que deseja excluir esta pauta? As anotações dos pastores também serão removidas.')) return;

            try {
                // Exclui anotações vinculadas
                const anotSnap = await getDocs(collection(db, "anotacoes_pautas"));
                const batch = [];
                anotSnap.forEach(d => {
                    if (d.data().pautaId === id) batch.push(deleteDoc(doc(db, "anotacoes_pautas", d.id)));
                });
                await Promise.all(batch);
                await deleteDoc(doc(db, "pautas", id));
                allPautas = allPautas.filter(p => p.id !== id);
                renderLista();
            } catch (e) {
                console.error(e);
                alert('Erro ao excluir: ' + e.message);
            }
        };

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && pautaSelecionada) window.fecharVisualizar();
        });

        carregarPautas();
        if (window.lucide) lucide.createIcons();
    </script>
</body>
</html>
