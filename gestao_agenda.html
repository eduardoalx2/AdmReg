<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão da Agenda Regional - Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        let perms = [];
        try { perms = JSON.parse(localStorage.getItem('userPerms') || '[]'); } catch(e) {}
        // Requer permissão de 'admin' ou 'agenda'
        if (!perms.includes('admin') && !perms.includes('agenda')) {
            window.location.replace('index.html');
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            color: #334155;
        }
        .header-gradient {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .table-custom {
            font-size: 0.8rem;
        }
        .table-custom th {
            padding: 10px 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }
        .table-custom td {
            padding: 10px 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- CABEÇALHO COMPACTO -->
    <header class="w-full shadow-sm bg-white border-b">
        <div class="max-w-6xl mx-auto px-4 py-1.5">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo.png" alt="Logo IEQ" class="h-8 w-auto object-contain" onerror="this.src='https://via.placeholder.com/32?text=IEQ'">
                    <div class="border-l border-gray-200 pl-2">
                        <div class="text-xs font-bold text-slate-800 leading-none">Região 655</div>
                        <div class="text-[9px] font-medium text-slate-500 uppercase leading-none mt-0.5">Londrina/PR</div>
                    </div>
                </a>
                <a href="index.html" class="text-[10px] font-semibold text-slate-500 hover:text-blue-600 flex items-center gap-1 uppercase tracking-wider">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Painel Admin
                </a>
            </div>
        </div>

        <div class="header-gradient py-3 px-4">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <h1 class="text-sm md:text-base font-bold text-white tracking-wide uppercase flex items-center gap-2">
                    <i data-lucide="calendar-days" class="w-5 h-5"></i> Gestão da Agenda Regional
                </h1>
                <button onclick="window.abrirModal()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] md:text-xs font-bold px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors uppercase shadow-md">
                    <i data-lucide="plus" class="w-4 h-4"></i> Novo Evento
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto py-6 px-4 space-y-4">
        
        <!-- FILTROS -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Buscar por Nome</label>
                    <input type="text" id="filtro-nome" oninput="window.renderizarTabela()" placeholder="Nome do evento..." class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-1 focus:ring-blue-500 outline-none text-sm font-semibold text-slate-700 uppercase">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Mês do Evento</label>
                    <input type="month" id="filtro-mes" onchange="window.renderizarTabela()" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-1 focus:ring-blue-500 outline-none text-sm font-semibold text-slate-700 uppercase">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Tipo de Evento</label>
                    <select id="filtro-tipo" onchange="window.renderizarTabela()" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-1 focus:ring-blue-500 outline-none text-sm font-semibold text-slate-700 uppercase">
                        <option value="">Todos</option>
                        <option value="REGIONAL">Regional</option>
                        <option value="CED">CED</option>
                        <option value="CND">CND</option>
                        <option value="LOCAL">Local</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="window.limparFiltros()" class="w-full text-[11px] font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 hover:text-slate-700 py-2.5 rounded-lg transition-colors uppercase tracking-wider">
                        Limpar Filtros
                    </button>
                </div>
            </div>
        </div>
        
        <!-- ABAS -->
        <div class="flex gap-6 border-b border-slate-200 mb-2 overflow-x-auto custom-scrollbar px-1">
            <button onclick="window.setTab('upcoming')" id="tab-upcoming" class="tab-active py-3 text-[11px] font-bold tracking-widest uppercase whitespace-nowrap transition-all">Próximos</button>
            <button onclick="window.setTab('past')" id="tab-past" class="py-3 text-[11px] font-bold text-slate-400 tracking-widest uppercase whitespace-nowrap transition-all">Anteriores</button>
            <button onclick="window.setTab('all')" id="tab-all" class="py-3 text-[11px] font-bold text-slate-400 tracking-widest uppercase whitespace-nowrap transition-all">Todos</button>
        </div>

        <!-- TABELA DE EVENTOS -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse table-custom whitespace-nowrap min-w-[700px]">
                    <thead>
                        <tr class="bg-slate-50 text-slate-600 border-b border-slate-200">
                            <th>Data / Hora</th>
                            <th>Evento / Ministério</th>
                            <th>Tipo</th>
                            <th>Local</th>
                            <th class="w-16 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-agenda" class="divide-y divide-slate-100">
                        <tr><td colspan="5" class="text-center py-10 text-slate-400 font-medium">Carregando dados do Firebase...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="py-4 text-center text-slate-400 text-[10px]">
        &copy; 2026 Região 655 - IEQ Londrina/PR
    </footer>

    <!-- MODAL DE CADASTRO/EDIÇÃO -->
    <div id="modal-agenda" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[95vh]">
            <div class="bg-slate-800 px-5 py-4 flex justify-between items-center shrink-0">
                <h2 id="modal-titulo" class="text-white font-bold text-sm uppercase tracking-wide flex items-center gap-2">
                    <i data-lucide="calendar-plus" class="w-4 h-4"></i> Novo Evento na Agenda
                </h2>
                <button type="button" onclick="window.fecharModal()" class="text-slate-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <form id="form-agenda" class="p-6 space-y-4 overflow-y-auto custom-scrollbar">
                <input type="hidden" id="agenda-id">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nome do Evento <span class="text-red-500">*</span></label>
                        <input type="text" id="agenda-evento" required class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-1 focus:ring-blue-500 outline-none text-sm font-bold text-slate-800 uppercase" placeholder="Ex: CONVENÇÃO ESTADUAL">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Data <span class="text-red-500">*</span></label>
                        <input type="date" id="agenda-data" required class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-1 focus:ring-blue-500 outline-none text-sm font-semibold">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Horário</label>
                            <input type="time" id="agenda-horario" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-1 focus:ring-blue-500 outline-none text-sm font-semibold">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1" title="Duração estimada em horas">Duração (h)</label>
                            <input type="number" id="agenda-duracao" step="0.5" value="2" min="0.5" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-1 focus:ring-blue-500 outline-none text-sm font-semibold">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Tipo / Esfera <span class="text-red-500">*</span></label>
                        <select id="agenda-tipo" required class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-1 focus:ring-blue-500 outline-none text-sm font-bold uppercase">
                            <option value="REGIONAL">REGIONAL</option>
                            <option value="CED">CED</option>
                            <option value="CND">CND</option>
                            <option value="LOCAL">LOCAL</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Ministério / Coordenadoria</label>
                        <input type="text" id="agenda-ministerio" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-1 focus:ring-blue-500 outline-none text-sm font-semibold uppercase" placeholder="Ex: JOVENS, HOMENS">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Local / Endereço</label>
                        <input type="text" id="agenda-local" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-1 focus:ring-blue-500 outline-none text-sm font-semibold uppercase" placeholder="Ex: IEQ SEDE - LONDRINA">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Link de Inscrição / Mais Informações</label>
                        <input type="url" id="agenda-link" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-1 focus:ring-blue-500 outline-none text-sm text-blue-600" placeholder="https://...">
                    </div>
                </div>

                <div class="pt-6 border-t border-slate-100 flex gap-3">
                    <button type="button" onclick="window.fecharModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl uppercase text-[11px] hover:bg-slate-200 transition-colors tracking-widest">Cancelar</button>
                    <button type="submit" id="btn-salvar" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl uppercase text-[11px] hover:bg-blue-700 transition-colors shadow-lg tracking-widest flex justify-center items-center gap-2">Salvar Evento</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        let agendaList = [];
        let currentTab = 'upcoming';
        
        if (window.lucide) lucide.createIcons();

        const tabela = document.getElementById('tabela-agenda');
        const form = document.getElementById('form-agenda');

        async function carregarAgenda() {
            try {
                const q = query(collection(db, "agenda"));
                const querySnapshot = await getDocs(q);
                agendaList = [];
                
                querySnapshot.forEach((doc) => {
                    agendaList.push({ id: doc.id, ...doc.data() });
                });
                
                window.renderizarTabela();
            } catch (error) {
                console.error("Erro ao carregar agenda:", error);
                tabela.innerHTML = '<tr><td colspan="5" class="text-center py-6 text-red-500 font-bold">Erro ao carregar dados do servidor.</td></tr>';
            }
        }

        window.setTab = (tab) => {
            currentTab = tab;
            ['tab-upcoming', 'tab-past', 'tab-all'].forEach(id => {
                document.getElementById(id).className = 'py-3 text-[11px] font-bold text-slate-400 tracking-widest uppercase whitespace-nowrap transition-all';
            });
            document.getElementById('tab-' + tab).className = 'tab-active py-3 text-[11px] font-bold tracking-widest uppercase whitespace-nowrap transition-all';
            window.renderizarTabela();
        };

        window.limparFiltros = () => {
            document.getElementById('filtro-nome').value = '';
            document.getElementById('filtro-mes').value = '';
            document.getElementById('filtro-tipo').value = '';
            window.renderizarTabela();
        }

        window.renderizarTabela = () => {
            const filtroNome = document.getElementById('filtro-nome').value.toUpperCase();
            const filtroMes = document.getElementById('filtro-mes').value; // Formato YYYY-MM
            const filtroTipo = document.getElementById('filtro-tipo').value.toUpperCase();
            const today = new Date().toISOString().split('T')[0];

            const filtrados = agendaList.filter(e => {
                if (filtroNome && !(e.evento || '').toUpperCase().includes(filtroNome)) return false;
                if (filtroMes && !(e.data || '').startsWith(filtroMes)) return false;
                if (filtroTipo && (e.tipo || '').toUpperCase() !== filtroTipo) return false;
                
                const isPast = (e.data || '') < today;
                if (currentTab === 'upcoming' && isPast) return false;
                if (currentTab === 'past' && !isPast) return false;
                
                return true;
            });

            // Ordenação: Eventos passados = mais recentes primeiro. Futuros/Todos = mais próximos primeiro.
            filtrados.sort((a, b) => {
                const dataA = a.data || '';
                const dataB = b.data || '';
                return currentTab === 'past' ? dataB.localeCompare(dataA) : dataA.localeCompare(dataB);
            });

            tabela.innerHTML = '';
            
            if (filtrados.length === 0) {
                tabela.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-slate-400 text-xs font-bold uppercase tracking-wider">Nenhum evento encontrado.</td></tr>';
                return;
            }

            filtrados.forEach(e => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50/40 transition-colors group";
                
                const dataFormatada = e.data ? e.data.split('-').reverse().join('/') : '-';
                
                let diaSemana = '';
                if (e.data) {
                    const [y, m, d] = e.data.split('-');
                    const dateObj = new Date(y, m - 1, d);
                    const dias = ['dom', 'seg', 'ter', 'qua', 'qui', 'sex', 'sáb'];
                    diaSemana = dias[dateObj.getDay()] + ' • ';
                }

                const tipoCor = e.tipo === 'REGIONAL' ? 'bg-blue-100 text-blue-700' : 
                                e.tipo === 'CED' ? 'bg-amber-100 text-amber-700' :
                                e.tipo === 'CND' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-600';

                tr.innerHTML = `
                    <td>
                        <div class="font-bold text-slate-800 text-sm">${dataFormatada}</div>
                        <div class="text-[10px] text-slate-500 font-medium uppercase mt-0.5">${diaSemana}${e.horario || '-'} (${e.duracao || '?'}h)</div>
                    </td>
                    <td>
                        <div class="font-bold text-slate-800 text-sm uppercase leading-tight">${e.evento}</div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase mt-1 tracking-wider">${e.ministerio || 'GERAL'}</div>
                    </td>
                    <td><span class="px-2 py-1 rounded text-[9px] font-black uppercase tracking-wider ${tipoCor}">${e.tipo || '-'}</span></td>
                    <td class="text-xs text-slate-600 font-medium truncate max-w-[200px]" title="${e.local || '-'}">${e.local || '-'}</td>
                    <td class="text-center">
                        <div class="flex items-center justify-center gap-3 opacity-100 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity">
                            <button onclick="window.editarEvento('${e.id}')" class="text-blue-500 hover:text-blue-700 transition-colors" title="Editar">
                                <i data-lucide="edit" class="w-4 h-4"></i>
                            </button>
                            <button onclick="window.excluirEvento('${e.id}')" class="text-red-400 hover:text-red-600 transition-colors" title="Excluir">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </td>
                `;
                tabela.appendChild(tr);
            });
            lucide.createIcons();
        }

        window.abrirModal = () => {
            form.reset();
            document.getElementById('agenda-id').value = '';
            document.getElementById('modal-titulo').innerHTML = '<i data-lucide="calendar-plus" class="w-4 h-4"></i> Novo Evento';
            document.getElementById('modal-agenda').classList.remove('hidden');
            if (window.lucide) window.lucide.createIcons();
        };

        window.fecharModal = () => {
            document.getElementById('modal-agenda').classList.add('hidden');
        };

        window.editarEvento = (id) => {
            const e = agendaList.find(i => i.id === id);
            if(!e) return;
            
            document.getElementById('agenda-id').value = e.id;
            document.getElementById('agenda-evento').value = e.evento;
            document.getElementById('agenda-data').value = e.data || '';
            document.getElementById('agenda-horario').value = e.horario || '';
            document.getElementById('agenda-duracao').value = e.duracao || '2';
            document.getElementById('agenda-tipo').value = e.tipo || 'REGIONAL';
            document.getElementById('agenda-ministerio').value = e.ministerio || '';
            document.getElementById('agenda-local').value = e.local || '';
            document.getElementById('agenda-link').value = e.link || '';
            
            document.getElementById('modal-titulo').innerHTML = '<i data-lucide="edit" class="w-4 h-4"></i> Editar Evento';
            document.getElementById('modal-agenda').classList.remove('hidden');
            if (window.lucide) window.lucide.createIcons();
        };

        window.excluirEvento = async (id) => {
            if(confirm("Tem certeza que deseja excluir este evento da agenda?")) {
                try {
                    await deleteDoc(doc(db, "agenda", id));
                    carregarAgenda();
                } catch(e) {
                    alert("Erro ao excluir!");
                    console.error(e);
                }
            }
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-salvar');
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Salvando...';
            btn.disabled = true;
            if (window.lucide) window.lucide.createIcons();

            try {
                const id = document.getElementById('agenda-id').value;
                const payload = {
                    evento: document.getElementById('agenda-evento').value.trim().toUpperCase(),
                    data: document.getElementById('agenda-data').value,
                    horario: document.getElementById('agenda-horario').value,
                    duracao: document.getElementById('agenda-duracao').value,
                    tipo: document.getElementById('agenda-tipo').value,
                    ministerio: document.getElementById('agenda-ministerio').value.trim().toUpperCase(),
                    local: document.getElementById('agenda-local').value.trim().toUpperCase(),
                    link: document.getElementById('agenda-link').value.trim(),
                    updatedAt: serverTimestamp()
                };

                if(id) {
                    await updateDoc(doc(db, "agenda", id), payload);
                } else {
                    payload.createdAt = serverTimestamp();
                    await addDoc(collection(db, "agenda"), payload);
                }
                window.fecharModal();
                carregarAgenda();
            } catch (error) {
                console.error("Erro ao salvar:", error);
                alert("Erro ao salvar o evento.");
            } finally {
                btn.innerHTML = 'Salvar Evento';
                btn.disabled = false;
            }
        });

        // Inicia carregando a lista
        carregarAgenda();
    </script>
</body>
</html>
