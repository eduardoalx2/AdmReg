<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Região 655 | CED | CND</title>
    <script src="https://unpkg.com/lucide@0.300.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; text-transform: uppercase; }
        .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: 700; }
        .event-card { transition: all 0.2s ease; position: relative; }
        .event-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05); }
        .local-indicator { position: absolute; top: -10px; right: 20px; background: white; border-radius: 50%; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; z-index: 10; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20 text-slate-800">

    <!-- Header Padrão -->
    <header class="w-full shadow-sm bg-white border-b">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="Logo" class="h-8 md:h-10 w-auto object-contain">
                <div class="border-l border-gray-200 pl-3">
                    <h1 class="text-sm md:text-base font-black tracking-tight leading-none uppercase text-slate-800">Agenda Regional 655</h1>
                    <p class="text-[9px] md:text-[10px] font-bold text-slate-400 tracking-widest mt-0.5 uppercase weather-date-display">Carregando...</p>
                </div>
            </div>
            <div class="flex items-center gap-2 md:gap-3">
                <a href="agendarapidareg655.html" class="hidden sm:flex text-indigo-600 hover:text-indigo-700 font-bold text-[10px] px-3 py-1.5 rounded-lg hover:bg-indigo-50 transition-colors items-center gap-1 uppercase tracking-wider border border-indigo-100">
                    <i data-lucide="zap" class="w-3.5 h-3.5"></i> Agenda Rápida
                </a>
                <a href="javascript:history.back()" class="text-[10px] font-bold text-slate-500 hover:text-blue-600 flex items-center gap-1 uppercase tracking-wider px-2 py-1.5">
                    <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Voltar
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        
        <!-- Filtros mais Clean -->
        <div class="bg-white/80 backdrop-blur-md p-5 rounded-[2rem] shadow-sm border border-slate-200 mb-8 grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 tracking-widest ml-1">Buscar</label>
                <input type="text" id="filterSearch" oninput="window.render()" placeholder="Filtrar evento..." class="w-full border border-slate-200 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none font-medium uppercase">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 tracking-widest ml-1">Mês</label>
                <select id="filterMonth" onchange="window.render()" class="w-full border border-slate-200 rounded-xl p-2.5 text-sm bg-white outline-none font-medium cursor-pointer uppercase">
                    <option value="">Todos os Meses</option>
                    <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
                    <option value="04">Abril</option><option value="05">Maio</option><option value="06">Junho</option>
                    <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
                    <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
                </select>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 tracking-widest ml-1">Ministério</label>
                <select id="filterMin" onchange="window.render()" class="w-full border border-slate-200 rounded-xl p-2.5 text-sm bg-white outline-none font-medium cursor-pointer uppercase">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 tracking-widest ml-1">Tipo</label>
                <select id="filterType" onchange="window.render()" class="w-full border border-slate-200 rounded-xl p-2.5 text-sm bg-white outline-none font-medium cursor-pointer uppercase">
                    <option value="">Todos</option>
                    <option value="REGIONAL">Regional</option>
                    <option value="CED">CED</option>
                    <option value="CND">CND</option>
                </select>
            </div>
        </div>

        <!-- Abas Slim -->
        <div class="flex gap-8 border-b border-slate-200 mb-8 overflow-x-auto scrollbar-hide px-2">
            <button onclick="window.setTab('upcoming')" id="tUpcoming" class="tab-active py-4 text-[11px] font-bold whitespace-nowrap transition-all">Próximos</button>
            <button onclick="window.setTab('all')" id="tAll" class="py-4 text-[11px] font-bold text-slate-400 whitespace-nowrap transition-all">Todos</button>
            <button onclick="window.setTab('past')" id="tPast" class="py-4 text-[11px] font-bold text-slate-400 whitespace-nowrap transition-all">Anteriores</button>
        </div>

        <!-- Lista de Eventos -->
        <div id="eventList" class="space-y-4">
            <div class="flex justify-center py-20 text-indigo-600 font-medium text-xs animate-pulse">Sincronizando...</div>
        </div>

    </main>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        let events = [];
        let currentTab = 'upcoming';
        const MONTHS = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
        const WEEKDAYS = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

        async function load() {
            try {
                const snap = await getDocs(query(collection(db, "agenda"), orderBy("data", "asc")));
                events = [];
                snap.forEach(doc => events.push({ id: doc.id, ...doc.data() }));
                populateMinistries();
                window.render();
            } catch (error) {
                console.error("Erro ao carregar dados do Firebase:", error);
                document.getElementById('eventList').innerHTML = `<div class="text-center py-16 text-red-500 font-medium text-xs">Erro ao carregar agenda.</div>`;
            }
        }

        function populateMinistries() {
            const select = document.getElementById('filterMin');
            const mins = new Set();
            events.forEach(e => {
                if(e.tipo !== 'LOCAL' && e.ministerio) {
                    e.ministerio.split(',').forEach(m => {
                        if(m.trim()) mins.add(m.trim().toUpperCase());
                    });
                }
            });
            Array.from(mins).sort().forEach(m => {
                const opt = document.createElement('option');
                opt.value = m; opt.textContent = m;
                select.appendChild(opt);
            });
        }

        window.render = () => {
            const list = document.getElementById('eventList');
            const search = document.getElementById('filterSearch').value.toLowerCase();
            const monthF = document.getElementById('filterMonth').value;
            const minF = document.getElementById('filterMin').value;
            const typeF = document.getElementById('filterType').value;
            const today = new Date().toISOString().split('T')[0];

            let filtered = events.filter(e => {
                const isPast = e.data < today;
                const isRegional = e.tipo !== 'LOCAL';
                const eNome = (e.evento || "").toLowerCase();
                const eMonth = e.data.split('-')[1];
                const eMins = (e.ministerio || "").toUpperCase();
                const eTipo = (e.tipo || "").toUpperCase();

                if (currentTab === 'upcoming' && (isPast || !isRegional)) return false;
                if (currentTab === 'all' && !isRegional) return false;
                if (currentTab === 'past' && (!isPast || !isRegional)) return false;

                if (search && !eNome.includes(search)) return false;
                if (monthF && eMonth !== monthF) return false;
                if (typeF && eTipo !== typeF) return false;
                if (minF && !eMins.includes(minF)) return false;

                return true;
            });

            filtered.sort((a,b) => currentTab === 'past' ? b.data.localeCompare(a.data) : a.data.localeCompare(b.data));

            if (filtered.length === 0) {
                list.innerHTML = `<div class="text-center py-16 text-slate-400 font-medium text-xs">Nenhum evento encontrado.</div>`;
                return;
            }

            list.innerHTML = filtered.map(e => {
                const [y, m, d] = e.data.split('-');
                const dateObj = new Date(e.data + 'T12:00:00');
                const dow = WEEKDAYS[dateObj.getDay()];
                const hasLink = e.link && e.link.trim().length > 5;
                const hasValidAddress = e.local && !e.local.toUpperCase().includes('ONLINE') && !e.local.toUpperCase().includes('DEFINIR');

                return `
                <div class="event-card bg-white rounded-[1.5rem] p-5 flex flex-col md:flex-row items-center gap-6 shadow-sm border border-slate-100">

                    <!-- Data Section -->
                    <div class="flex flex-row md:flex-col items-center justify-center md:w-20 border-b md:border-b-0 md:border-r border-slate-50 pb-3 md:pb-0 md:pr-6 text-center min-w-[80px]">
                        <span class="text-[9px] font-bold text-indigo-500 tracking-tighter mb-0.5">${dow}</span>
                        <span class="text-3xl font-bold text-slate-800 leading-none">${d}</span>
                        <span class="text-[10px] font-bold text-slate-400 mt-0.5 uppercase">${MONTHS[parseInt(m)-1]}</span>
                    </div>

                    <!-- Conteúdo Section -->
                    <div class="flex-1 text-center md:text-left">
                        <div class="flex flex-wrap justify-center md:justify-start gap-1.5 mb-1.5">
                             <span class="px-2 py-0.5 rounded-md bg-slate-100 text-slate-500 text-[8px] font-bold border border-slate-200">${e.tipo}</span>
                             ${(e.ministerio || "").split(',').map(min => min.trim() ? `<span class="px-2 py-0.5 rounded-md bg-indigo-50 text-indigo-600 text-[8px] font-bold border border-indigo-100 uppercase">${min}</span>` : '').join('')}
                        </div>
                        <h3 class="text-base md:text-lg font-semibold text-slate-800 leading-snug tracking-tight mb-2">${e.evento}</h3>
                        <div class="flex flex-wrap justify-center md:justify-start gap-x-4 gap-y-1.5 text-[10px] font-medium text-slate-400">
                            <span class="flex items-center gap-1.5"><i data-lucide="clock" class="w-3.5 h-3.5 text-indigo-300"></i> ${e.horario || 'A definir'}</span>
                            <span class="flex items-center gap-1.5"><i data-lucide="map-pin" class="w-3.5 h-3.5 text-indigo-300"></i> ${e.local || 'A definir'}</span>
                        </div>
                    </div>

                    <!-- Botões Section -->
                    <div class="flex flex-wrap justify-center gap-2 w-full md:w-auto">
                        ${hasLink ? `<a href="${e.link}" target="_blank" class="p-2.5 rounded-xl bg-slate-800 text-white text-[9px] font-bold hover:bg-black transition-all flex items-center gap-1.5"><i data-lucide="info" class="w-3.5 h-3.5"></i> Detalhes</a>` : ''}
                        ${hasValidAddress ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(e.local)}" target="_blank" class="p-2.5 rounded-xl bg-blue-500 text-white text-[9px] font-bold hover:bg-blue-600 transition-all flex items-center gap-1.5"><i data-lucide="map" class="w-3.5 h-3.5"></i> Mapa</a>` : ''}
                        <button onclick="window.shareWhatsApp('${e.evento}', '${d}/${m}/${y}', '${e.horario}', '${e.local}')" class="p-2.5 rounded-xl bg-green-500 text-white text-[9px] font-bold hover:bg-green-600 transition-all flex items-center gap-1.5"><i data-lucide="send" class="w-3.5 h-3.5"></i> Enviar</button>
                        <button onclick="window.saveCalendar('${e.evento}', '${e.data}', '${e.horario}', '${e.duracao}', '${e.local}')" class="p-2.5 rounded-xl bg-white border border-slate-200 text-slate-600 text-[9px] font-bold hover:bg-slate-50 transition-all flex items-center gap-1.5"><i data-lucide="calendar-plus" class="w-3.5 h-3.5 text-indigo-500"></i> Salvar</button>
                    </div>
                </div>
                `;
            }).join('');
            lucide.createIcons();
        };

        window.shareWhatsApp = (title, date, time, local) => {
            const msg = `*REGIÃO 655 - EVENTO*\n📌 *${title}*\n📅 DATA: ${date}\n🕒 HORA: ${time}\n📍 LOCAL: ${local}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`);
        };

        window.saveCalendar = (title, date, time, duration, local) => {
            const cleanTime = time ? time.replace(':', '') : '0000';
            const start = date.replace(/-/g, '') + 'T' + cleanTime + '00';
            const dur = parseFloat(duration) || 2;
            const hour = parseInt(cleanTime.substring(0,2)) || 0;
            const endHour = (hour + Math.floor(dur)).toString().padStart(2, '0');
            const end = date.replace(/-/g, '') + 'T' + endHour + cleanTime.substring(2) + '00';
            const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${start}/${end}&location=${encodeURIComponent(local)}`;
            window.open(url);
        };

        window.setTab = (t) => {
            currentTab = t;
            ['tUpcoming', 'tAll', 'tPast'].forEach(id => document.getElementById(id).className = 'py-4 text-[11px] font-bold text-slate-400 transition-all whitespace-nowrap');
            document.getElementById(t === 'upcoming' ? 'tUpcoming' : t === 'all' ? 'tAll' : 'tPast').className = 'tab-active py-4 text-[11px] font-bold transition-all whitespace-nowrap';
            window.render();
        };

        load(); // Inicia o carregamento
    </script>

    <script>
        window.fetchWeatherAndDate = async () => {
            const dateStr = new Date().toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: 'short' }).replace('.', '').toUpperCase();
            const els = document.querySelectorAll('.weather-date-display');
            els.forEach(el => el.textContent = `${dateStr} • CARREGANDO CLIMA...`);
            
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-23.31&longitude=-51.16&current_weather=true');
                if(!res.ok) throw new Error();
                const data = await res.json();
                const temp = Math.round(data.current_weather.temperature);
                els.forEach(el => el.textContent = `${dateStr} • ${temp}°C LONDRINA`);
            } catch (e) {
                els.forEach(el => el.textContent = dateStr);
            }
        };
        document.addEventListener('DOMContentLoaded', window.fetchWeatherAndDate);
    </script>
</body>
</html>
