<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Pautas Ministeriais — Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.300.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module">
        import { requireAuth, isAdmin } from './js/auth.js';
        try {
            await requireAuth();
            if (!isAdmin()) window.location.replace('index.html');
        } catch (error) {}
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .bloco-drag { cursor: grab; }
        .bloco-drag:active { cursor: grabbing; }
    </style>
</head>
<body class="min-h-screen text-slate-200">

    <!-- TOP BAR -->
    <div class="sticky top-0 z-40 bg-slate-900/95 backdrop-blur border-b border-slate-800 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-slate-400 hover:text-white transition-colors flex items-center gap-1.5 text-sm font-medium">
                ← Painel
            </a>
            <div>
                <h1 class="text-sm font-bold text-white">Gerenciar Pautas</h1>
                <p class="text-[10px] text-slate-500">Crie e edite as pautas das reuniões ministeriais</p>
            </div>
        </div>
        <div class="flex gap-2" id="header-actions">
            <button onclick="novaPauta()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-4 py-2 rounded-lg transition-colors flex items-center gap-1.5">
                <i data-lucide="plus" class="w-4 h-4"></i> Nova Pauta
            </button>
        </div>
    </div>

    <!-- LOADING -->
    <div id="loading" class="flex items-center justify-center h-64">
        <div class="flex flex-col items-center gap-3">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
            <p class="text-slate-500 text-sm">Carregando...</p>
        </div>
    </div>

    <!-- VIEW: LISTA DE PAUTAS -->
    <div id="view-lista" class="hidden max-w-5xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="lista-container">
            <!-- pautas aqui -->
        </div>
    </div>

    <!-- VIEW: EDITOR DE PAUTA -->
    <div id="view-editor" class="hidden max-w-4xl mx-auto px-4 py-8 pb-32">
        
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 mb-6 shadow-lg">
            <h2 class="text-white font-bold mb-4 uppercase tracking-wider text-sm flex items-center gap-2">
                <i data-lucide="settings" class="w-4 h-4 text-slate-400"></i> Configurações Gerais
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Identificador (URL)</label>
                    <input type="text" id="p-id" placeholder="ex: 2026-04" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-blue-500">
                    <p class="text-[9px] text-slate-500 mt-1">Sobe na URL: pauta.html?id=2026-04</p>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Título Principal</label>
                    <input type="text" id="p-titulo" placeholder="REUNIÃO MINISTERIAL REGIÃO 655" value="REUNIÃO MINISTERIAL REGIÃO 655" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-blue-500">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Data e Local (Subtítulo)</label>
                    <input type="text" id="p-datalocal" placeholder="07 de Março de 2026 - 14:00h | IEQ Central - Londrina/PR" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-blue-500">
                </div>
            </div>
        </div>

        <div id="secoes-container" class="space-y-6">
            <!-- Seções aqui -->
        </div>

        <button onclick="adicionarSecao()" class="mt-6 w-full py-4 border-2 border-dashed border-slate-700 hover:border-slate-500 text-slate-400 hover:text-white rounded-xl transition-colors font-bold text-sm flex items-center justify-center gap-2">
            <i data-lucide="plus-circle" class="w-5 h-5"></i> ADICIONAR SEÇÃO
        </button>

        <div class="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur border-t border-slate-800 p-4 z-50">
            <div class="max-w-4xl mx-auto flex items-center justify-between">
                <button onclick="voltarLista()" class="text-slate-400 hover:text-white text-sm font-semibold px-4 py-2">Cancelar</button>
                <div class="flex items-center gap-3">
                    <a id="btn-preview" href="#" target="_blank" class="hidden bg-slate-700 hover:bg-slate-600 text-white text-sm font-bold px-4 py-2 rounded-lg transition-colors flex items-center gap-2">
                        <i data-lucide="external-link" class="w-4 h-4"></i> Ver Pauta
                    </a>
                    <button onclick="salvarPauta()" id="btn-salvar-pauta" class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold px-6 py-2 rounded-lg transition-colors flex items-center gap-2">
                        <i data-lucide="save" class="w-4 h-4"></i> Salvar Pauta
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- TEMPLATES -->
    <template id="tpl-secao">
        <div class="secao-wrapper bg-slate-800/50 border border-slate-700 rounded-xl overflow-hidden shadow-sm" data-id="">
            <div class="bg-slate-800 border-b border-slate-700 px-4 py-3 flex items-center justify-between gap-4">
                <div class="flex-1 flex items-center gap-2">
                    <i data-lucide="grip-vertical" class="w-5 h-5 text-slate-500 cursor-move"></i>
                    <input type="text" class="secao-titulo w-full bg-transparent border-none outline-none text-white font-bold uppercase" placeholder="TÍTULO DA SEÇÃO (ex: ASSUNTOS ADMINISTRATIVOS)">
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="moverSecao(this, -1)" class="text-slate-500 hover:text-white"><i data-lucide="chevron-up" class="w-4 h-4"></i></button>
                    <button onclick="moverSecao(this, 1)" class="text-slate-500 hover:text-white"><i data-lucide="chevron-down" class="w-4 h-4"></i></button>
                    <button onclick="removerSecao(this)" class="text-red-400 hover:text-red-300 ml-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            </div>
            <div class="p-4 space-y-4 itens-container"></div>
            <div class="px-4 pb-4">
                <button onclick="adicionarItem(this)" class="text-[11px] font-bold text-blue-400 hover:text-blue-300 bg-blue-500/10 hover:bg-blue-500/20 px-3 py-2 rounded transition-colors uppercase flex items-center gap-1">
                    <i data-lucide="plus" class="w-3 h-3"></i> Adicionar Bloco
                </button>
            </div>
        </div>
    </template>

    <template id="tpl-item">
        <div class="item-wrapper bg-slate-900 border border-slate-700 rounded-lg p-3 flex gap-3 relative group" data-id="">
            <div class="flex flex-col items-center gap-2 text-slate-600 mt-1">
                <i data-lucide="grip-horizontal" class="w-4 h-4 cursor-move"></i>
                <button onclick="moverItem(this, -1)" class="hover:text-slate-300"><i data-lucide="chevron-up" class="w-3 h-3"></i></button>
                <button onclick="moverItem(this, 1)" class="hover:text-slate-300"><i data-lucide="chevron-down" class="w-3 h-3"></i></button>
            </div>
            <div class="flex-1 space-y-3 min-w-0">
                <div class="flex items-center gap-3">
                    <select class="item-tipo bg-slate-800 border border-slate-600 rounded px-2 py-1 text-xs text-slate-300 focus:outline-none">
                        <option value="item">Item Padrão (Fundo branco)</option>
                        <option value="item-featured">Item Destaque (Borda Laranja)</option>
                        <option value="highlight-box">Caixa de Destaque (Fundo Amarelo)</option>
                        <option value="avante-box">Caixa Especial (Letra Grande)</option>
                    </select>
                    <label class="flex items-center gap-1.5 text-xs text-slate-400 cursor-pointer">
                        <input type="checkbox" class="item-notes w-3 h-3 rounded bg-slate-800 border-slate-600 accent-blue-500" checked>
                        Ter área de anotações?
                    </label>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Conteúdo HTML (Pode usar &lt;strong&gt;, &lt;br&gt;, emojis)</label>
                    <textarea class="item-conteudo w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-blue-500 font-mono h-24" placeholder="<strong>Título</strong><br>• Texto normal"></textarea>
                </div>
            </div>
            <button onclick="removerItem(this)" class="absolute top-3 right-3 text-slate-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
    </template>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, doc, getDocs, setDoc, deleteDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        lucide.createIcons();

        let currentPautaId = null;

        function uid() { return Math.random().toString(36).substr(2, 9); }

        async function carregarLista() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('view-lista').classList.add('hidden');
            document.getElementById('view-editor').classList.add('hidden');
            
            try {
                const snap = await getDocs(collection(db, 'pautas'));
                const cont = document.getElementById('lista-container');
                cont.innerHTML = '';
                
                if (snap.empty) {
                    cont.innerHTML = `<div class="col-span-full text-center py-10 text-slate-500">Nenhuma pauta cadastrada. Crie a primeira!</div>`;
                } else {
                    snap.docs.forEach(docSnap => {
                        const d = docSnap.data();
                        const id = docSnap.id;
                        cont.innerHTML += `
                            <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 hover:border-slate-500 transition-colors relative group">
                                <h3 class="text-white font-bold text-lg mb-1">${d.id}</h3>
                                <p class="text-slate-400 text-xs mb-4 line-clamp-2">${d.data_local}</p>
                                <div class="flex items-center gap-2">
                                    <button onclick="editarPauta('${id}')" class="bg-blue-600/20 hover:bg-blue-600/40 text-blue-400 text-xs font-bold px-3 py-1.5 rounded transition-colors">Editar</button>
                                    <a href="pauta.html?id=${id}" target="_blank" class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-bold px-3 py-1.5 rounded transition-colors">Visualizar</a>
                                </div>
                                <button onclick="excluirPauta('${id}')" class="absolute top-4 right-4 text-slate-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        `;
                    });
                }
            } catch (e) {
                console.error(e);
                alert("Erro ao carregar pautas: " + e.message);
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('view-lista').classList.remove('hidden');
                lucide.createIcons();
            }
        }

        window.novaPauta = () => {
            currentPautaId = null;
            document.getElementById('p-id').value = '';
            document.getElementById('p-titulo').value = 'REUNIÃO MINISTERIAL REGIÃO 655';
            document.getElementById('p-datalocal').value = '';
            document.getElementById('secoes-container').innerHTML = '';
            
            // Adicionar uma seção inicial
            adicionarSecao();

            document.getElementById('view-lista').classList.add('hidden');
            document.getElementById('view-editor').classList.remove('hidden');
            document.getElementById('header-actions').classList.add('hidden');
            document.getElementById('btn-preview').classList.add('hidden');
        };

        window.editarPauta = async (id) => {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('view-lista').classList.add('hidden');
            
            try {
                const snap = await getDoc(doc(db, 'pautas', id));
                if (snap.exists()) {
                    const d = snap.data();
                    currentPautaId = id;
                    document.getElementById('p-id').value = d.id;
                    document.getElementById('p-titulo').value = d.titulo;
                    document.getElementById('p-datalocal').value = d.data_local;
                    
                    const cont = document.getElementById('secoes-container');
                    cont.innerHTML = '';
                    
                    if (d.secoes) {
                        d.secoes.forEach(secao => {
                            const secEl = adicionarSecao(secao.titulo);
                            if (secao.itens) {
                                secao.itens.forEach(item => {
                                    adicionarItemObj(secEl, item);
                                });
                            }
                        });
                    }

                    document.getElementById('btn-preview').href = `pauta.html?id=${id}`;
                    document.getElementById('btn-preview').classList.remove('hidden');
                }
            } catch (e) {
                alert("Erro ao carregar pauta.");
                console.error(e);
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('view-editor').classList.remove('hidden');
                document.getElementById('header-actions').classList.add('hidden');
                lucide.createIcons();
            }
        };

        window.excluirPauta = async (id) => {
            if(confirm('Certeza que deseja excluir esta pauta? Essa ação não tem volta.')) {
                await deleteDoc(doc(db, 'pautas', id));
                carregarLista();
            }
        };

        window.voltarLista = () => {
            document.getElementById('view-editor').classList.add('hidden');
            document.getElementById('header-actions').classList.remove('hidden');
            carregarLista();
        };

        // --- MANIPULAÇÃO DO DOM (SEÇÕES E ITENS) ---
        
        window.adicionarSecao = (titulo = '') => {
            const tpl = document.getElementById('tpl-secao').content.cloneNode(true);
            const div = tpl.querySelector('.secao-wrapper');
            div.dataset.id = uid();
            div.querySelector('.secao-titulo').value = titulo;
            document.getElementById('secoes-container').appendChild(tpl);
            lucide.createIcons();
            return div;
        };

        window.adicionarItem = (btn) => {
            const sec = btn.closest('.secao-wrapper');
            adicionarItemObj(sec, { tipo: 'item', conteudo: '', notes: true });
        };

        function adicionarItemObj(secaoEl, item) {
            const cont = secaoEl.querySelector('.itens-container');
            const tpl = document.getElementById('tpl-item').content.cloneNode(true);
            const div = tpl.querySelector('.item-wrapper');
            div.dataset.id = uid();
            div.querySelector('.item-tipo').value = item.tipo || 'item';
            div.querySelector('.item-conteudo').value = item.conteudo || '';
            div.querySelector('.item-notes').checked = item.notes !== false;
            cont.appendChild(tpl);
            lucide.createIcons();
        }

        window.removerSecao = (btn) => {
            if(confirm('Remover esta seção inteira?')) {
                btn.closest('.secao-wrapper').remove();
            }
        };

        window.removerItem = (btn) => {
            btn.closest('.item-wrapper').remove();
        };

        window.moverSecao = (btn, dir) => {
            const secao = btn.closest('.secao-wrapper');
            if (dir === -1 && secao.previousElementSibling) secao.parentNode.insertBefore(secao, secao.previousElementSibling);
            if (dir === 1 && secao.nextElementSibling) secao.parentNode.insertBefore(secao.nextElementSibling, secao);
        };

        window.moverItem = (btn, dir) => {
            const item = btn.closest('.item-wrapper');
            if (dir === -1 && item.previousElementSibling) item.parentNode.insertBefore(item, item.previousElementSibling);
            if (dir === 1 && item.nextElementSibling) item.parentNode.insertBefore(item.nextElementSibling, item);
        };

        window.salvarPauta = async () => {
            const idVal = document.getElementById('p-id').value.trim();
            if (!idVal) return alert('Identificador é obrigatório');
            
            const pautaRef = doc(db, 'pautas', idVal);

            const secoes = [];
            document.querySelectorAll('.secao-wrapper').forEach(secEl => {
                const tituloSec = secEl.querySelector('.secao-titulo').value.trim();
                const itens = [];
                secEl.querySelectorAll('.item-wrapper').forEach(itemEl => {
                    itens.push({
                        tipo: itemEl.querySelector('.item-tipo').value,
                        conteudo: itemEl.querySelector('.item-conteudo').value,
                        notes: itemEl.querySelector('.item-notes').checked,
                        id: itemEl.dataset.id
                    });
                });
                if (tituloSec || itens.length > 0) {
                    secoes.push({ titulo: tituloSec, itens });
                }
            });

            const payload = {
                id: idVal,
                titulo: document.getElementById('p-titulo').value.trim(),
                data_local: document.getElementById('p-datalocal').value.trim(),
                secoes: secoes,
                updatedAt: serverTimestamp()
            };

            const btn = document.getElementById('btn-salvar-pauta');
            btn.innerHTML = '<div class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div> Salvando...';
            btn.disabled = true;

            try {
                if (currentPautaId && currentPautaId !== idVal) {
                    // Se mudou o ID, deleta o antigo
                    await deleteDoc(doc(db, 'pautas', currentPautaId));
                }
                await setDoc(pautaRef, payload);
                currentPautaId = idVal;
                
                // Mostrar botão de visualizar
                document.getElementById('btn-preview').href = `pauta.html?id=${idVal}`;
                document.getElementById('btn-preview').classList.remove('hidden');

                alert('Pauta salva com sucesso!');
            } catch (e) {
                alert('Erro ao salvar: ' + e.message);
                console.error(e);
            } finally {
                btn.innerHTML = '<i data-lucide="save" class="w-4 h-4"></i> Salvar Pauta';
                btn.disabled = false;
                lucide.createIcons();
            }
        };

        // Iniciar
        carregarLista();
    </script>
</body>
</html>
