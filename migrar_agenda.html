<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migração Supabase -> Firebase (Agenda)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen p-8 flex flex-col items-center justify-center">

    <div class="max-w-xl w-full bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700">
        <h1 class="text-2xl font-bold text-white mb-2 flex items-center gap-2">
            🚀 Migração da Agenda
        </h1>
        <p class="text-sm text-slate-400 mb-6">
            Este script irá conectar no seu Supabase antigo, copiar todos os eventos e inseri-los no novo Firebase Firestore.
        </p>

        <div class="bg-slate-900 rounded-xl p-4 mb-6 font-mono text-xs text-slate-300 h-48 overflow-y-auto" id="logTerminal">
            <div class="text-slate-500">Aguardando comando para iniciar...</div>
        </div>

        <button id="btnMigrar" onclick="iniciarMigracao()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-colors text-sm uppercase tracking-wider">
            Iniciar Migração (1-Clique)
        </button>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Credenciais antigas do Supabase (Retiradas do código anterior)
        const SUPABASE_URL = 'https://rqbnvxabocusbxeiwrox.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_oP2vnq41xZP4BJAa8Hpk8g_oLKcx-kK';

        const terminal = document.getElementById('logTerminal');
        const btn = document.getElementById('btnMigrar');

        function log(msg, color = 'text-slate-300') {
            terminal.innerHTML += `<div class="${color}">${msg}</div>`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        window.iniciarMigracao = async () => {
            btn.disabled = true;
            btn.classList.replace('bg-blue-600', 'bg-slate-600');
            btn.innerText = "Migrando, aguarde...";
            terminal.innerHTML = '';

            log("Conectando ao Supabase...", "text-blue-400");

            try {
                // 1. Busca os dados do Supabase via API REST
                const response = await fetch(`${SUPABASE_URL}/rest/v1/agenda?select=*`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Erro Supabase: ${response.status} ${response.statusText}`);
                }

                const eventosSupabase = await response.json();
                log(`✓ Sucesso! ${eventosSupabase.length} eventos encontrados no Supabase.`, "text-green-400");

                if (eventosSupabase.length === 0) {
                    log("Aviso: Nenhum evento na tabela antiga.", "text-yellow-400");
                    btn.innerText = "Migração Concluída";
                    return;
                }

                log("Iniciando cópia para o Firebase...", "text-blue-400");

                // 2. Loop para inserir no Firebase
                let sucesso = 0;
                let erros = 0;

                for (const ev of eventosSupabase) {
                    try {
                        // Limpa o payload removendo o ID do Supabase e formatando pro Firebase
                        const payload = {
                            evento: ev.evento || '',
                            data: ev.data || '',
                            horario: ev.horario || '',
                            duracao: ev.duracao || '2',
                            tipo: ev.tipo || 'REGIONAL',
                            ministerio: ev.ministerio || '',
                            local: ev.local || '',
                            link: ev.link || '',
                            createdAt: serverTimestamp(),
                            updatedAt: serverTimestamp()
                        };

                        await addDoc(collection(db, "agenda"), payload);
                        sucesso++;
                        log(`  → Salvo: ${payload.evento} (${payload.data})`, "text-slate-400");
                    } catch (e) {
                        erros++;
                        log(`  ✗ Erro ao salvar: ${ev.evento} - ${e.message}`, "text-red-400");
                    }
                }

                log(`\n🎉 Migração finalizada! ${sucesso} salvos | ${erros} erros.`, "text-green-400 font-bold");
                btn.innerText = "Migração Concluída com Sucesso";

            } catch (error) {
                log(`\n❌ Falha Crítica: ${error.message}`, "text-red-500 font-bold");
                btn.disabled = false;
                btn.classList.replace('bg-slate-600', 'bg-blue-600');
                btn.innerText = "Tentar Novamente";
            }
        }
    </script>
</body>
</html>
