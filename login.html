<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.300.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .bg-pattern { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-pattern relative">
    
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden relative z-10 border border-slate-700">
        <div class="bg-slate-900 p-8 text-center border-b-4 border-blue-500">
            <img src="logo.png" alt="Logo Região 655" class="h-16 mx-auto mb-4 object-contain" onerror="this.style.display='none'">
            <h1 class="text-2xl font-bold text-white uppercase tracking-wider">Painel Admin</h1>
            <p class="text-slate-400 text-sm mt-1">Região 655 • Londrina/PR</p>
        </div>

        <div id="avisos-login-container" class="hidden px-8 pt-6 space-y-3"></div>

        <form id="login-form" class="p-8 space-y-6 pt-6">
            <div id="error-msg" class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-[13px] font-semibold border border-red-200 text-center leading-tight"></div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">E-mail de Acesso</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input type="email" id="email" required class="w-full pl-10 p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold text-slate-800" placeholder="seu@email.com">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Senha</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input type="password" id="senha" required class="w-full pl-10 p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold text-slate-800" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-lg uppercase tracking-wider transition-colors shadow-lg flex items-center justify-center gap-2">
                <i data-lucide="log-in" class="w-5 h-5"></i> Entrar no Sistema
            </button>

            <div id="links-login-container" class="border-t border-slate-100 pt-4 flex flex-col gap-2">
                <a href="agendaregiao655.html" class="flex items-center justify-center gap-2 py-2.5 rounded-lg border border-slate-200 text-slate-400 hover:text-slate-700 hover:border-slate-300 transition-colors text-[11px] font-semibold uppercase tracking-wider">
                    <i data-lucide="calendar" class="w-3.5 h-3.5"></i> Agenda
                </a>
                <a href="presencareg655.html" class="flex items-center justify-center gap-2 py-2.5 rounded-lg border border-slate-200 text-slate-400 hover:text-slate-700 hover:border-slate-300 transition-colors text-[11px] font-semibold uppercase tracking-wider">
                    <i data-lucide="check-square" class="w-3.5 h-3.5"></i> Registrar Presença
                </a>
            </div>
        </form>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        lucide.createIcons();

        // Carregar configurações dinâmicas da tela de login
        async function loadLoginLayout() {
            try {
                const snap = await getDoc(doc(db, 'configuracoes', 'layout_login'));
                if (snap.exists()) {
                    const dados = snap.data();
                    
                    // Renderizar Avisos
                    if (dados.avisos && dados.avisos.length > 0) {
                        const avisosAtivos = dados.avisos.filter(a => a.ativo);
                        if (avisosAtivos.length > 0) {
                            const cont = document.getElementById('avisos-login-container');
                            cont.classList.remove('hidden');
                            cont.innerHTML = '';
                            
                            avisosAtivos.forEach(aviso => {
                                let colors = 'bg-blue-50 text-blue-700 border-blue-200';
                                let icon = 'info';
                                if (aviso.tipo === 'alerta') { colors = 'bg-amber-50 text-amber-700 border-amber-200'; icon = 'alert-triangle'; }
                                if (aviso.tipo === 'urgente') { colors = 'bg-red-50 text-red-700 border-red-200'; icon = 'alert-octagon'; }
                                
                                cont.innerHTML += `
                                    <div class="p-3 rounded-lg border \${colors} flex items-start gap-3">
                                        <i data-lucide="\${icon}" class="w-5 h-5 shrink-0 mt-0.5"></i>
                                        <p class="text-xs font-semibold leading-relaxed">\${aviso.texto}</p>
                                    </div>
                                `;
                            });
                        }
                    }

                    // Renderizar Links
                    if (dados.links && dados.links.length > 0) {
                        const linksAtivos = dados.links.filter(l => l.ativo);
                        if (linksAtivos.length > 0) {
                            const contLinks = document.getElementById('links-login-container');
                            contLinks.innerHTML = '';
                            linksAtivos.forEach(link => {
                                contLinks.innerHTML += `
                                    <a href="\${link.url}" class="flex items-center justify-center gap-2 py-2.5 rounded-lg border border-slate-200 text-slate-500 hover:text-slate-800 hover:border-slate-300 transition-colors text-[11px] font-semibold uppercase tracking-wider">
                                        <i data-lucide="\${link.icone || 'link'}" class="w-3.5 h-3.5"></i> \${link.titulo}
                                    </a>
                                `;
                            });
                        }
                    }
                    
                    lucide.createIcons();
                }
            } catch (e) {
                console.error("Erro ao carregar layout", e);
            }
        }
        
        loadLoginLayout();

        const form = document.getElementById('login-form');
        const btn = document.getElementById('btn-login');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            btn.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div> Autenticando...';
            btn.disabled = true;

            const email = document.getElementById('email').value.trim().toLowerCase();
            const senha = document.getElementById('senha').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, senha);
                
                // Buscar dados do usuário no Firestore (fonte autoritativa)
                const q = query(collection(db, "usuarios"), where("email", "==", email));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    await signOut(auth);
                    throw new Error("Seu e-mail está autenticado, mas você não tem permissão na tabela de usuários. Fale com o Gestor.");
                }
                const userData = querySnapshot.docs[0].data();
                if (userData.status !== 'Ativo') {
                    await signOut(auth);
                    throw new Error("Sua conta está inativa. Fale com o Gestor Master.");
                }

                // Salvar no localStorage para compatibilidade com código legado
                // IMPORTANTE: As páginas agora verificam permissões via Firestore (js/auth.js)
                // O localStorage é apenas cache para exibição de nome/igreja no header
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userName', userData.nome);
                
                const perms = userData.permissoes || [];
                localStorage.setItem('userPerms', JSON.stringify(perms));
                localStorage.setItem('userIgreja', userData.igrejaNome || '');
                
                window.location.href = "index.html";
            } catch (error) {
                console.error(error);
                let msg = "Erro ao fazer login.";
                if (error.code === 'auth/invalid-credential') msg = "E-mail ou senha incorretos.";
                else if (error.code === 'auth/too-many-requests') msg = "Muitas tentativas falhas. Tente novamente mais tarde.";
                else msg = error.message;

                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
                btn.innerHTML = '<i data-lucide="log-in" class="w-5 h-5"></i> Entrar no Sistema';
                btn.disabled = false;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
