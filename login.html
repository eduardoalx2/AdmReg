<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Região 655 — Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.300.0/dist/umd/lucide.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .tab-active   { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: 800; }
        .tab-inactive { color: #94a3b8; font-weight: 600; border-bottom: 3px solid transparent; }
        .event-card { transition: all 0.2s ease; }
        .event-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.07); }
        .loader      { border-top-color: #4f46e5; animation: spin 1s linear infinite; }
        .loader-sm   { border-top-color: #fff;    animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tipo-btn { transition: all 0.2s; }
        .tipo-btn.ativo-sim { border-color: #3b82f6; background: #eff6ff; }
        .tipo-btn.ativo-nao { border-color: #10b981; background: #ecfdf5; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        /* painel de login deslizante */
        #loginPanel { transition: max-height .35s ease, opacity .25s ease; overflow: hidden; max-height: 0; opacity: 0; }
        #loginPanel.open { max-height: 400px; opacity: 1; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- ═══ HEADER ═══ -->
    <header class="w-full bg-white border-b shadow-sm sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="Logo" class="h-9 w-auto object-contain" onerror="this.style.display='none'">
                <div class="border-l border-slate-200 pl-3">
                    <div class="text-sm font-black tracking-tight text-slate-800 uppercase leading-none">Região 655</div>
                    <div class="text-[9px] font-bold text-slate-400 tracking-widest uppercase mt-0.5">Londrina — PR</div>
                </div>
            </div>
            <button onclick="toggleLogin()" id="btnEntrar"
                class="flex items-center gap-1.5 text-[10px] font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 px-3 py-2 rounded-xl transition-all uppercase tracking-wider">
                <i data-lucide="log-in" class="w-3.5 h-3.5"></i> Entrar
            </button>
        </div>

        <!-- Painel de login deslizante -->
        <div id="loginPanel" class="border-t border-slate-100 bg-white">
            <div class="max-w-sm mx-auto px-4 py-5">
                <div id="loginError" class="hidden mb-3 bg-red-50 text-red-600 p-3 rounded-lg text-[12px] font-semibold border border-red-200 text-center"></div>
                <form id="loginForm" class="space-y-3">
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="email" id="email" required placeholder="Seu e-mail"
                            class="w-full pl-9 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-semibold text-slate-800">
                    </div>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="password" id="senha" required placeholder="Senha"
                            class="w-full pl-9 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-semibold text-slate-800">
                    </div>
                    <button type="submit" id="btnSubmit"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl uppercase tracking-wider transition-colors shadow flex items-center justify-center gap-2 text-sm">
                        <i data-lucide="log-in" class="w-4 h-4"></i> Entrar no Sistema
                    </button>
                </form>
            </div>
        </div>

        <!-- Abas públicas (renderizadas dinamicamente) -->
        <div id="tabBar" class="max-w-4xl mx-auto px-4 flex gap-8 overflow-x-auto scrollbar-hide hidden">
            <button id="tabAgendaBtn"   onclick="setTab('agenda')"   class="tab-active   py-3 text-[11px] whitespace-nowrap transition-all uppercase tracking-wider hidden">📅 Agenda</button>
            <button id="tabPresencaBtn" onclick="setTab('presenca')" class="tab-inactive py-3 text-[11px] whitespace-nowrap transition-all uppercase tracking-wider hidden">✅ Lançar Presença</button>
        </div>
    </header>

    <!-- ═══ LOADING INICIAL ═══ -->
    <div id="loadingConfig" class="max-w-4xl mx-auto px-4 mt-16 flex flex-col items-center gap-4">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-10 w-10"></div>
        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest animate-pulse">Carregando...</p>
    </div>

    <!-- ═══ CONTEÚDO PÚBLICO ═══ -->
    <div id="mainContent" class="hidden">

        <!-- Mensagem de boas-vindas -->
        <div id="welcomeSection" class="hidden max-w-4xl mx-auto px-4 mt-6">
            <div class="bg-indigo-600 rounded-2xl px-6 py-4 text-center shadow-sm">
                <p id="welcomeMsg" class="text-white font-bold text-sm tracking-wide"></p>
            </div>
        </div>

        <!-- Botão WhatsApp grupo -->
        <div id="whatsappSection" class="hidden max-w-4xl mx-auto px-4 mt-4">
            <a id="whatsappLink" href="#" target="_blank"
                class="flex items-center justify-center gap-3 bg-green-500 hover:bg-green-600 text-white font-bold py-3.5 px-6 rounded-2xl shadow-md transition-all active:scale-95 text-sm uppercase tracking-wider">
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                Entrar no Grupo do WhatsApp
            </a>
        </div>

        <!-- Links úteis -->
        <div id="linksSection" class="hidden max-w-4xl mx-auto px-4 mt-6">
            <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 ml-1">Links Úteis</h2>
            <div id="linksGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
        </div>

        <!-- ═══ ABA AGENDA ═══ -->
        <div id="abaAgenda" class="hidden max-w-4xl mx-auto px-4 mt-6">
            <div class="bg-white/80 backdrop-blur-md p-4 rounded-2xl shadow-sm border border-slate-200 mb-6 grid grid-cols-2 md:grid-cols-3 gap-3">
                <div class="col-span-2 md:col-span-1 space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 tracking-widest uppercase ml-1">Buscar</label>
                    <input type="text" id="filterSearch" oninput="renderAgenda()" placeholder="Filtrar evento..."
                        class="w-full border border-slate-200 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none font-medium uppercase">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 tracking-widest uppercase ml-1">Mês</label>
                    <select id="filterMonth" onchange="renderAgenda()" class="w-full border border-slate-200 rounded-xl p-2.5 text-sm bg-white outline-none font-medium cursor-pointer uppercase">
                        <option value="">Todos</option>
                        <option value="01">Jan</option><option value="02">Fev</option><option value="03">Mar</option>
                        <option value="04">Abr</option><option value="05">Mai</option><option value="06">Jun</option>
                        <option value="07">Jul</option><option value="08">Ago</option><option value="09">Set</option>
                        <option value="10">Out</option><option value="11">Nov</option><option value="12">Dez</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 tracking-widest uppercase ml-1">Tipo</label>
                    <select id="filterType" onchange="renderAgenda()" class="w-full border border-slate-200 rounded-xl p-2.5 text-sm bg-white outline-none font-medium cursor-pointer uppercase">
                        <option value="">Todos</option>
                        <option value="REGIONAL">Regional</option>
                        <option value="CED">CED</option>
                        <option value="CND">CND</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-6 border-b border-slate-200 mb-6 overflow-x-auto scrollbar-hide px-1">
                <button onclick="setAgendaTab('upcoming')" id="tUpcoming" class="tab-active   py-3 text-[10px] font-bold whitespace-nowrap uppercase">Próximos</button>
                <button onclick="setAgendaTab('all')"      id="tAll"      class="tab-inactive py-3 text-[10px] font-bold whitespace-nowrap uppercase">Todos</button>
                <button onclick="setAgendaTab('past')"     id="tPast"     class="tab-inactive py-3 text-[10px] font-bold whitespace-nowrap uppercase">Anteriores</button>
            </div>
            <div id="eventList" class="space-y-4">
                <div class="flex justify-center py-20 text-indigo-500 font-bold text-xs animate-pulse uppercase tracking-widest">Carregando agenda...</div>
            </div>
        </div>

        <!-- ═══ ABA PRESENÇA ═══ -->
        <div id="abaPresenca" class="hidden max-w-lg mx-auto px-4 mt-6">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
                <form id="presenceForm" class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">1. Selecione o Evento</label>
                        <select id="activeEvent" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold">
                            <option value="" disabled selected>CARREGANDO EVENTOS...</option>
                        </select>
                    </div>
                    <div id="publicoBadge" class="hidden px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-center"></div>
                    <div id="formResto" class="hidden space-y-5">
                        <div class="border-t border-slate-100 pt-1"></div>
                        <div id="tipoParticipanteSection" class="hidden">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">2. Você é Pastor / Membro do Ministério?</label>
                            <div class="flex gap-3">
                                <label id="btnSim" class="tipo-btn flex-1 flex items-center gap-3 p-3 bg-slate-50 border-2 border-slate-200 rounded-xl cursor-pointer">
                                    <input type="radio" name="tipoParticipante" value="sim" class="h-4 w-4 text-blue-600">
                                    <span class="text-sm font-bold text-slate-700 uppercase">Sim</span>
                                </label>
                                <label id="btnNao" class="tipo-btn flex-1 flex items-center gap-3 p-3 bg-slate-50 border-2 border-slate-200 rounded-xl cursor-pointer">
                                    <input type="radio" name="tipoParticipante" value="nao" class="h-4 w-4 text-emerald-600">
                                    <span class="text-sm font-bold text-slate-700 uppercase">Não (Visitante)</span>
                                </label>
                            </div>
                        </div>
                        <div id="pastorNameSection" class="hidden">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Seu Nome</label>
                            <select id="pastorName" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold">
                                <option value="" disabled selected>SELECIONE SEU NOME</option>
                            </select>
                        </div>
                        <div id="visitanteNameSection" class="hidden">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Seu Nome Completo <span class="text-red-500">*</span></label>
                            <input type="text" id="visitanteName" placeholder="DIGITE SEU NOME COMPLETO"
                                class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Igreja / Congregação <span class="text-red-500">*</span></label>
                            <select id="church" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold">
                                <option value="" disabled selected>SELECIONE A IGREJA</option>
                            </select>
                            <div id="outraIgrejaSection" class="hidden mt-2">
                                <input type="text" id="outraIgreja" placeholder="QUAL O NOME DA SUA IGREJA?"
                                    class="w-full p-3 bg-emerald-50 border border-emerald-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-semibold">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Status de Presença</label>
                            <select id="status" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold">
                                <option value="Presente">PRESENTE</option>
                                <option value="Justificado">AUSÊNCIA JUSTIFICADA</option>
                            </select>
                        </div>
                        <div id="motivoContainer" class="hidden">
                            <label class="block text-[10px] font-bold text-amber-600 uppercase tracking-widest mb-1 ml-1">Justificativa (Obrigatório)</label>
                            <textarea id="motivo" rows="3" placeholder="Descreva o motivo da ausência..."
                                class="w-full p-3 bg-amber-50 border border-amber-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none resize-none text-sm"></textarea>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <label class="flex items-start gap-3 cursor-pointer">
                                <input type="checkbox" id="declaration" class="mt-1 h-4 w-4 rounded border-slate-300 text-blue-600">
                                <span class="text-[11px] font-bold text-slate-600 leading-tight uppercase">Declaro que esta resposta é verdadeira</span>
                            </label>
                        </div>
                        <button type="submit" class="w-full bg-slate-900 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all text-sm tracking-widest uppercase">
                            Confirmar e Enviar
                        </button>
                    </div>
                </form>
                <div id="feedback" class="hidden mt-5 p-4 rounded-xl text-center text-[10px] font-black uppercase tracking-widest"></div>
                <footer class="mt-8 pt-5 border-t border-slate-100 text-center text-[10px] text-slate-400 leading-relaxed">
                    <p>Escritório Regional | <strong class="text-slate-500">Região 655 – Londrina/PR</strong></p>
                    <p>Superintendente: <strong class="text-slate-500">Rev. Valdir Ávila Ramos</strong></p>
                </footer>
            </div>
        </div>

        <!-- Sem conteúdo configurado -->
        <div id="emBreveSection" class="hidden max-w-4xl mx-auto px-4 mt-16 text-center">
            <p class="text-4xl mb-4">🙏</p>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-sm">Portal em configuração</p>
            <p class="text-slate-400 text-xs mt-2">Em breve haverá conteúdo disponível aqui.</p>
        </div>

    </div>

    <!-- Loading overlay (presença) -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-3xl flex flex-col items-center shadow-2xl">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-10 w-10 mb-3"></div>
            <p class="text-[10px] font-black text-slate-800 tracking-widest uppercase">Gravando...</p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, signOut, onAuthStateChanged }
            from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { collection, addDoc, updateDoc, getDocs, doc, getDoc, query, where, orderBy, serverTimestamp }
            from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        lucide.createIcons();

        // ── Se já está logado, vai direto pro painel ─────────────────────────
        onAuthStateChanged(auth, user => {
            if (user) window.location.replace('index.html');
        });

        // ── Toggle painel de login ────────────────────────────────────────────
        window.toggleLogin = () => {
            const panel = document.getElementById('loginPanel');
            const isOpen = panel.classList.contains('open');
            panel.classList.toggle('open', !isOpen);
            if (!isOpen) document.getElementById('email').focus();
            lucide.createIcons();
        };

        // ── Formulário de login ───────────────────────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('loginError');
            const btn     = document.getElementById('btnSubmit');
            errorEl.classList.add('hidden');
            btn.innerHTML = '<div class="loader-sm rounded-full border-2 border-t-2 border-indigo-300 h-4 w-4"></div> Autenticando...';
            btn.disabled  = true;

            const email = document.getElementById('email').value.trim().toLowerCase();
            const senha = document.getElementById('senha').value;
            try {
                await signInWithEmailAndPassword(auth, email, senha);
                const q    = query(collection(db, 'usuarios'), where('email', '==', email));
                const snap = await getDocs(q);
                if (snap.empty) { await signOut(auth); throw new Error('Usuário sem permissão. Fale com o Gestor.'); }
                const ud = snap.docs[0].data();
                if (ud.status !== 'Ativo') { await signOut(auth); throw new Error('Conta inativa. Fale com o Gestor Master.'); }
                localStorage.setItem('userEmail',  email);
                localStorage.setItem('userName',   ud.nome);
                localStorage.setItem('userPerms',  JSON.stringify(ud.permissoes || []));
                localStorage.setItem('userIgreja', ud.igrejaNome || '');
                window.location.href = 'index.html';
            } catch(err) {
                let msg = 'Erro ao fazer login.';
                if (err.code === 'auth/invalid-credential') msg = 'E-mail ou senha incorretos.';
                else if (err.code === 'auth/too-many-requests') msg = 'Muitas tentativas. Tente mais tarde.';
                else msg = err.message;
                errorEl.textContent = msg;
                errorEl.classList.remove('hidden');
                btn.innerHTML = '<i data-lucide="log-in" class="w-4 h-4"></i> Entrar no Sistema';
                btn.disabled  = false;
                lucide.createIcons();
            }
        });

        // ── Carrega config do portal ──────────────────────────────────────────
        let portalConfig = { mensagemBoasVindas:'', mostrarAgenda:true, mostrarPresenca:true, linkWhatsappGrupo:'', links:[] };
        try {
            const snap = await getDoc(doc(db, 'configuracoes', 'painel_membros'));
            if (snap.exists()) {
                const d = snap.data();
                portalConfig.mensagemBoasVindas = d.mensagemBoasVindas || '';
                portalConfig.mostrarAgenda      = d.mostrarAgenda !== false;
                portalConfig.mostrarPresenca    = d.mostrarPresenca !== false;
                portalConfig.linkWhatsappGrupo  = d.linkWhatsappGrupo || '';
                portalConfig.links              = d.links || [];
            }
        } catch(e) { console.warn('Config não carregada, usando padrões.', e); }

        document.getElementById('loadingConfig').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');

        const { mensagemBoasVindas, mostrarAgenda, mostrarPresenca, linkWhatsappGrupo, links } = portalConfig;

        if (mensagemBoasVindas) {
            document.getElementById('welcomeMsg').textContent = mensagemBoasVindas;
            document.getElementById('welcomeSection').classList.remove('hidden');
        }
        if (linkWhatsappGrupo) {
            document.getElementById('whatsappLink').href = linkWhatsappGrupo;
            document.getElementById('whatsappSection').classList.remove('hidden');
        }
        if (links.length) {
            const grid = document.getElementById('linksGrid');
            grid.innerHTML = links.map(l => `
                <a href="${l.url||'#'}" target="_blank" rel="noopener noreferrer"
                    class="link-card flex items-center gap-4 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm hover:border-indigo-300 transition-all">
                    <span class="text-2xl flex-shrink-0">${l.icone||'🔗'}</span>
                    <div class="flex-1 min-w-0">
                        <div class="font-bold text-slate-800 text-sm truncate">${l.titulo||''}</div>
                        ${l.descricao?`<div class="text-[11px] text-slate-400 truncate mt-0.5">${l.descricao}</div>`:''}
                    </div>
                    <i data-lucide="external-link" class="w-4 h-4 text-slate-300 flex-shrink-0"></i>
                </a>`).join('');
            document.getElementById('linksSection').classList.remove('hidden');
            lucide.createIcons();
        }

        const hasTabs = mostrarAgenda || mostrarPresenca;
        if (hasTabs) {
            document.getElementById('tabBar').classList.remove('hidden');
            if (mostrarAgenda)   document.getElementById('tabAgendaBtn').classList.remove('hidden');
            if (mostrarPresenca) document.getElementById('tabPresencaBtn').classList.remove('hidden');
            setTab(mostrarAgenda ? 'agenda' : 'presenca');
        }

        const hasAnything = mensagemBoasVindas || linkWhatsappGrupo || links.length || hasTabs;
        if (!hasAnything) document.getElementById('emBreveSection').classList.remove('hidden');

        // ── ABAS ─────────────────────────────────────────────────────────────
        window.setTab = (tab) => {
            document.getElementById('abaAgenda').classList.toggle('hidden',   tab !== 'agenda');
            document.getElementById('abaPresenca').classList.toggle('hidden', tab !== 'presenca');
            if (mostrarAgenda) {
                document.getElementById('tabAgendaBtn').className =
                    tab==='agenda' ? 'tab-active py-3 text-[11px] whitespace-nowrap transition-all uppercase tracking-wider'
                                   : 'tab-inactive py-3 text-[11px] whitespace-nowrap transition-all uppercase tracking-wider';
            }
            if (mostrarPresenca) {
                document.getElementById('tabPresencaBtn').className =
                    tab==='presenca' ? 'tab-active py-3 text-[11px] whitespace-nowrap transition-all uppercase tracking-wider'
                                     : 'tab-inactive py-3 text-[11px] whitespace-nowrap transition-all uppercase tracking-wider';
            }
        };

        // ── AGENDA ───────────────────────────────────────────────────────────
        let events = [], currentAgendaTab = 'upcoming';
        const MONTHS   = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
        const WEEKDAYS = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

        window.setAgendaTab = (t) => {
            currentAgendaTab = t;
            ['tUpcoming','tAll','tPast'].forEach(id =>
                document.getElementById(id).className = 'tab-inactive py-3 text-[10px] font-bold whitespace-nowrap uppercase');
            const map = { upcoming:'tUpcoming', all:'tAll', past:'tPast' };
            document.getElementById(map[t]).className = 'tab-active py-3 text-[10px] font-bold whitespace-nowrap uppercase';
            renderAgenda();
        };

        window.renderAgenda = () => {
            const list   = document.getElementById('eventList');
            const search = (document.getElementById('filterSearch').value || '').toLowerCase();
            const monthF = document.getElementById('filterMonth').value;
            const typeF  = document.getElementById('filterType').value;
            const today  = new Date().toISOString().split('T')[0];

            let filtered = events.filter(e => {
                const isPast     = e.data < today;
                const isRegional = e.tipo !== 'LOCAL';
                if (currentAgendaTab === 'upcoming' && (isPast || !isRegional)) return false;
                if (currentAgendaTab === 'all'      && !isRegional)             return false;
                if (currentAgendaTab === 'past'     && (!isPast || !isRegional)) return false;
                if (search && !(e.evento||'').toLowerCase().includes(search))   return false;
                if (monthF && e.data.split('-')[1] !== monthF)                  return false;
                if (typeF  && (e.tipo||'').toUpperCase() !== typeF)             return false;
                return true;
            });
            filtered.sort((a,b) => currentAgendaTab==='past' ? b.data.localeCompare(a.data) : a.data.localeCompare(b.data));

            if (!filtered.length) {
                list.innerHTML = `<div class="text-center py-16 text-slate-400 text-xs font-bold uppercase">Nenhum evento encontrado.</div>`;
                return;
            }
            list.innerHTML = filtered.map(e => {
                const [y,m,d] = e.data.split('-');
                const dow = WEEKDAYS[new Date(e.data+'T12:00:00').getDay()];
                const hasLink    = e.link && e.link.trim().length > 5;
                const hasAddress = e.local && !e.local.toUpperCase().includes('ONLINE') && !e.local.toUpperCase().includes('DEFINIR');
                return `
                <div class="event-card bg-white rounded-2xl p-5 flex flex-col md:flex-row items-center gap-5 shadow-sm border border-slate-100">
                    <div class="flex flex-row md:flex-col items-center justify-center md:w-16 border-b md:border-b-0 md:border-r border-slate-100 pb-3 md:pb-0 md:pr-5 text-center min-w-[64px] gap-3 md:gap-0">
                        <span class="text-[9px] font-bold text-indigo-400 tracking-tight">${dow}</span>
                        <span class="text-3xl font-black text-slate-800 leading-none">${d}</span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase">${MONTHS[parseInt(m)-1]}</span>
                    </div>
                    <div class="flex-1 text-center md:text-left">
                        <div class="flex flex-wrap justify-center md:justify-start gap-1.5 mb-1.5">
                            <span class="px-2 py-0.5 rounded bg-slate-100 text-slate-500 text-[8px] font-bold border border-slate-200">${e.tipo}</span>
                            ${(e.ministerio||'').split(',').map(min=>min.trim()?`<span class="px-2 py-0.5 rounded bg-indigo-50 text-indigo-600 text-[8px] font-bold border border-indigo-100 uppercase">${min.trim()}</span>`:'').join('')}
                        </div>
                        <h3 class="text-base font-bold text-slate-800 leading-snug mb-1.5 uppercase">${e.evento}</h3>
                        <div class="flex flex-wrap justify-center md:justify-start gap-x-4 gap-y-1 text-[10px] font-medium text-slate-400">
                            <span>🕒 ${e.horario||'A definir'}</span>
                            <span>📍 ${e.local||'A definir'}</span>
                        </div>
                    </div>
                    <div class="flex flex-wrap justify-center gap-2 w-full md:w-auto">
                        ${hasLink?`<a href="${e.link}" target="_blank" class="px-3 py-2 rounded-xl bg-slate-800 text-white text-[9px] font-bold hover:bg-black transition-all">Detalhes</a>`:''}
                        ${hasAddress?`<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(e.local)}" target="_blank" class="px-3 py-2 rounded-xl bg-blue-500 text-white text-[9px] font-bold hover:bg-blue-600 transition-all">Mapa</a>`:''}
                        <button onclick="shareWhatsApp('${e.evento}','${d}/${m}/${y}','${e.horario}','${e.local}')" class="px-3 py-2 rounded-xl bg-green-500 text-white text-[9px] font-bold hover:bg-green-600 transition-all">Enviar</button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        };

        window.shareWhatsApp = (title,date,time,local) => {
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(`*REGIÃO 655 - EVENTO*\n📌 *${title}*\n📅 DATA: ${date}\n🕒 HORA: ${time}\n📍 LOCAL: ${local}`)}`);
        };

        if (mostrarAgenda) {
            try {
                const snap = await getDocs(query(collection(db,'agenda'), orderBy('data','asc')));
                events = [];
                snap.forEach(d => events.push({id:d.id,...d.data()}));
                renderAgenda();
            } catch(e) {
                document.getElementById('eventList').innerHTML = `<div class="text-center py-16 text-red-400 text-xs font-bold uppercase">Erro ao carregar agenda.</div>`;
            }
        }

        // ── PRESENÇA ─────────────────────────────────────────────────────────
        if (mostrarPresenca) {
            const churchSelect         = document.getElementById('church');
            const pastorSelect         = document.getElementById('pastorName');
            const activeEventSelect    = document.getElementById('activeEvent');
            const statusSelect         = document.getElementById('status');
            const motivoContainer      = document.getElementById('motivoContainer');
            const motivoTextarea       = document.getElementById('motivo');
            const feedbackEl           = document.getElementById('feedback');
            const loadingOverlay       = document.getElementById('loadingOverlay');
            const formResto            = document.getElementById('formResto');
            const publicoBadge         = document.getElementById('publicoBadge');
            const tipoSection          = document.getElementById('tipoParticipanteSection');
            const pastorNameSection    = document.getElementById('pastorNameSection');
            const visitanteNameSection = document.getElementById('visitanteNameSection');
            const visitanteNameInput   = document.getElementById('visitanteName');
            const outraIgrejaSection   = document.getElementById('outraIgrejaSection');
            const outraIgrejaInput     = document.getElementById('outraIgreja');
            const btnSim               = document.getElementById('btnSim');
            const btnNao               = document.getElementById('btnNao');

            let todosPastores = [], presencasDoEvento = new Map(), eventoPublico = 'Todos';

            visitanteNameInput.addEventListener('input', () => { visitanteNameInput.value = visitanteNameInput.value.toUpperCase(); });
            outraIgrejaInput.addEventListener('input',   () => { outraIgrejaInput.value   = outraIgrejaInput.value.toUpperCase(); });

            const getTipo     = () => document.querySelector('input[name="tipoParticipante"]:checked')?.value || null;
            const isVisitante = () => eventoPublico === 'PublicoGeral' && getTipo() === 'nao';

            function preencherPastores(publico) {
                let lista = todosPastores;
                if (publico === 'Titulares')                lista = todosPastores.filter(p => p.funcao === 'Pastor Titular');
                else if (publico === 'Coordenadores')       lista = todosPastores.filter(p => p.coordenador === true);
                else if (publico === 'TitularesECoordenadores') lista = todosPastores.filter(p => p.funcao === 'Pastor Titular' || p.coordenador === true);
                pastorSelect.innerHTML = '<option value="" disabled selected>SELECIONE SEU NOME</option>';
                lista.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.nome;
                    const tags = []; if (p.funcao==='Pastor Titular') tags.push('TITULAR'); if (p.coordenador) tags.push('COORD');
                    const reg = presencasDoEvento.get(p.nome);
                    opt.textContent = tags.length ? `${p.nome} (${tags.join(' | ')}${reg?` • ${reg.status.toUpperCase()}`:''})` : `${p.nome}${reg?` • ${reg.status.toUpperCase()}`:''}`;
                    pastorSelect.appendChild(opt);
                });
            }

            function mostrarBadge(pub) {
                const cfg = { 'Todos':{text:'Todos os pastores e coordenadores',cls:'bg-slate-100 text-slate-600'}, 'Titulares':{text:'Exclusivo — Pastores Titulares',cls:'bg-blue-100 text-blue-700'}, 'Coordenadores':{text:'Exclusivo — Coordenadores',cls:'bg-purple-100 text-purple-700'}, 'TitularesECoordenadores':{text:'Pastores Titulares e Coordenadores',cls:'bg-indigo-100 text-indigo-700'}, 'PublicoGeral':{text:'Aberto ao Público — pastores + convidados',cls:'bg-emerald-100 text-emerald-700'} };
                const c = cfg[pub]||cfg['Todos'];
                publicoBadge.textContent = c.text;
                publicoBadge.className = `px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-center ${c.cls}`;
                publicoBadge.classList.remove('hidden');
            }

            document.querySelectorAll('input[name="tipoParticipante"]').forEach(r => r.addEventListener('change', () => {
                const tipo = getTipo();
                btnSim.classList.toggle('ativo-sim', tipo==='sim'); btnSim.classList.toggle('ativo-nao', false);
                btnNao.classList.toggle('ativo-nao', tipo==='nao'); btnNao.classList.toggle('ativo-sim', false);
                pastorSelect.value=''; visitanteNameInput.value=''; churchSelect.value='';
                outraIgrejaSection.classList.add('hidden'); statusSelect.value='Presente'; motivoContainer.classList.add('hidden');
                pastorNameSection.classList.toggle('hidden', tipo!=='sim');
                visitanteNameSection.classList.toggle('hidden', tipo!=='nao');
                if (tipo==='nao') visitanteNameInput.focus();
            }));

            activeEventSelect.addEventListener('change', async () => {
                const opt = activeEventSelect.options[activeEventSelect.selectedIndex];
                eventoPublico = opt.dataset.publico || 'Todos';
                presencasDoEvento.clear();
                try {
                    const snap = await getDocs(query(collection(db,'presencas'), where('eventoId','==',opt.value)));
                    snap.forEach(d => { const da=d.data(); presencasDoEvento.set(da.nome,{docId:d.id,status:da.status,motivo:da.motivo||''}); });
                } catch(e) { console.error(e); }
                mostrarBadge(eventoPublico); preencherPastores(eventoPublico);
                pastorSelect.value=''; visitanteNameInput.value=''; churchSelect.value='';
                outraIgrejaSection.classList.add('hidden'); statusSelect.value='Presente'; motivoContainer.classList.add('hidden');
                document.querySelectorAll('input[name="tipoParticipante"]').forEach(r=>r.checked=false);
                btnSim.classList.remove('ativo-sim','ativo-nao'); btnNao.classList.remove('ativo-sim','ativo-nao');
                tipoSection.classList.toggle('hidden', eventoPublico!=='PublicoGeral');
                pastorNameSection.classList.toggle('hidden', eventoPublico==='PublicoGeral');
                visitanteNameSection.classList.add('hidden');
                formResto.classList.remove('hidden');
            });

            pastorSelect.addEventListener('change', () => {
                const nome = pastorSelect.value; if (!nome) return;
                const reg = presencasDoEvento.get(nome);
                if (reg) { statusSelect.value=reg.status==='Ausente'?'Presente':reg.status; motivoTextarea.value=reg.motivo||''; motivoContainer.classList.toggle('hidden',statusSelect.value!=='Justificado'); }
                else { statusSelect.value='Presente'; motivoContainer.classList.add('hidden'); motivoTextarea.value=''; }
                const pastor = todosPastores.find(p=>p.nome===nome);
                if (!pastor) return;
                const igrejas = Array.isArray(pastor.igreja)?pastor.igreja:(pastor.igreja?[pastor.igreja]:[]);
                if (igrejas.length) for (let i=0;i<churchSelect.options.length;i++) if (churchSelect.options[i].value.includes(igrejas[0])) { churchSelect.selectedIndex=i; break; }
            });

            churchSelect.addEventListener('change', () => {
                outraIgrejaSection.classList.toggle('hidden', churchSelect.value!=='__OUTRA__');
                if (churchSelect.value==='__OUTRA__') outraIgrejaInput.focus(); else outraIgrejaInput.value='';
            });

            statusSelect.addEventListener('change', () => {
                motivoContainer.classList.toggle('hidden', statusSelect.value!=='Justificado');
                if (statusSelect.value!=='Justificado') motivoTextarea.value='';
            });

            document.getElementById('presenceForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const showFb = (msg,type) => { feedbackEl.textContent=msg; feedbackEl.className=`mt-5 p-4 rounded-xl text-center text-[10px] font-black uppercase tracking-widest ${type==='success'?'bg-green-50 text-green-600':'bg-red-50 text-red-600'}`; feedbackEl.classList.remove('hidden'); if(type==='success') setTimeout(()=>feedbackEl.classList.add('hidden'),4000); };
                if (eventoPublico==='PublicoGeral'&&!getTipo()) { showFb('INFORME SE VOCÊ É PASTOR OU VISITANTE!','error'); return; }
                let nome = isVisitante()?visitanteNameInput.value.trim():pastorSelect.value;
                if (!nome) { showFb(isVisitante()?'INFORME SEU NOME COMPLETO!':'SELECIONE SEU NOME NA LISTA!','error'); return; }
                let igreja = churchSelect.value;
                if (!igreja) { showFb('SELECIONE A IGREJA!','error'); return; }
                if (igreja==='__OUTRA__') { igreja=outraIgrejaInput.value.trim(); if(!igreja){showFb('INFORME O NOME DA SUA IGREJA!','error');return;} }
                if (!document.getElementById('declaration').checked) { showFb('MARQUE A DECLARAÇÃO PARA CONTINUAR!','error'); return; }
                if (statusSelect.value==='Justificado'&&!motivoTextarea.value.trim()) { showFb('PREENCHA A JUSTIFICATIVA!','error'); return; }
                const opt = activeEventSelect.options[activeEventSelect.selectedIndex];
                const payload = { nome, igreja, eventoId:opt.value, dataEvento:opt.dataset.data, tipoEvento:opt.dataset.nome, status:statusSelect.value, motivo:motivoTextarea.value.trim(), declaracao:'Sim', dataPostagem:new Date().toLocaleString('pt-BR'), updatedAt:serverTimestamp() };
                loadingOverlay.classList.remove('hidden');
                try {
                    const reg = !isVisitante()?presencasDoEvento.get(nome):null;
                    if (reg) await updateDoc(doc(db,'presencas',reg.docId),payload);
                    else { payload.createdAt=serverTimestamp(); await addDoc(collection(db,'presencas'),payload); }
                    loadingOverlay.classList.add('hidden');
                    showFb(payload.status==='Presente'?'PRESENÇA CONFIRMADA COM SUCESSO!':'AUSÊNCIA JUSTIFICADA REGISTRADA!','success');
                    document.getElementById('presenceForm').reset();
                    [formResto,publicoBadge,tipoSection,pastorNameSection,visitanteNameSection,outraIgrejaSection,motivoContainer].forEach(el=>el.classList.add('hidden'));
                    btnSim.classList.remove('ativo-sim','ativo-nao'); btnNao.classList.remove('ativo-sim','ativo-nao');
                    eventoPublico='Todos';
                } catch(err) { console.error(err); loadingOverlay.classList.add('hidden'); showFb('ERRO AO GRAVAR. TENTE NOVAMENTE.','error'); }
            });

            try {
                const [igSnap,pastSnap,evSnap] = await Promise.all([
                    getDocs(collection(db,'igrejas')),
                    getDocs(collection(db,'pastores')),
                    getDocs(query(collection(db,'eventos'),where('status','==','Ativo')))
                ]);
                const igrejas=[]; igSnap.forEach(d=>igrejas.push(d.data())); igrejas.sort((a,b)=>parseInt(a.codigo||0)-parseInt(b.codigo||0));
                churchSelect.innerHTML='<option value="" disabled selected>SELECIONE A IGREJA</option>';
                igrejas.forEach(ig=>{ const opt=document.createElement('option'); const cod=String(ig.codigo).padStart(4,'0'); opt.value=opt.textContent=`${cod} - ${ig.nome}`; churchSelect.appendChild(opt); });
                const outraOpt=document.createElement('option'); outraOpt.value='__OUTRA__'; outraOpt.textContent='OUTRA IGREJA (NÃO LISTADA)'; churchSelect.appendChild(outraOpt);
                pastSnap.forEach(d=>todosPastores.push(d.data()));
                todosPastores.sort((a,b)=>{ const aT=a.funcao==='Pastor Titular',bT=b.funcao==='Pastor Titular'; if(aT&&!bT)return -1; if(!aT&&bT)return 1; return a.nome.localeCompare(b.nome); });
                activeEventSelect.innerHTML='<option value="" disabled selected>SELECIONE O EVENTO</option>';
                if (evSnap.empty) activeEventSelect.innerHTML='<option value="" disabled selected>NENHUM EVENTO ATIVO</option>';
                else evSnap.forEach(d=>{ const ev=d.data(); const opt=document.createElement('option'); opt.value=d.id; opt.textContent=`${ev.nome} - ${(ev.data||'').split('-').reverse().join('/')}`; opt.dataset.nome=ev.nome; opt.dataset.data=ev.data; opt.dataset.publico=ev.publico||'Todos'; activeEventSelect.appendChild(opt); });
            } catch(err) { console.error(err); activeEventSelect.innerHTML='<option value="" disabled selected>ERRO AO CARREGAR</option>'; }
        }
    </script>
</body>
</html>
