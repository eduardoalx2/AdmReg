<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presença de Pastores - Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer-regional {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eeeeee;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 12px;
            color: #777777;
            line-height: 1.6;
        }
        .footer-regional b { color: #444444; }
        .tipo-btn { transition: all 0.2s; }
        .tipo-btn.ativo-sim { border-color: #3b82f6; background: #eff6ff; }
        .tipo-btn.ativo-nao { border-color: #10b981; background: #ecfdf5; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- CABEÇALHO -->
    <header class="w-full shadow-sm bg-white border-b">
        <div class="max-w-5xl mx-auto px-4 py-1.5">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo.png" alt="Logo IEQ" class="h-8 w-auto object-contain" onerror="this.src='https://via.placeholder.com/32?text=IEQ'">
                    <div class="border-l border-gray-200 pl-2">
                        <div class="text-xs font-bold text-slate-800 leading-none">Região 655</div>
                        <div class="text-[9px] font-medium text-slate-500 uppercase leading-none mt-0.5">Londrina/PR</div>
                    </div>
                </a>
                <a href="index.html" class="text-[10px] font-semibold text-slate-500 hover:text-blue-600 flex items-center gap-1 uppercase tracking-wider">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Painel Admin
                </a>
            </div>
        </div>
        <div class="header-gradient py-2 px-4">
            <div class="max-w-5xl mx-auto">
                <h1 class="text-sm md:text-base font-bold text-white tracking-wide uppercase">Lançar Presença</h1>
            </div>
        </div>
    </header>

    <div class="flex flex-col items-center justify-center p-4 py-8">
    <div class="bg-white p-6 md:p-10 rounded-[2rem] shadow-2xl w-full max-w-lg border border-slate-100">

        <form id="presenceForm" class="space-y-5">

            <!-- PASSO 1: Evento -->
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">1. Selecione o Evento</label>
                <select id="activeEvent" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold">
                    <option value="" disabled selected>CARREGANDO EVENTOS...</option>
                </select>
            </div>

            <!-- Badge do público-alvo -->
            <div id="publicoBadge" class="hidden px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-center"></div>

            <!-- PASSO 2+: formulário (oculto até evento ser selecionado) -->
            <div id="formResto" class="hidden space-y-5">

                <div class="border-t border-slate-100 pt-1"></div>

                <!-- Tipo de participante (só para PublicoGeral) -->
                <div id="tipoParticipanteSection" class="hidden">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">2. Você é Pastor / Membro do Ministério?</label>
                    <div class="flex gap-3">
                        <label id="btnSim" class="tipo-btn flex-1 flex items-center gap-3 p-3 bg-slate-50 border-2 border-slate-200 rounded-xl cursor-pointer">
                            <input type="radio" name="tipoParticipante" value="sim" id="tipoSim" class="h-4 w-4 text-blue-600">
                            <span class="text-sm font-bold text-slate-700 uppercase">Sim</span>
                        </label>
                        <label id="btnNao" class="tipo-btn flex-1 flex items-center gap-3 p-3 bg-slate-50 border-2 border-slate-200 rounded-xl cursor-pointer">
                            <input type="radio" name="tipoParticipante" value="nao" id="tipoNao" class="h-4 w-4 text-emerald-600">
                            <span class="text-sm font-bold text-slate-700 uppercase">Não (Visitante)</span>
                        </label>
                    </div>
                </div>

                <!-- Lista de pastores (oculta para visitante) -->
                <div id="pastorNameSection" class="hidden">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1" id="labelNome">Seu Nome</label>
                    <select id="pastorName" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold">
                        <option value="" disabled selected>SELECIONE SEU NOME</option>
                    </select>
                </div>

                <!-- Campo de nome livre para visitante -->
                <div id="visitanteNameSection" class="hidden">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Seu Nome Completo <span class="text-red-500">*</span></label>
                    <input type="text" id="visitanteName" placeholder="DIGITE SEU NOME COMPLETO"
                        class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold">
                </div>

                <!-- Igreja / Congregação -->
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Igreja / Congregação <span class="text-red-500">*</span></label>
                    <select id="church" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold">
                        <option value="" disabled selected>SELECIONE A IGREJA</option>
                    </select>
                    <!-- Campo para outra igreja -->
                    <div id="outraIgrejaSection" class="hidden mt-2">
                        <input type="text" id="outraIgreja" placeholder="QUAL O NOME DA SUA IGREJA?"
                            class="w-full p-3 bg-emerald-50 border border-emerald-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-semibold">
                    </div>
                </div>

                <!-- Status -->
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Status de Presença</label>
                    <select id="status" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold">
                        <option value="Presente">PRESENTE</option>
                        <option value="Justificado">AUSÊNCIA JUSTIFICADA</option>
                        <option value="Ausente">AUSENTE (sem justificativa)</option>
                    </select>
                </div>

                <!-- Motivo da Ausência -->
                <div id="motivoContainer" class="hidden">
                    <label id="motivoLabel" class="block text-[10px] font-bold text-amber-600 uppercase tracking-widest mb-1 ml-1">Justificativa (Obrigatório)</label>
                    <textarea id="motivo" rows="3" placeholder="Descreva o motivo da ausência..."
                        class="w-full p-3 bg-amber-50 border border-amber-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none resize-none text-sm"></textarea>
                </div>

                <!-- Declaração -->
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" id="declaration" class="mt-1 h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <span class="text-[11px] font-bold text-slate-600 leading-tight uppercase">
                            Declaro que esta resposta é verdadeira
                        </span>
                    </label>
                </div>

                <!-- Botão Enviar -->
                <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl transform active:scale-95 transition-all flex items-center justify-center gap-2 text-sm tracking-widest">
                    CONFIRMAR E ENVIAR
                </button>

            </div>
        </form>

        <div id="feedback" class="hidden mt-6 p-4 rounded-xl text-center text-[10px] font-black uppercase tracking-widest"></div>

        <footer class="footer-regional">
            <p>Desenvolvido por: <b>Escritório Regional | Região 655 - Londrina/PR |</b></p>
            <p>Superintendente: <b>Rev. Valdir Ávila Ramos</b></p>
            <p>Secretário Regional: <b>Pr. Eduardo Silva</b></p>
        </footer>
    </div>

    <!-- Overlay de Carregamento -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-3xl flex flex-col items-center shadow-2xl">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-100 h-10 w-10 mb-3"></div>
            <p class="text-[10px] font-black text-slate-800 tracking-widest uppercase">Gravando e Gerando Mensagem...</p>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, updateDoc, getDocs, doc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const WHATSAPP_NUMBER = "554333562718";

        const form                  = document.getElementById('presenceForm');
        const churchSelect          = document.getElementById('church');
        const pastorSelect          = document.getElementById('pastorName');
        const activeEventSelect     = document.getElementById('activeEvent');
        const statusSelect          = document.getElementById('status');
        const motivoContainer       = document.getElementById('motivoContainer');
        const motivoLabel           = document.getElementById('motivoLabel');
        const motivoTextarea        = document.getElementById('motivo');
        const feedback              = document.getElementById('feedback');
        const loadingOverlay        = document.getElementById('loadingOverlay');
        const formResto             = document.getElementById('formResto');
        const publicoBadge          = document.getElementById('publicoBadge');
        const tipoSection           = document.getElementById('tipoParticipanteSection');
        const pastorNameSection     = document.getElementById('pastorNameSection');
        const visitanteNameSection  = document.getElementById('visitanteNameSection');
        const visitanteNameInput    = document.getElementById('visitanteName');
        const outraIgrejaSection    = document.getElementById('outraIgrejaSection');
        const outraIgrejaInput      = document.getElementById('outraIgreja');
        const btnSim                = document.getElementById('btnSim');
        const btnNao                = document.getElementById('btnNao');

        let todosPastores = [];
        let presencasDoEvento = new Map();
        let eventoPublico = 'Todos';

        // Auto-maiúsculo nos campos livres
        visitanteNameInput.addEventListener('input', () => {
            visitanteNameInput.value = visitanteNameInput.value.toUpperCase();
        });
        outraIgrejaInput.addEventListener('input', () => {
            outraIgrejaInput.value = outraIgrejaInput.value.toUpperCase();
        });

        function getTipo() {
            return document.querySelector('input[name="tipoParticipante"]:checked')?.value || null;
        }

        function isVisitante() {
            return eventoPublico === 'PublicoGeral' && getTipo() === 'nao';
        }

        function preencherPastores(publico) {
            let lista = todosPastores;
            if (publico === 'Titulares') {
                lista = todosPastores.filter(p => p.funcao === 'Pastor Titular');
            } else if (publico === 'Coordenadores') {
                lista = todosPastores.filter(p => p.coordenador === true);
            } else if (publico === 'TitularesECoordenadores') {
                lista = todosPastores.filter(p => p.funcao === 'Pastor Titular' || p.coordenador === true);
            }

            pastorSelect.innerHTML = '<option value="" disabled selected>SELECIONE SEU NOME</option>';
            lista.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.nome;
                const tags = [];
                if (p.funcao === 'Pastor Titular') tags.push('TITULAR');
                if (p.coordenador) tags.push('COORD');
                const reg = presencasDoEvento.get(p.nome);
                const statusTag = reg ? ` • ${reg.status.toUpperCase()}` : '';
                opt.textContent = tags.length > 0 ? `${p.nome} (${tags.join(' | ')}${statusTag})` : `${p.nome}${statusTag}`;
                pastorSelect.appendChild(opt);
            });
        }

        function mostrarBadgePublico(publico) {
            const config = {
                'Todos':                   { text: 'Todos os pastores e coordenadores cadastrados', cls: 'bg-slate-100 text-slate-600' },
                'Titulares':               { text: 'Exclusivo — Pastores Titulares', cls: 'bg-blue-100 text-blue-700' },
                'Coordenadores':           { text: 'Exclusivo — Coordenadores', cls: 'bg-purple-100 text-purple-700' },
                'TitularesECoordenadores': { text: 'Pastores Titulares e Coordenadores', cls: 'bg-indigo-100 text-indigo-700' },
                'PublicoGeral':            { text: 'Aberto ao Público — pastores registrados + convidados', cls: 'bg-emerald-100 text-emerald-700' }
            };
            const c = config[publico] || config['Todos'];
            publicoBadge.textContent = c.text;
            publicoBadge.className = `px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-center ${c.cls}`;
            publicoBadge.classList.remove('hidden');
        }

        function atualizarEstiloBotoes(tipo) {
            btnSim.classList.remove('ativo-sim', 'ativo-nao');
            btnNao.classList.remove('ativo-sim', 'ativo-nao');
            if (tipo === 'sim') btnSim.classList.add('ativo-sim');
            if (tipo === 'nao') btnNao.classList.add('ativo-nao');
        }

        function onTipoChange() {
            const tipo = getTipo();
            atualizarEstiloBotoes(tipo);

            // Reset campos ao trocar tipo
            pastorSelect.value = '';
            visitanteNameInput.value = '';
            churchSelect.value = '';
            outraIgrejaSection.classList.add('hidden');
            outraIgrejaInput.value = '';
            statusSelect.value = 'Presente';
            motivoContainer.classList.add('hidden');

            if (tipo === 'sim') {
                pastorNameSection.classList.remove('hidden');
                visitanteNameSection.classList.add('hidden');
            } else {
                pastorNameSection.classList.add('hidden');
                visitanteNameSection.classList.remove('hidden');
                visitanteNameInput.focus();
            }
        }

        window.onload = async function() {
            try {
                const [igrejasSnapshot, pastoresSnapshot, eventosSnapshot] = await Promise.all([
                    getDocs(collection(db, "igrejas")),
                    getDocs(collection(db, "pastores")),
                    getDocs(query(collection(db, "eventos"), where("status", "==", "Ativo")))
                ]);

                // Igrejas
                const igrejas = [];
                igrejasSnapshot.forEach(d => igrejas.push(d.data()));
                igrejas.sort((a, b) => parseInt(a.codigo || 0) - parseInt(b.codigo || 0));
                churchSelect.innerHTML = '<option value="" disabled selected>SELECIONE A IGREJA</option>';
                igrejas.forEach(ig => {
                    const opt = document.createElement('option');
                    const cod = String(ig.codigo).padStart(4, '0');
                    opt.value = `${cod} - ${ig.nome}`;
                    opt.textContent = `${cod} - ${ig.nome}`;
                    churchSelect.appendChild(opt);
                });
                // Opção "Outra Igreja"
                const outraOpt = document.createElement('option');
                outraOpt.value = '__OUTRA__';
                outraOpt.textContent = 'OUTRA IGREJA (NÃO LISTADA)';
                churchSelect.appendChild(outraOpt);

                // Pastores
                pastoresSnapshot.forEach(d => todosPastores.push(d.data()));
                todosPastores.sort((a, b) => {
                    const aT = a.funcao === 'Pastor Titular';
                    const bT = b.funcao === 'Pastor Titular';
                    if (aT && !bT) return -1;
                    if (!aT && bT) return 1;
                    return a.nome.localeCompare(b.nome);
                });

                // Eventos
                activeEventSelect.innerHTML = '<option value="" disabled selected>SELECIONE O EVENTO</option>';
                if (eventosSnapshot.empty) {
                    activeEventSelect.innerHTML = '<option value="" disabled selected>NENHUM EVENTO ATIVO</option>';
                } else {
                    eventosSnapshot.forEach(d => {
                        const ev = d.data();
                        const opt = document.createElement('option');
                        opt.value = d.id;
                        const dataFormatada = ev.data.split('-').reverse().join('/');
                        opt.textContent = `${ev.nome} - ${dataFormatada}`;
                        opt.dataset.nome = ev.nome;
                        opt.dataset.data = ev.data;
                        opt.dataset.publico = ev.publico || 'Todos';
                        activeEventSelect.appendChild(opt);
                    });
                }
            } catch (error) {
                console.error("Erro ao carregar dados do Firebase:", error);
                activeEventSelect.innerHTML = '<option value="" disabled selected>ERRO AO CARREGAR</option>';
            }
        };

        // Seleção de evento
        activeEventSelect.addEventListener('change', async () => {
            const opt = activeEventSelect.options[activeEventSelect.selectedIndex];
            eventoPublico = opt.dataset.publico || 'Todos';
            const eventoId = opt.value;

            presencasDoEvento.clear();
            try {
                const snap = await getDocs(query(collection(db, "presencas"), where("eventoId", "==", eventoId)));
                snap.forEach(d => {
                    const data = d.data();
                    presencasDoEvento.set(data.nome, { docId: d.id, status: data.status, motivo: data.motivo || '' });
                });
            } catch(e) { console.error("Erro ao carregar presenças:", e); }

            mostrarBadgePublico(eventoPublico);
            preencherPastores(eventoPublico);

            // Reset geral
            pastorSelect.value = '';
            visitanteNameInput.value = '';
            churchSelect.value = '';
            outraIgrejaSection.classList.add('hidden');
            outraIgrejaInput.value = '';
            statusSelect.value = 'Presente';
            motivoContainer.classList.add('hidden');
            document.querySelectorAll('input[name="tipoParticipante"]').forEach(r => r.checked = false);
            btnSim.classList.remove('ativo-sim', 'ativo-nao');
            btnNao.classList.remove('ativo-sim', 'ativo-nao');

            if (eventoPublico === 'PublicoGeral') {
                // Para evento aberto: mostra pergunta, oculta ambas as seções de nome
                tipoSection.classList.remove('hidden');
                pastorNameSection.classList.add('hidden');
                visitanteNameSection.classList.add('hidden');
            } else {
                // Para outros eventos: oculta pergunta, mostra lista de pastores diretamente
                tipoSection.classList.add('hidden');
                pastorNameSection.classList.remove('hidden');
                visitanteNameSection.classList.add('hidden');
            }

            formResto.classList.remove('hidden');
        });

        // Radio buttons de tipo de participante
        document.querySelectorAll('input[name="tipoParticipante"]').forEach(radio => {
            radio.addEventListener('change', onTipoChange);
        });

        // Seleção de pastor → pré-preenche status e igreja
        pastorSelect.addEventListener('change', () => {
            const nome = pastorSelect.value;
            if (!nome) return;

            const reg = presencasDoEvento.get(nome);
            if (reg) {
                statusSelect.value = reg.status;
                motivoTextarea.value = reg.motivo || '';
                const precisaMotivo = reg.status === 'Ausente' || reg.status === 'Justificado';
                motivoContainer.classList.toggle('hidden', !precisaMotivo);
            } else {
                statusSelect.value = 'Presente';
                motivoContainer.classList.add('hidden');
                motivoTextarea.value = '';
            }

            const pastor = todosPastores.find(p => p.nome === nome);
            if (!pastor) return;
            const igrejasP = Array.isArray(pastor.igreja) ? pastor.igreja : (pastor.igreja ? [pastor.igreja] : []);
            if (igrejasP.length >= 1) {
                for (let i = 0; i < churchSelect.options.length; i++) {
                    if (churchSelect.options[i].value.includes(igrejasP[0])) {
                        churchSelect.selectedIndex = i;
                        outraIgrejaSection.classList.add('hidden');
                        break;
                    }
                }
            }
        });

        // Seleção de igreja → mostra campo livre se "outra"
        churchSelect.addEventListener('change', () => {
            if (churchSelect.value === '__OUTRA__') {
                outraIgrejaSection.classList.remove('hidden');
                outraIgrejaInput.focus();
            } else {
                outraIgrejaSection.classList.add('hidden');
                outraIgrejaInput.value = '';
            }
        });

        // Status → mostra/esconde motivo
        statusSelect.addEventListener('change', () => {
            const precisaMotivo = statusSelect.value === 'Ausente' || statusSelect.value === 'Justificado';
            if (precisaMotivo) {
                motivoLabel.textContent = statusSelect.value === 'Justificado'
                    ? 'Justificativa (Obrigatório)'
                    : 'Motivo da Ausência (Obrigatório)';
                motivoContainer.classList.remove('hidden');
            } else {
                motivoContainer.classList.add('hidden');
                motivoTextarea.value = '';
            }
        });

        // Envio do formulário
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validação: tipo de participante obrigatório para PublicoGeral
            if (eventoPublico === 'PublicoGeral' && !getTipo()) {
                showFeedback("INFORME SE VOCÊ É PASTOR OU VISITANTE!", "error");
                return;
            }

            // Validação: nome
            let nome = '';
            if (isVisitante()) {
                nome = visitanteNameInput.value.trim();
                if (!nome) {
                    showFeedback("INFORME SEU NOME COMPLETO!", "error");
                    visitanteNameInput.focus();
                    return;
                }
            } else {
                nome = pastorSelect.value;
                if (!nome) {
                    showFeedback("SELECIONE SEU NOME NA LISTA!", "error");
                    return;
                }
            }

            // Validação: igreja
            let igreja = churchSelect.value;
            if (!igreja) {
                showFeedback("SELECIONE A IGREJA!", "error");
                churchSelect.focus();
                return;
            }
            if (igreja === '__OUTRA__') {
                igreja = outraIgrejaInput.value.trim();
                if (!igreja) {
                    showFeedback("INFORME O NOME DA SUA IGREJA!", "error");
                    outraIgrejaInput.focus();
                    return;
                }
            }

            // Validação: declaração
            if (!document.getElementById('declaration').checked) {
                showFeedback("MARQUE A DECLARAÇÃO PARA CONTINUAR!", "error");
                return;
            }

            // Validação: motivo de ausência
            const precisaMotivo = statusSelect.value === 'Ausente' || statusSelect.value === 'Justificado';
            if (precisaMotivo && !motivoTextarea.value.trim()) {
                showFeedback("POR FAVOR, PREENCHA A JUSTIFICATIVA!", "error");
                return;
            }

            const eventoOption = activeEventSelect.options[activeEventSelect.selectedIndex];
            const eventoId     = eventoOption.value;
            const tipoEvento   = eventoOption.dataset.nome;
            const dataEvento   = eventoOption.dataset.data;
            const status       = statusSelect.value;
            const motivo       = motivoTextarea.value.trim();
            const dataPostagem = new Date().toLocaleString('pt-BR');

            const payload = {
                nome, igreja, eventoId, dataEvento, tipoEvento,
                status, motivo,
                declaracao: "Sim",
                dataPostagem,
                updatedAt: serverTimestamp()
            };

            loadingOverlay.classList.remove('hidden');

            try {
                const regExistente = !isVisitante() ? presencasDoEvento.get(nome) : null;
                if (regExistente) {
                    await updateDoc(doc(db, "presencas", regExistente.docId), payload);
                } else {
                    payload.createdAt = serverTimestamp();
                    await addDoc(collection(db, "presencas"), payload);
                }

                const dataFormatada = dataEvento.split('-').reverse().join('/');
                let mensagemZap = `*REGISTRO DE PRESENÇA - REGIÃO 655*%0A%0A`;
                mensagemZap += `*Nome:* ${nome}%0A`;
                mensagemZap += `*Igreja:* ${igreja}%0A`;
                mensagemZap += `*Evento:* ${tipoEvento}%0A`;
                mensagemZap += `*Data do Evento:* ${dataFormatada}%0A`;
                mensagemZap += `*Status:* ${status === 'Presente' ? '✅ PRESENTE' : status === 'Justificado' ? '⚠️ JUSTIFICADO' : '❌ AUSENTE'}%0A`;
                if (motivo) mensagemZap += `*Motivo:* ${motivo}%0A`;
                mensagemZap += `%0A_Enviado via Sistema em: ${dataPostagem}_`;

                loadingOverlay.classList.add('hidden');
                showFeedback("DADOS GRAVADOS! ABRINDO WHATSAPP...", "success");
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${mensagemZap}`, '_blank');

                // Reset completo
                form.reset();
                motivoContainer.classList.add('hidden');
                formResto.classList.add('hidden');
                publicoBadge.classList.add('hidden');
                tipoSection.classList.add('hidden');
                pastorNameSection.classList.add('hidden');
                visitanteNameSection.classList.add('hidden');
                outraIgrejaSection.classList.add('hidden');
                btnSim.classList.remove('ativo-sim', 'ativo-nao');
                btnNao.classList.remove('ativo-sim', 'ativo-nao');
                activeEventSelect.value = '';
                eventoPublico = 'Todos';

            } catch (error) {
                console.error("Erro:", error);
                showFeedback("ERRO AO GRAVAR. TENTE NOVAMENTE.", "error");
                loadingOverlay.classList.add('hidden');
            }
        });

        function showFeedback(message, type) {
            feedback.textContent = message;
            feedback.classList.remove('hidden', 'bg-green-50', 'text-green-600', 'bg-red-50', 'text-red-600');
            feedback.classList.add(type === 'success' ? 'bg-green-50' : 'bg-red-50');
            feedback.classList.add(type === 'success' ? 'text-green-600' : 'text-red-600');
        }
    </script>
    </div>

    <footer class="py-4 text-center text-slate-400 text-[10px]">

    </footer>
