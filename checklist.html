<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist — Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.300.0"></script>
    <script type="module">
        import { requireAuth, hasAnyPermission } from './js/auth.js';
        try {
            await requireAuth();
            if (!hasAnyPermission(['admin', 'secretario', 'superintendente'])) window.location.replace('index.html');
        } catch (e) {}
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #334155; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }

        .tab-btn { transition: all 0.2s; border-bottom: 3px solid transparent; }
        .tab-btn.active { border-bottom-color: #4f46e5; color: #4f46e5; font-weight: 700; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        .check-item {
            transition: background 0.15s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .check-item.checked { background-color: #f0fdf4; }

        .check-box {
            width: 28px; height: 28px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
            cursor: pointer;
        }
        .check-box.checked {
            background-color: #22c55e;
            border-color: #16a34a;
        }

        .sgaf-item.checked { background-color: #eff6ff; }
        .sgaf-check-box {
            width: 28px; height: 28px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
            cursor: pointer;
        }
        .sgaf-check-box.checked {
            background-color: #6366f1;
            border-color: #4338ca;
        }

        /* Loading spinner */
        .spinner {
            border: 3px solid #e2e8f0;
            border-top-color: #6366f1;
            border-radius: 50%;
            width: 32px; height: 32px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Progress bar */
        .progress-bar-fill { transition: width 0.4s ease; }

        /* Month selector styled */
        select.month-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 18px;
            padding-right: 32px;
            appearance: none;
        }

        /* Toast */
        #toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: #1e293b; color: white; padding: 10px 20px;
            border-radius: 12px; font-size: 13px; font-weight: 600;
            z-index: 999; transition: transform 0.3s ease;
            white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="min-h-screen">

    <!-- CABEÇALHO -->
    <header class="w-full shadow-sm bg-white border-b sticky top-0 z-30">
        <div class="max-w-4xl mx-auto px-4 py-1.5">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo.png" alt="Logo IEQ" class="h-8 w-auto object-contain" onerror="this.src='https://via.placeholder.com/32?text=IEQ'">
                    <div class="border-l border-gray-200 pl-2">
                        <div class="text-xs font-bold text-slate-800 leading-none">Região 655</div>
                        <div class="text-[9px] font-medium text-slate-500 uppercase leading-none mt-0.5">Londrina/PR</div>
                    </div>
                </a>
                <a href="index.html" class="text-[10px] font-semibold text-slate-500 hover:text-blue-600 flex items-center gap-1 uppercase tracking-wider">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Painel Admin
                </a>
            </div>
        </div>
        <div class="header-gradient py-3 px-4">
            <div class="max-w-4xl mx-auto">
                <h1 class="text-sm md:text-base font-bold text-white tracking-wide uppercase flex items-center gap-2">
                    <i data-lucide="clipboard-check" class="w-5 h-5"></i> Checklist — Contabilidade
                </h1>
            </div>
        </div>

        <!-- ABAS -->
        <div class="bg-white border-b border-slate-100">
            <div class="max-w-4xl mx-auto px-4 flex gap-0">
                <button id="tab-caixa-btn" onclick="switchTab('caixa')" class="tab-btn active px-5 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide flex items-center gap-1.5">
                    <i data-lucide="package" class="w-4 h-4"></i> Caixa de Relatórios
                </button>
                <button id="tab-sgaf-btn" onclick="switchTab('sgaf')" class="tab-btn px-5 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide flex items-center gap-1.5">
                    <i data-lucide="landmark" class="w-4 h-4"></i> Informe SGAF
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6">

        <!-- ===================== ABA 1: CAIXA DE RELATÓRIOS ===================== -->
        <div id="tab-caixa" class="tab-pane active">

            <!-- Seletor de mês -->
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 mb-4 flex flex-wrap gap-3 items-end justify-between">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Competência dos Relatórios</label>
                    <select id="caixaMes" class="month-select bg-slate-50 border border-slate-200 text-slate-800 text-sm font-bold rounded-lg p-2.5 focus:ring-1 focus:ring-indigo-500 outline-none cursor-pointer min-w-[170px]"></select>
                </div>
                <div class="flex items-center gap-2">
                    <div id="caixaProgress" class="text-right">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Progresso</p>
                        <p id="caixaProgressText" class="text-lg font-black text-slate-800">0/0</p>
                    </div>
                </div>
            </div>

            <!-- Barra de progresso -->
            <div class="bg-slate-200 rounded-full h-2 mb-5 overflow-hidden">
                <div id="caixaProgressBar" class="progress-bar-fill h-full bg-emerald-500 rounded-full" style="width:0%"></div>
            </div>

            <!-- Lista -->
            <div id="caixaLista" class="space-y-2">
                <div class="flex justify-center py-12">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- Rodapé com info -->
            <p class="text-center text-[11px] text-slate-400 mt-6">Toque no item para marcar/desmarcar. Tudo salvo automaticamente.</p>
        </div>

        <!-- ===================== ABA 2: INFORME SGAF ===================== -->
        <div id="tab-sgaf" class="tab-pane">

            <!-- Seletor de mês -->
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 mb-4 flex flex-wrap gap-3 items-end justify-between">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Competência</label>
                    <select id="sgafMes" class="month-select bg-slate-50 border border-slate-200 text-slate-800 text-sm font-bold rounded-lg p-2.5 focus:ring-1 focus:ring-indigo-500 outline-none cursor-pointer min-w-[170px]"></select>
                </div>
                <div class="flex items-center gap-2">
                    <div id="sgafProgress" class="text-right">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Lançados SGAF</p>
                        <p id="sgafProgressText" class="text-lg font-black text-slate-800">0/0</p>
                    </div>
                </div>
            </div>

            <!-- Barra de progresso -->
            <div class="bg-slate-200 rounded-full h-2 mb-5 overflow-hidden">
                <div id="sgafProgressBar" class="progress-bar-fill h-full bg-indigo-500 rounded-full" style="width:0%"></div>
            </div>

            <!-- Lista -->
            <div id="sgafLista" class="space-y-2">
                <div class="flex justify-center py-12">
                    <div class="spinner"></div>
                </div>
            </div>

            <p class="text-center text-[11px] text-slate-400 mt-6">Dados importados do DashSaldo. Toque para marcar como lançado no SGAF.</p>
        </div>

    </main>

    <!-- Toast -->
    <div id="toast"></div>

    <script type="module">
        import { db } from './firebase-config.js';
        import {
            collection, getDocs, doc, setDoc, getDoc
        } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // ─── Utils ───────────────────────────────────────────────────────────
        const MESES_NOMES = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                             'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

        function chaveParaLabel(chave) {
            if (!chave || !chave.includes('-')) return chave;
            const [yyyy, mm] = chave.split('-');
            return `${MESES_NOMES[parseInt(mm)] || mm}/${yyyy}`;
        }

        function labelToChave(label) {
            const meses = {
                'janeiro':'01','fevereiro':'02','março':'03','abril':'04',
                'maio':'05','junho':'06','julho':'07','agosto':'08',
                'setembro':'09','outubro':'10','novembro':'11','dezembro':'12'
            };
            const partes = (label || '').split(/➔|>/).map(s => s.trim()).filter(Boolean);
            const dest = partes[0] || '';
            const [mes, ano] = dest.split('/');
            const mm = meses[(mes || '').toLowerCase().trim()];
            const yyyy = parseInt(ano) < 100 ? 2000 + parseInt(ano) : parseInt(ano);
            return (mm && !isNaN(yyyy)) ? `${yyyy}-${mm}` : null;
        }

        function normalizeString(str) {
            if (!str) return "";
            return str.normalize("NFD").replace(/[̀-ͯ]/g, "").toUpperCase().replace(/\s+/g, ' ').trim();
        }

        function formatCurrency(val) {
            const num = typeof val === 'number' ? val : (parseFloat(String(val).replace(/[^\d.,]/g, '').replace(',', '.')) || 0);
            return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function gerarMeses(qtd = 18) {
            const meses = [];
            const hoje = new Date();
            for (let i = 0; i < qtd; i++) {
                const d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                meses.push(`${d.getFullYear()}-${mm}`);
            }
            return meses;
        }

        function preencherSelect(selectId, meses, valorPadrao) {
            const sel = document.getElementById(selectId);
            sel.innerHTML = meses.map(m =>
                `<option value="${m}" ${m === valorPadrao ? 'selected' : ''}>${chaveParaLabel(m)}</option>`
            ).join('');
        }

        function showToast(msg, cor = '#1e293b') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = cor;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2200);
        }

        // ─── Lógica de abas ──────────────────────────────────────────────────
        window.switchTab = function(tab) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`tab-${tab}-btn`).classList.add('active');
            if (window.lucide) window.lucide.createIcons();
        };

        // ─── Dados base ──────────────────────────────────────────────────────
        let masterIgrejas = [];   // [{codigo, nome, display}]
        let saldosData = [];      // dados do saldos_virada

        async function carregarIgrejas() {
            const snap = await getDocs(collection(db, "igrejas"));
            const lista = [];
            snap.forEach(d => {
                const data = d.data();
                const cod = String(data.codigo).padStart(4, '0');
                lista.push({ codigo: cod, nome: data.nome, display: `${cod} - ${data.nome}` });
            });
            lista.sort((a, b) => parseInt(a.codigo) - parseInt(b.codigo));
            masterIgrejas = lista;
        }

        async function carregarSaldos() {
            const snap = await getDocs(collection(db, "saldos_virada"));
            const lista = [];
            snap.forEach(d => {
                const s = d.data();
                let comp = s.periodoChave;
                if (!comp) comp = labelToChave(s.periodo) || 'S/D';
                const m = typeof comp === 'string' && comp.match(/^(\d{2})\/(\d{4})$/);
                if (m) comp = `${m[2]}-${m[1]}`;
                if (comp === 'S/D') return;

                const originalName = s.igrejaFormatada || s.igrejaNome || `Igreja ${s.igrejaCodigo || '-'}`;
                lista.push({
                    nomeOriginal: originalName,
                    competencia: comp,
                    cc: s.saldoBanco || 0,
                    din: s.saldoDinheiro || 0,
                    total: s.saldoTotal || 0,
                    dataEnvio: s.dataHoraRegistro || null
                });
            });
            saldosData = lista;
        }

        // ─── ABA 1: CAIXA ────────────────────────────────────────────────────
        let caixaChecks = {};   // { igrejaCodigo: true/false }

        async function carregarCaixa() {
            const mes = document.getElementById('caixaMes').value;
            document.getElementById('caixaLista').innerHTML = `<div class="flex justify-center py-12"><div class="spinner"></div></div>`;

            // Busca checks salvos no Firestore
            const docRef = doc(db, "checklist_caixa", mes);
            const snap = await getDoc(docRef);
            caixaChecks = snap.exists() ? (snap.data().checks || {}) : {};

            renderCaixa(mes);
        }

        function renderCaixa(mes) {
            const lista = document.getElementById('caixaLista');
            const label = chaveParaLabel(mes);

            const itens = [...masterIgrejas];

            let html = '';
            let total = itens.length;
            let marcados = 0;

            itens.forEach(ig => {
                const checked = !!caixaChecks[ig.codigo];
                if (checked) marcados++;
                html += `
                <div id="caixa-item-${ig.codigo}"
                     class="check-item ${checked ? 'checked' : ''} bg-white rounded-xl border border-slate-200 p-3 flex items-center gap-3 cursor-pointer select-none active:scale-[0.99]"
                     onclick="toggleCaixa('${ig.codigo}', '${mes}')">
                    <div id="caixa-box-${ig.codigo}" class="check-box ${checked ? 'checked' : ''}">
                        ${checked ? `<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>` : ''}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold text-slate-800 truncate">${ig.display}</p>
                        <p class="text-[10px] text-slate-400 font-medium">Competência: ${label}</p>
                    </div>
                    ${checked ? `<span class="text-[9px] font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded-full uppercase">Na Caixa</span>` : `<span class="text-[9px] font-bold text-slate-400 bg-slate-100 border border-slate-200 px-2 py-0.5 rounded-full uppercase">Pendente</span>`}
                </div>`;
            });

            lista.innerHTML = html;
            atualizarProgressoCaixa(marcados, total);
            if (window.lucide) window.lucide.createIcons();
        }

        function atualizarProgressoCaixa(marcados, total) {
            document.getElementById('caixaProgressText').textContent = `${marcados}/${total}`;
            const pct = total > 0 ? Math.round((marcados / total) * 100) : 0;
            document.getElementById('caixaProgressBar').style.width = pct + '%';
        }

        window.toggleCaixa = async function(codigo, mes) {
            const novo = !caixaChecks[codigo];
            caixaChecks[codigo] = novo;

            // Atualiza UI imediatamente
            const item = document.getElementById(`caixa-item-${codigo}`);
            const box = document.getElementById(`caixa-box-${codigo}`);

            item.classList.toggle('checked', novo);
            box.classList.toggle('checked', novo);
            box.innerHTML = novo
                ? `<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`
                : '';

            const badge = item.querySelector('span:last-child');
            if (badge) {
                if (novo) {
                    badge.textContent = 'Na Caixa';
                    badge.className = 'text-[9px] font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded-full uppercase';
                } else {
                    badge.textContent = 'Pendente';
                    badge.className = 'text-[9px] font-bold text-slate-400 bg-slate-100 border border-slate-200 px-2 py-0.5 rounded-full uppercase';
                }
            }

            // Recalcula progresso
            const itens = [{ codigo: '0655' }, ...masterIgrejas];
            let marcados = itens.filter(ig => !!caixaChecks[ig.codigo]).length;
            atualizarProgressoCaixa(marcados, itens.length);

            // Salva no Firestore
            try {
                await setDoc(doc(db, "checklist_caixa", mes), { checks: caixaChecks, updatedAt: new Date().toISOString() });
                showToast(novo ? '✓ Marcado na caixa' : 'Desmarcado', novo ? '#16a34a' : '#64748b');
            } catch (e) {
                showToast('Erro ao salvar!', '#dc2626');
                console.error(e);
            }
        };

        // ─── ABA 2: SGAF ─────────────────────────────────────────────────────
        let sgafChecks = {};

        async function carregarSgaf() {
            const mes = document.getElementById('sgafMes').value;
            document.getElementById('sgafLista').innerHTML = `<div class="flex justify-center py-12"><div class="spinner"></div></div>`;

            // Checks salvos
            const docRef = doc(db, "checklist_sgaf", mes);
            const snap = await getDoc(docRef);
            sgafChecks = snap.exists() ? (snap.data().checks || {}) : {};

            renderSgaf(mes);
        }

        function renderSgaf(mes) {
            const lista = document.getElementById('sgafLista');
            const label = chaveParaLabel(mes);

            // Filtra saldos do mês selecionado
            const saldosMes = saldosData.filter(s => s.competencia === mes);

            if (saldosMes.length === 0) {
                lista.innerHTML = `
                    <div class="bg-amber-50 border border-amber-200 rounded-xl p-6 text-center">
                        <i data-lucide="alert-circle" class="w-8 h-8 text-amber-400 mx-auto mb-2"></i>
                        <p class="text-sm font-bold text-amber-700">Nenhum saldo encontrado para ${label}</p>
                        <p class="text-xs text-amber-500 mt-1">Os saldos precisam estar lançados no DashSaldo para aparecerem aqui.</p>
                    </div>`;
                atualizarProgressoSgaf(0, 0);
                if (window.lucide) window.lucide.createIcons();
                return;
            }

            // Ordena por nome
            saldosMes.sort((a, b) => a.nomeOriginal.localeCompare(b.nomeOriginal));

            let html = '';
            let total = saldosMes.length;
            let marcados = 0;

            saldosMes.forEach((s, idx) => {
                const chave = `${idx}_${normalizeString(s.nomeOriginal)}`;
                const checked = !!sgafChecks[chave];
                if (checked) marcados++;

                html += `
                <div id="sgaf-item-${idx}"
                     class="sgaf-item ${checked ? 'checked' : ''} bg-white rounded-xl border border-slate-200 p-3 flex items-center gap-3 cursor-pointer select-none active:scale-[0.99]"
                     onclick="toggleSgaf(${idx}, '${chave}', '${mes}')">
                    <div id="sgaf-box-${idx}" class="sgaf-check-box ${checked ? 'checked' : ''}">
                        ${checked ? `<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>` : ''}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold text-slate-800 truncate">${s.nomeOriginal}</p>
                        <p class="text-[10px] text-slate-500 font-medium mb-1.5">Competência: ${label}</p>
                        <div class="grid grid-cols-3 gap-1.5">
                            <div class="bg-slate-50 rounded-lg px-2 py-1 text-center border border-slate-100">
                                <p class="text-[8px] font-bold text-slate-400 uppercase leading-none mb-0.5">C/C</p>
                                <p class="text-[10px] font-bold text-slate-700 leading-none">${formatCurrency(s.cc)}</p>
                            </div>
                            <div class="bg-slate-50 rounded-lg px-2 py-1 text-center border border-slate-100">
                                <p class="text-[8px] font-bold text-slate-400 uppercase leading-none mb-0.5">Espécie</p>
                                <p class="text-[10px] font-bold text-slate-700 leading-none">${formatCurrency(s.din)}</p>
                            </div>
                            <div class="bg-indigo-50 rounded-lg px-2 py-1 text-center border border-indigo-100">
                                <p class="text-[8px] font-bold text-indigo-400 uppercase leading-none mb-0.5">Total</p>
                                <p class="text-[10px] font-extrabold text-indigo-700 leading-none">${formatCurrency(s.total)}</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-1 ml-1">
                        ${checked
                            ? `<span class="text-[9px] font-bold text-indigo-600 bg-indigo-50 border border-indigo-200 px-2 py-0.5 rounded-full uppercase whitespace-nowrap">Lançado</span>`
                            : `<span class="text-[9px] font-bold text-slate-400 bg-slate-100 border border-slate-200 px-2 py-0.5 rounded-full uppercase whitespace-nowrap">Pendente</span>`}
                    </div>
                </div>`;
            });

            lista.innerHTML = html;
            atualizarProgressoSgaf(marcados, total);
            if (window.lucide) window.lucide.createIcons();
        }

        function atualizarProgressoSgaf(marcados, total) {
            document.getElementById('sgafProgressText').textContent = `${marcados}/${total}`;
            const pct = total > 0 ? Math.round((marcados / total) * 100) : 0;
            document.getElementById('sgafProgressBar').style.width = pct + '%';
        }

        window.toggleSgaf = async function(idx, chave, mes) {
            const novo = !sgafChecks[chave];
            sgafChecks[chave] = novo;

            const item = document.getElementById(`sgaf-item-${idx}`);
            const box = document.getElementById(`sgaf-box-${idx}`);

            item.classList.toggle('checked', novo);
            box.classList.toggle('checked', novo);
            box.innerHTML = novo
                ? `<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`
                : '';

            const badge = item.querySelector('.flex.flex-col span');
            if (badge) {
                if (novo) {
                    badge.textContent = 'Lançado';
                    badge.className = 'text-[9px] font-bold text-indigo-600 bg-indigo-50 border border-indigo-200 px-2 py-0.5 rounded-full uppercase whitespace-nowrap';
                } else {
                    badge.textContent = 'Pendente';
                    badge.className = 'text-[9px] font-bold text-slate-400 bg-slate-100 border border-slate-200 px-2 py-0.5 rounded-full uppercase whitespace-nowrap';
                }
            }

            // Recalcula progresso
            const saldosMes = saldosData.filter(s => s.competencia === mes);
            const marcados = saldosMes.filter((_, i) => {
                const k = `${i}_${normalizeString(saldosMes[i].nomeOriginal)}`;
                return !!sgafChecks[k];
            }).length;
            atualizarProgressoSgaf(marcados, saldosMes.length);

            try {
                await setDoc(doc(db, "checklist_sgaf", mes), { checks: sgafChecks, updatedAt: new Date().toISOString() });
                showToast(novo ? '✓ Lançado no SGAF' : 'Desmarcado', novo ? '#4338ca' : '#64748b');
            } catch (e) {
                showToast('Erro ao salvar!', '#dc2626');
                console.error(e);
            }
        };

        // ─── Init ─────────────────────────────────────────────────────────────
        async function init() {
            const meses = gerarMeses(18);
            // Mês atual como padrão
            const hoje = new Date();
            const mesAtual = `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;
            const mesPadrao = meses.includes(mesAtual) ? mesAtual : meses[0];

            preencherSelect('caixaMes', meses, mesPadrao);
            preencherSelect('sgafMes', meses, mesPadrao);

            document.getElementById('caixaMes').addEventListener('change', carregarCaixa);
            document.getElementById('sgafMes').addEventListener('change', carregarSgaf);

            try {
                await Promise.all([carregarIgrejas(), carregarSaldos()]);
                await carregarCaixa();
                await carregarSgaf();
            } catch (e) {
                console.error("Erro ao inicializar:", e);
                document.getElementById('caixaLista').innerHTML = `<div class="bg-rose-50 border border-rose-200 rounded-xl p-6 text-center"><p class="text-rose-700 font-bold">Erro ao carregar dados.</p></div>`;
                document.getElementById('sgafLista').innerHTML = `<div class="bg-rose-50 border border-rose-200 rounded-xl p-6 text-center"><p class="text-rose-700 font-bold">Erro ao carregar dados.</p></div>`;
            }

            if (window.lucide) window.lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
