<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Avisos — Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.300.0"></script>
    <script type="module">
        import { requireAuth, hasAnyPermission, hasPermission, getCurrentIgreja, getCurrentEmail } from './js/auth.js';
        try {
            const user = await requireAuth();
            const allowed = ['admin','secretario','superintendente','pastor_titular','coordenador','obreiro'];
            if (!hasAnyPermission(allowed)) window.location.replace('index.html');
            window.__authReady = true;
        } catch (e) {}
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #334155; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="w-full shadow-sm bg-white border-b sticky top-0 z-30">
        <div class="max-w-5xl mx-auto px-4 py-1.5">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo.png" alt="Logo IEQ" class="h-8 w-auto object-contain" onerror="this.src='https://via.placeholder.com/32?text=IEQ'">
                    <div class="border-l border-gray-200 pl-2">
                        <div class="text-xs font-bold text-slate-800 leading-none">Região 655</div>
                        <div class="text-[9px] font-medium text-slate-500 uppercase leading-none mt-0.5">Londrina/PR</div>
                    </div>
                </a>
                <div class="flex items-center gap-3">
                    <a href="relatorio_avisos.html" id="lnk-relatorio" class="text-[10px] font-semibold text-emerald-600 hover:text-emerald-700 flex items-center gap-1 uppercase tracking-wider px-2 py-1 rounded-lg hover:bg-emerald-50 transition-colors">
                        <i data-lucide="file-text" class="w-3 h-3"></i> Relatório
                    </a>
                    <a href="editpagpastores.html" class="text-[10px] font-semibold text-blue-600 hover:text-blue-700 flex items-center gap-1 uppercase tracking-wider px-2 py-1 rounded-lg hover:bg-blue-50 transition-colors">
                        <i data-lucide="settings" class="w-3 h-3"></i> Editar Painel
                    </a>
                    <a href="index.html" class="text-[10px] font-semibold text-slate-500 hover:text-blue-600 flex items-center gap-1 uppercase tracking-wider">
                        <i data-lucide="arrow-left" class="w-3 h-3"></i> Painel Admin
                    </a>
                </div>
            </div>
        </div>
        <div class="header-gradient py-3 px-4">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <h1 class="text-sm md:text-base font-bold text-white tracking-wide uppercase flex items-center gap-2">
                    <i data-lucide="bell-ring" class="w-5 h-5"></i> Controle de Avisos
                </h1>
                <div class="flex items-center gap-2">
                    <button onclick="carregarTudo()" class="p-2 text-white/70 hover:text-white hover:bg-white/10 rounded-lg transition-colors" title="Atualizar">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    </button>
                    <button id="btn-novo-aviso" onclick="abrirModalNovo()" class="bg-white/10 hover:bg-white/20 text-white font-bold text-[10px] uppercase tracking-wider px-4 py-2 rounded-lg flex items-center gap-1.5 transition-colors border border-white/20">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i> Novo Aviso
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-5xl w-full mx-auto px-4 py-6 space-y-6">

        <div id="loading" class="flex items-center justify-center py-20">
            <div class="flex flex-col items-center gap-3">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
                <p class="text-slate-500 text-sm font-semibold">Carregando avisos...</p>
            </div>
        </div>

        <div id="content" class="hidden space-y-8">

            <!-- Avisos Ativos -->
            <div>
                <div class="flex items-center gap-3 mb-4">
                    <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse inline-block"></span>
                    <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest">Avisos Ativos</h2>
                    <span id="badge-ativos" class="text-[10px] font-black bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="lista-ativos" class="space-y-4"></div>
            </div>

            <!-- Avisos Arquivados -->
            <div>
                <button onclick="toggleArquivados()" class="w-full flex items-center justify-between bg-white rounded-2xl border border-slate-200 shadow-sm px-5 py-3.5 hover:bg-slate-50 transition-colors">
                    <div class="flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-slate-300 inline-block"></span>
                        <h2 class="text-sm font-black text-slate-600 uppercase tracking-widest">Avisos Arquivados</h2>
                        <span id="badge-arquivados" class="text-[10px] font-black bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">0</span>
                    </div>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 transition-transform" id="chev-arquivados"></i>
                </button>
                <div id="lista-arquivados" class="hidden space-y-4 mt-4"></div>
            </div>

        </div>
    </main>

    <!-- Modal Novo / Editar Aviso -->
    <div id="modal-aviso" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden">
            <div class="bg-slate-800 px-5 py-4 flex items-center justify-between">
                <h3 id="modal-titulo" class="text-white font-bold text-sm uppercase tracking-wide"></h3>
                <button onclick="fecharModal()" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="modal-doc-id">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Tipo de Aviso</label>
                    <select id="modal-tipo" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-semibold focus:ring-2 focus:ring-blue-500">
                        <option value="info">🔵 Informativo</option>
                        <option value="warning">🟡 Alerta</option>
                        <option value="danger">🔴 Urgente</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Mensagem *</label>
                    <textarea id="modal-texto" rows="4" placeholder="Digite o aviso aqui..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm resize-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Destinatário</label>
                    <select id="modal-destinatario" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-semibold focus:ring-2 focus:ring-blue-500">
                        <option value="TODOS">📢 Todos os pastores</option>
                    </select>
                    <p class="text-[10px] text-slate-400 mt-1">Para enviar exclusivamente para uma igreja, selecione-a acima.</p>
                </div>
            </div>
            <div class="px-6 pb-6 flex gap-3">
                <button onclick="fecharModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl text-xs uppercase tracking-wider transition-colors">Cancelar</button>
                <button onclick="salvarAviso()" id="btn-salvar-aviso" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider transition-colors shadow-lg">Salvar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import {
            collection, getDocs, doc, addDoc, updateDoc, deleteDoc,
            serverTimestamp, query, orderBy
        } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        lucide.createIcons();

        const BASE_URL = window.location.origin + window.location.pathname.replace('controle_avisos.html','') + 'index.html';
        const userEmail = localStorage.getItem('userEmail') || 'admin';
        const userPerms = JSON.parse(localStorage.getItem('userPerms') || '[]');
        const userIgreja = localStorage.getItem('userIgreja') || '';
        const podeEditar = userPerms.includes('admin') || userPerms.includes('secretario') || userPerms.includes('superintendente');
        const isPastorLevel = userPerms.includes('pastor_titular') || userPerms.includes('coordenador') || userPerms.includes('obreiro');

        let allAvisos    = [];
        let allIgrejas   = [];
        let allPastores  = [];
        let allCiencias  = [];
        let igrejasLista = []; // igrejas pastorais (sem regionais), para selects

        const TIPO = {
            info:    { badge:'bg-blue-100 text-blue-700',    icon:'ℹ️', label:'Informativo' },
            warning: { badge:'bg-amber-100 text-amber-700',  icon:'⚠️', label:'Alerta' },
            danger:  { badge:'bg-red-100 text-red-700',      icon:'🚨', label:'Urgente' }
        };

        window.carregarTudo = async () => {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('content').classList.add('hidden');
            try {
                const [avisosSnap, igSnap, pastSnap, cienSnap] = await Promise.all([
                    getDocs(query(collection(db, 'avisos'), orderBy('criadoEm', 'desc'))),
                    getDocs(collection(db, 'igrejas')),
                    getDocs(collection(db, 'pastores')),
                    getDocs(collection(db, 'avisos_ciencia'))
                ]);

                allAvisos   = []; avisosSnap.forEach(d => allAvisos.push({ docId: d.id, ...d.data() }));
                allIgrejas  = []; igSnap.forEach(d => allIgrejas.push(d.data()));
                allPastores = []; pastSnap.forEach(d => allPastores.push(d.data()));
                allCiencias = []; cienSnap.forEach(d => allCiencias.push({ docId: d.id, ...d.data() }));

                igrejasLista = allIgrejas
                    .filter(ig => ig.tipo !== 'Região Eclesiástica' && ig.tipo !== 'Sede Regional')
                    .sort((a, b) => String(a.codigo||'').localeCompare(String(b.codigo||'')));

                renderAll();
            } catch(e) {
                console.error(e);
                document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold text-center">Erro ao carregar: ${e.message}</p>`;
            }
        };

        // ── helpers ──────────────────────────────────────────────────────

        function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        function fmtDate(ts) {
            if (!ts) return '—';
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }

        function getTitular(igrejaNome) {
            return allPastores.find(p =>
                p.funcao === 'Pastor Titular' &&
                (Array.isArray(p.igreja) ? p.igreja.includes(igrejaNome) : p.igreja === igrejaNome)
            );
        }

        function getConf(aviso) {
            let ciencias  = allCiencias.filter(c => c.avisoId === aviso.avisoId);
            const esperadas = aviso.destinatario === 'TODOS'
                ? igrejasLista
                : allIgrejas.filter(ig => ig.nome === aviso.destinatario);

            // Para pastores, filtra ciências apenas da sua própria igreja
            if (isPastorLevel && userIgreja) {
                const igKey = userIgreja.toLowerCase();
                ciencias = ciencias.filter(c => (c.igrejaNome||'').toLowerCase() === igKey);
            }

            const confSet   = new Set(ciencias.map(c => (c.igrejaNome||'').toLowerCase()));
            return {
                total:       esperadas.length,
                confirmadas: esperadas.filter(ig => confSet.has((ig.nome||'').toLowerCase())).length,
                pendentes:   esperadas.filter(ig => !confSet.has((ig.nome||'').toLowerCase())),
                ciencias
            };
        }

        // ── render ───────────────────────────────────────────────────────

        function renderAll() {
            let avisosVisiveis = allAvisos;
            // Pastores só veem avisos da sua igreja ou TODOS
            if (isPastorLevel && userIgreja) {
                const igKey = userIgreja.toLowerCase();
                avisosVisiveis = allAvisos.filter(a => {
                    const dest = (a.destinatario || 'TODOS');
                    return dest === 'TODOS' || dest.toLowerCase() === igKey;
                });
            }

            const ativos     = avisosVisiveis.filter(a => a.status === 'ativo');
            const arquivados = avisosVisiveis.filter(a => a.status !== 'ativo');

            document.getElementById('badge-ativos').textContent     = ativos.length;
            document.getElementById('badge-arquivados').textContent = arquivados.length;

            const listaA = document.getElementById('lista-ativos');
            listaA.innerHTML = '';
            if (ativos.length) ativos.forEach(a => listaA.appendChild(renderCard(a)));
            else listaA.innerHTML = '<p class="text-sm text-slate-400 italic text-center py-10 bg-white rounded-2xl border border-slate-200">Nenhum aviso ativo no momento.</p>';

            const listaArq = document.getElementById('lista-arquivados');
            listaArq.innerHTML = '';
            if (arquivados.length) arquivados.forEach(a => listaArq.appendChild(renderCard(a)));
            else listaArq.innerHTML = '<p class="text-sm text-slate-400 italic text-center py-8 bg-white rounded-2xl border border-dashed border-slate-200">Nenhum aviso arquivado.</p>';

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
            lucide.createIcons();
        }

        function renderCard(aviso) {
            const t        = TIPO[aviso.tipo] || TIPO.info;
            const conf     = getConf(aviso);
            const ativo    = aviso.status === 'ativo';
            const destLabel = aviso.destinatario === 'TODOS' ? '📢 Todos' : `🏛️ ${aviso.destinatario}`;
            const pct      = conf.total > 0 ? Math.round(conf.confirmadas / conf.total * 100) : 0;

            const pendentesHTML = conf.pendentes.map(ig => {
                const titular = getTitular(ig.nome);
                const cod = String(ig.codigo||'').padStart(4,'0');
                return `<div class="flex items-center justify-between gap-2 py-1.5 border-b border-slate-50 last:border-0">
                    <div class="min-w-0">
                        <p class="text-[11px] font-bold text-slate-700">${cod} — ${esc(ig.nome)}</p>
                        <p class="text-[10px] text-slate-400">${esc(titular?.nome || '(sem titular)')}</p>
                    </div>
                    ${ativo && podeEditar ? `<div class="flex gap-1 flex-shrink-0">
                        <button data-aviso-id="${esc(aviso.avisoId)}" data-telefone="${esc(titular?.telefone||'')}" onclick="enviarWABtn(this,1)" title="Comunicado leve" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-600 border border-emerald-200 p-1.5 rounded-lg transition-colors"><i data-lucide="message-circle" class="w-3.5 h-3.5"></i></button>
                        <button data-aviso-id="${esc(aviso.avisoId)}" data-telefone="${esc(titular?.telefone||'')}" onclick="enviarWABtn(this,2)" title="Lembrete" class="bg-amber-50 hover:bg-amber-100 text-amber-600 border border-amber-200 p-1.5 rounded-lg transition-colors"><i data-lucide="message-circle" class="w-3.5 h-3.5"></i></button>
                        <button data-aviso-id="${esc(aviso.avisoId)}" data-telefone="${esc(titular?.telefone||'')}" onclick="enviarWABtn(this,3)" title="Reforço" class="bg-red-50 hover:bg-red-100 text-red-500 border border-red-200 p-1.5 rounded-lg transition-colors"><i data-lucide="message-circle" class="w-3.5 h-3.5"></i></button>
                    </div>` : ''}
                </div>`;
            }).join('');

            const confirmadasHTML = conf.ciencias
                .slice()
                .sort((a,b) => (a.igrejaNome||'').localeCompare(b.igrejaNome||''))
                .map(c => `<div class="flex items-center gap-2 text-[11px] py-0.5">
                    <span class="text-emerald-500 font-black">✓</span>
                    <span class="font-semibold text-slate-700">${esc(c.igrejaNome)}</span>
                    <span class="text-slate-400 text-[10px]">${fmtDate(c.dataHora)}</span>
                </div>`).join('');

            const div = document.createElement('div');
            div.className = 'bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden';
            div.innerHTML = `
            <div class="p-5">
                <div class="flex items-start gap-3">
                    <span class="text-2xl flex-shrink-0 mt-0.5">${t.icon}</span>
                    <div class="flex-1 min-w-0">
                        <div class="flex flex-wrap items-center gap-2 mb-2">
                            <span class="text-[9px] font-black uppercase tracking-widest px-2 py-0.5 rounded-full ${t.badge}">${t.label}</span>
                            <span class="text-[9px] font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-full">${esc(destLabel)}</span>
                            ${ativo
                                ? '<span class="text-[9px] font-black uppercase px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700">● Ativo</span>'
                                : '<span class="text-[9px] font-black uppercase px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">Arquivado</span>'}
                        </div>
                        <p class="text-sm font-bold text-slate-800 leading-snug whitespace-pre-wrap">${esc(aviso.texto)}</p>
                        <p class="text-[10px] text-slate-400 mt-1.5">${fmtDate(aviso.criadoEm)}</p>
                    </div>
                </div>

                <!-- Barra de progresso -->
                <div class="mt-4 flex items-center gap-3">
                    <div class="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden">
                        <div class="h-full rounded-full transition-all ${pct === 100 ? 'bg-emerald-500' : 'bg-blue-400'}" style="width:${pct}%"></div>
                    </div>
                    <span class="text-xs font-black text-slate-700 flex-shrink-0">${conf.confirmadas}/${conf.total}</span>
                    <button onclick="toggleConf('${aviso.docId}')" class="text-[10px] font-bold flex items-center gap-1 flex-shrink-0 ${conf.pendentes.length > 0 ? 'text-red-500 hover:text-red-700' : 'text-emerald-600 hover:text-emerald-800'}">
                        <i data-lucide="chevron-down" id="chev-conf-${aviso.docId}" class="w-3.5 h-3.5 transition-transform"></i>
                        ${conf.pendentes.length > 0 ? `${conf.pendentes.length} pendentes` : 'Todos confirmaram'}
                    </button>
                </div>

                <!-- Painel de confirmações (colapsável) -->
                <div id="conf-${aviso.docId}" class="hidden mt-4 pt-4 border-t border-slate-100 space-y-4">
                    ${conf.confirmadas > 0 ? `
                    <div>
                        <p class="text-[9px] font-black uppercase tracking-widest text-emerald-600 mb-2">✓ Confirmados (${conf.confirmadas})</p>
                        <div class="space-y-0">${confirmadasHTML}</div>
                    </div>` : ''}
                    ${conf.pendentes.length > 0 ? `
                    <div>
                        <p class="text-[9px] font-black uppercase tracking-widest text-red-500 mb-2">⏳ Pendentes (${conf.pendentes.length})</p>
                        <div>${pendentesHTML}</div>
                    </div>` : ''}
                    ${conf.total === 0 ? '<p class="text-[11px] text-slate-400 italic">Nenhum destinatário encontrado.</p>' : ''}
                </div>

                <!-- Ações -->
                ${podeEditar ? `
                <div class="mt-4 pt-4 border-t border-slate-100 flex flex-wrap gap-2 items-center">
                    <button data-doc-id="${aviso.docId}" onclick="abrirModalEditar(this.dataset.docId)"
                        class="text-[10px] font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors">
                        <i data-lucide="edit-2" class="w-3 h-3"></i> Editar
                    </button>
                    ${ativo
                        ? `<button data-doc-id="${aviso.docId}" onclick="toggleStatus(this.dataset.docId,'inativo')"
                            class="text-[10px] font-bold text-amber-600 bg-amber-50 hover:bg-amber-100 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors">
                            <i data-lucide="archive" class="w-3 h-3"></i> Arquivar
                           </button>`
                        : `<button data-doc-id="${aviso.docId}" onclick="toggleStatus(this.dataset.docId,'ativo')"
                            class="text-[10px] font-bold text-emerald-600 bg-emerald-50 hover:bg-emerald-100 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors">
                            <i data-lucide="play" class="w-3 h-3"></i> Reativar
                           </button>`
                    }
                    <button data-doc-id="${aviso.docId}" onclick="excluirAviso(this.dataset.docId)"
                        class="text-[10px] font-bold text-red-500 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors ml-auto">
                        <i data-lucide="trash-2" class="w-3 h-3"></i> Excluir
                    </button>
                </div>` : `
                <div class="mt-4 pt-4 border-t border-slate-100">
                    <p class="text-[10px] text-slate-400 italic text-center">Você está em modo leitura. Apenas administradores podem editar avisos.</p>
                </div>`}
            </div>`;
            return div;
        }

        // ── interações ───────────────────────────────────────────────────

        window.toggleConf = (docId) => {
            const el = document.getElementById(`conf-${docId}`);
            const ch = document.getElementById(`chev-conf-${docId}`);
            el.classList.toggle('hidden');
            ch.style.transform = el.classList.contains('hidden') ? '' : 'rotate(180deg)';
            lucide.createIcons();
        };

        window.toggleArquivados = () => {
            const el = document.getElementById('lista-arquivados');
            const ch = document.getElementById('chev-arquivados');
            el.classList.toggle('hidden');
            ch.style.transform = el.classList.contains('hidden') ? '' : 'rotate(180deg)';
        };

        window.toggleStatus = async (docId, novoStatus) => {
            try {
                await updateDoc(doc(db, 'avisos', docId), { status: novoStatus });
                await carregarTudo();
            } catch(e) { alert('Erro: ' + e.message); }
        };

        window.excluirAviso = async (docId) => {
            const aviso = allAvisos.find(a => a.docId === docId);
            if (!aviso) return;
            const preview = (aviso.texto || '').substring(0, 80) + (aviso.texto?.length > 80 ? '...' : '');
            if (!confirm(`Excluir este aviso?\n\n"${preview}"\n\nIsso também apaga todas as confirmações de leitura. Ação irreversível.`)) return;
            try {
                const ciencias = allCiencias.filter(c => c.avisoId === aviso.avisoId);
                await Promise.all(ciencias.map(c => deleteDoc(doc(db, 'avisos_ciencia', c.docId))));
                await deleteDoc(doc(db, 'avisos', docId));
                await carregarTudo();
            } catch(e) { alert('Erro: ' + e.message); }
        };

        window.enviarWABtn = (btn, nivel) => {
            const avisoId  = btn.dataset.avisoId;
            const telefone = btn.dataset.telefone;
            const link = `${BASE_URL}?confirmar_aviso=${encodeURIComponent(avisoId)}`;
            const msgs = [
                null,
                `*Escritório da Região 655*\n_Londrina/PR_\n\nOlá, pastor! 😊\n\nPassamos para informar que há um comunicado disponível em seu painel do Portal da Região 655, aguardando a sua confirmação de leitura.\n\nQuando tiver um momento, acesse pelo link abaixo:\n\n🔗 ${link}\n\nObrigado pela atenção!`,
                `*Escritório da Região 655*\n_Londrina/PR_\n\n⚠️ *Lembrete, pastor!*\n\nConforme já comunicado, há um aviso em seu painel do portal que ainda aguarda a sua confirmação de leitura.\n\nPedimos que acesse e registre sua confirmação assim que possível:\n\n🔗 ${link}\n\nContamos com sua colaboração!`,
                `*🚨 Escritório da Região 655*\n_Londrina/PR_\n\n*Pastor, precisamos da sua atenção!*\n\nReforçamos que há um aviso em seu painel do portal que, até o momento, ainda não recebeu a sua confirmação de leitura. Pedimos que isso seja regularizado o quanto antes.\n\nAcesse pelo link abaixo:\n\n🔗 ${link}\n\nAguardamos sua confirmação!`
            ];
            const msg = msgs[nivel] || msgs[1];
            let num = telefone.replace(/\D/g, '');
            if (num.length >= 10 && num.length <= 11) num = '55' + num;
            const wa = num ? `https://wa.me/${num}?text=${encodeURIComponent(msg)}` : `https://wa.me/?text=${encodeURIComponent(msg)}`;
            window.open(wa, '_blank');
        };

        // ── modal ────────────────────────────────────────────────────────

        function popularDestIgrejas(valorAtual) {
            const sel = document.getElementById('modal-destinatario');
            sel.innerHTML = '<option value="TODOS">📢 Todos os pastores</option>';
            igrejasLista.forEach(ig => {
                const opt = document.createElement('option');
                opt.value = ig.nome;
                opt.textContent = `${String(ig.codigo||'').padStart(4,'0')} — ${ig.nome}`;
                sel.appendChild(opt);
            });
            sel.value = valorAtual || 'TODOS';
        }

        window.abrirModalNovo = () => {
            popularDestIgrejas('TODOS');
            document.getElementById('modal-doc-id').value  = '';
            document.getElementById('modal-titulo').textContent = '+ Novo Aviso';
            document.getElementById('modal-tipo').value    = 'info';
            document.getElementById('modal-texto').value   = '';
            document.getElementById('modal-aviso').classList.remove('hidden');
            setTimeout(() => document.getElementById('modal-texto').focus(), 60);
        };

        window.abrirModalEditar = (docId) => {
            const aviso = allAvisos.find(a => a.docId === docId);
            if (!aviso) return;
            popularDestIgrejas(aviso.destinatario);
            document.getElementById('modal-doc-id').value  = docId;
            document.getElementById('modal-titulo').textContent = 'Editar Aviso';
            document.getElementById('modal-tipo').value    = aviso.tipo || 'info';
            document.getElementById('modal-texto').value   = aviso.texto || '';
            document.getElementById('modal-aviso').classList.remove('hidden');
        };

        window.fecharModal = () => document.getElementById('modal-aviso').classList.add('hidden');

        window.salvarAviso = async () => {
            const texto = document.getElementById('modal-texto').value.trim();
            if (!texto) { document.getElementById('modal-texto').focus(); return; }

            const tipo         = document.getElementById('modal-tipo').value;
            const destinatario = document.getElementById('modal-destinatario').value;
            const docId        = document.getElementById('modal-doc-id').value;
            const btn          = document.getElementById('btn-salvar-aviso');
            btn.disabled = true; btn.textContent = 'Salvando...';

            try {
                if (docId) {
                    const avisoAtual = allAvisos.find(a => a.docId === docId);
                    // Novo avisoId se texto mudou (invalida ciências antigas)
                    const novoAvisoId = texto !== (avisoAtual?.texto || '')
                        ? 'aviso_' + Date.now()
                        : avisoAtual.avisoId;
                    await updateDoc(doc(db, 'avisos', docId), { texto, tipo, destinatario, avisoId: novoAvisoId });
                } else {
                    await addDoc(collection(db, 'avisos'), {
                        texto, tipo, destinatario,
                        status:    'ativo',
                        avisoId:   'aviso_' + Date.now(),
                        criadoEm:  serverTimestamp(),
                        criadoPor: userEmail
                    });
                }
                fecharModal();
                await carregarTudo();
            } catch(e) {
                console.error(e);
                alert('Erro ao salvar: ' + e.message);
            } finally {
                btn.disabled = false; btn.textContent = 'Salvar';
            }
        };

        document.getElementById('modal-aviso').addEventListener('click', function(e) {
            if (e.target === this) fecharModal();
        });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharModal(); });

        const podeVerRelatorio = podeEditar || userPerms.includes('pastor_titular');

        window.onload = () => {
            // Controle de visibilidade baseado em permissão
            if (!podeEditar) {
                const btnNovo = document.getElementById('btn-novo-aviso');
                if (btnNovo) btnNovo.style.display = 'none';
                const lnkEditPainel = document.querySelector('a[href="editpagpastores.html"]');
                if (lnkEditPainel) lnkEditPainel.style.display = 'none';
            }
            if (!podeVerRelatorio) {
                const lnkRel = document.getElementById('lnk-relatorio');
                if (lnkRel) lnkRel.style.display = 'none';
            }
            window.carregarTudo();
        };
    </script>
</body>
</html>
