<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Avisos — Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        const permsStr = localStorage.getItem('userPerms');
        let isAdmin = false;
        try { if (permsStr) isAdmin = JSON.parse(permsStr).includes('admin'); } catch(e) {}
        if (!isAdmin) window.location.replace('index.html');
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #334155; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="w-full shadow-sm bg-white border-b sticky top-0 z-30">
        <div class="max-w-6xl mx-auto px-4 py-1.5">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo.png" alt="Logo IEQ" class="h-8 w-auto object-contain" onerror="this.src='https://via.placeholder.com/32?text=IEQ'">
                    <div class="border-l border-gray-200 pl-2">
                        <div class="text-xs font-bold text-slate-800 leading-none">Região 655</div>
                        <div class="text-[9px] font-medium text-slate-500 uppercase leading-none mt-0.5">Londrina/PR</div>
                    </div>
                </a>
                <div class="flex items-center gap-3">
                    <a href="editpagpastores.html" class="text-[10px] font-semibold text-blue-600 hover:text-blue-700 flex items-center gap-1 uppercase tracking-wider px-2 py-1 rounded-lg hover:bg-blue-50 transition-colors">
                        <i data-lucide="settings" class="w-3 h-3"></i> Editar Painel
                    </a>
                    <a href="index.html" class="text-[10px] font-semibold text-slate-500 hover:text-blue-600 flex items-center gap-1 uppercase tracking-wider">
                        <i data-lucide="arrow-left" class="w-3 h-3"></i> Painel Admin
                    </a>
                </div>
            </div>
        </div>
        <div class="header-gradient py-3 px-4">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <h1 class="text-sm md:text-base font-bold text-white tracking-wide uppercase flex items-center gap-2">
                    <i data-lucide="check-square" class="w-5 h-5"></i> Controle de Leitura de Avisos
                </h1>
                <button onclick="carregarDados()" class="p-2 text-white/70 hover:text-white hover:bg-white/10 rounded-lg transition-colors" title="Atualizar">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto px-4 py-6 space-y-4">

        <!-- AVISO ATUAL -->
        <div id="aviso-atual" class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 space-y-2">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Carregando...</p>
        </div>

        <!-- KPIs -->
        <div class="grid grid-cols-3 gap-4">
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total de Igrejas</p>
                <p id="kpi-total" class="text-2xl font-black text-slate-700">—</p>
            </div>
            <div class="bg-white rounded-2xl border border-emerald-200 shadow-sm p-4 border-b-4 border-b-emerald-500">
                <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mb-1">Confirmaram</p>
                <p id="kpi-confirmaram" class="text-2xl font-black text-emerald-600">—</p>
            </div>
            <div class="bg-white rounded-2xl border border-red-200 shadow-sm p-4 border-b-4 border-b-red-500">
                <p class="text-[10px] font-bold text-red-500 uppercase tracking-widest mb-1">Pendentes</p>
                <p id="kpi-pendentes" class="text-2xl font-black text-red-500">—</p>
            </div>
        </div>

        <!-- FILTRO -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 flex flex-wrap gap-3 items-center">
            <select id="filtroStatus" onchange="renderTabela()" class="p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-semibold outline-none focus:ring-1 focus:ring-blue-400">
                <option value="todos">Todos</option>
                <option value="pendente">Apenas Pendentes</option>
                <option value="confirmado">Apenas Confirmados</option>
            </select>
            <input type="text" id="filtroBusca" oninput="renderTabela()" placeholder="Buscar igreja / pastor..."
                class="flex-1 min-w-[180px] p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-semibold outline-none focus:ring-1 focus:ring-blue-400">
        </div>

        <!-- TABELA -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left whitespace-nowrap">
                    <thead>
                        <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 bg-slate-50">
                            <th class="px-4 py-3">Igreja / Pastor</th>
                            <th class="px-4 py-3 text-center">Status</th>
                            <th class="px-4 py-3 text-center">Data / Hora da Confirmação</th>
                            <th class="px-4 py-3 text-center">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo" class="divide-y divide-slate-50">
                        <tr><td colspan="4" class="text-center py-10 text-slate-400 text-xs font-bold uppercase">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        lucide.createIcons();

        let dadosTabela = []; // { igrejaNome, pastor, celPastor, confirmou, dataHora }
        let avisoAtual  = {};

        const BASE_URL = window.location.origin + window.location.pathname.replace('controle_avisos.html','') + 'index.html';

        window.carregarDados = async () => {
            document.getElementById('tabela-corpo').innerHTML =
                '<tr><td colspan="4" class="text-center py-10 text-blue-500 text-xs font-bold"><div class="animate-spin inline-block w-4 h-4 border-2 border-blue-600 border-t-transparent rounded-full mr-2 align-middle"></div> Buscando...</td></tr>';

            try {
                const [cfgSnap, igrejasSnap, pastoresSnap] = await Promise.all([
                    getDoc(doc(db, 'configuracoes', 'painel_pastores')),
                    getDocs(collection(db, 'igrejas')),
                    getDocs(collection(db, 'pastores'))
                ]);

                avisoAtual = cfgSnap.exists() ? cfgSnap.data() : {};
                const avisoId   = avisoAtual.avisoId   || '';
                const avisoTexto = avisoAtual.avisoTexto || '';
                const avisoTipo  = avisoAtual.avisoTipo  || 'none';

                // Exibe aviso atual
                const aEl = document.getElementById('aviso-atual');
                if (!avisoId || avisoTipo === 'none') {
                    aEl.innerHTML = `<p class="text-sm text-slate-400 italic">Nenhum aviso ativo no momento.</p>`;
                } else {
                    const icons = { info:'ℹ️', warning:'⚠️', danger:'🚨' };
                    const colors = { info:'text-blue-600', warning:'text-amber-500', danger:'text-red-500' };
                    aEl.innerHTML = `
                        <div class="flex items-start gap-3">
                            <span class="text-2xl">${icons[avisoTipo]||'📋'}</span>
                            <div>
                                <p class="text-[10px] font-bold uppercase tracking-widest ${colors[avisoTipo]||'text-slate-500'} mb-1">Aviso Ativo</p>
                                <p class="text-sm font-bold text-slate-800">${esc(avisoTexto)}</p>
                                <p class="text-[10px] text-slate-400 mt-1 font-mono">${avisoId}</p>
                            </div>
                        </div>`;
                }

                // Carrega ciências para este aviso
                let ciencias = [];
                if (avisoId) {
                    const cSnap = await getDocs(query(collection(db, 'avisos_ciencia'), where('avisoId', '==', avisoId)));
                    cSnap.forEach(d => ciencias.push(d.data()));
                }
                const cienciaMap = {}; // igrejaNome_lower → { dataHora }
                ciencias.forEach(c => { cienciaMap[(c.igrejaNome||'').toLowerCase()] = c; });

                // Monta lista de igrejas com titular
                const igrejas  = []; igrejasSnap.forEach(d => igrejas.push(d.data()));
                const pastores = []; pastoresSnap.forEach(d => pastores.push(d.data()));

                dadosTabela = [];
                igrejas
                    .filter(ig => ig.tipo !== 'Região Eclesiástica' && ig.tipo !== 'Sede Regional')
                    .sort((a,b) => String(a.codigo).localeCompare(String(b.codigo)))
                    .forEach(ig => {
                        const cod = String(ig.codigo).padStart(4,'0');
                        const titular = pastores.find(p =>
                            p.funcao === 'Pastor Titular' &&
                            (Array.isArray(p.igreja) ? p.igreja.includes(ig.nome) : p.igreja === ig.nome)
                        );
                        const ciencia = cienciaMap[ig.nome.toLowerCase()];
                        dadosTabela.push({
                            igrejaNome: `${cod} — ${ig.nome}`,
                            pastor: titular?.nome || '(sem titular)',
                            celPastor: titular?.telefone || '',
                            confirmou: !!ciencia,
                            dataHora: ciencia?.dataHora || null
                        });
                    });

                renderTabela();
                renderKpis();

            } catch(e) {
                console.error(e);
                document.getElementById('tabela-corpo').innerHTML =
                    `<tr><td colspan="4" class="text-center py-8 text-red-500 text-xs font-bold">Erro: ${e.message}</td></tr>`;
            }
        };

        window.renderTabela = () => {
            const tbody  = document.getElementById('tabela-corpo');
            const status = document.getElementById('filtroStatus').value;
            const busca  = (document.getElementById('filtroBusca').value || '').toLowerCase();

            const filtrados = dadosTabela.filter(d => {
                if (status === 'pendente'   && d.confirmou)  return false;
                if (status === 'confirmado' && !d.confirmou) return false;
                if (busca && !d.igrejaNome.toLowerCase().includes(busca) && !d.pastor.toLowerCase().includes(busca)) return false;
                return true;
            });

            tbody.innerHTML = '';
            if (!filtrados.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-slate-400 text-xs font-bold uppercase">Nenhum resultado encontrado.</td></tr>';
                return;
            }

            filtrados.forEach(d => {
                const dtFmt = d.dataHora
                    ? (d.dataHora.toDate ? d.dataHora.toDate().toLocaleString('pt-BR') : new Date(d.dataHora).toLocaleString('pt-BR'))
                    : '—';

                const statusBadge = d.confirmou
                    ? `<span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded font-black text-[9px] uppercase tracking-wide">✓ Confirmado</span>`
                    : `<span class="bg-red-100 text-red-600 px-2 py-0.5 rounded font-black text-[9px] uppercase tracking-wide">Pendente</span>`;

                const acaoBtns = d.confirmou ? '<span class="text-slate-300">—</span>' : `
                    <button onclick="window.enviarLinkConfirmacao('${esc(d.igrejaNome)}','${esc(d.celPastor)}')"
                        class="bg-emerald-50 hover:bg-emerald-100 text-emerald-600 border border-emerald-200 text-[10px] font-bold px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors mx-auto">
                        <i data-lucide="message-circle" class="w-3.5 h-3.5"></i> Enviar Link
                    </button>`;

                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition-colors';
                tr.innerHTML = `
                    <td class="px-4 py-3">
                        <div class="text-xs font-bold text-slate-800">${esc(d.igrejaNome)}</div>
                        <div class="text-[10px] text-slate-500">${esc(d.pastor)}</div>
                    </td>
                    <td class="px-4 py-3 text-center">${statusBadge}</td>
                    <td class="px-4 py-3 text-center text-[10px] font-semibold text-slate-500">${dtFmt}</td>
                    <td class="px-4 py-3 text-center">${acaoBtns}</td>`;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        };

        function renderKpis() {
            const total = dadosTabela.length;
            const conf  = dadosTabela.filter(d => d.confirmou).length;
            document.getElementById('kpi-total').textContent        = total;
            document.getElementById('kpi-confirmaram').textContent  = conf;
            document.getElementById('kpi-pendentes').textContent    = total - conf;
        }

        window.enviarLinkConfirmacao = (igrejaNome, celPastor) => {
            const avisoId = avisoAtual.avisoId || '';
            if (!avisoId) { alert('Nenhum aviso ativo.'); return; }

            const link = `${BASE_URL}?confirmar_aviso=${encodeURIComponent(avisoId)}`;
            const msg = `*ESCRITÓRIO REGIONAL — REGIÃO 655*\n_Londrina/PR_\n━━━━━━━━━━━━━━━━━━━━━━━━\n\nPrezado pastor,\n\nHá um aviso importante no seu painel que ainda aguarda sua confirmação de leitura.\n\n📋 *Aviso:* ${avisoAtual.avisoTexto||''}\n\nPor favor, clique no link abaixo para confirmar a leitura:\n\n${link}\n\nAtenciosamente,\n*Escritório da Região 655*`;

            let num = (celPastor||'').replace(/\D/g,'');
            if (num.length >= 10 && num.length <= 11) num = '55' + num;
            const wa = num ? `https://wa.me/${num}?text=${encodeURIComponent(msg)}` : `https://wa.me/?text=${encodeURIComponent(msg)}`;
            window.open(wa, '_blank');
        };

        function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        window.onload = window.carregarDados;
    </script>
</body>
</html>
