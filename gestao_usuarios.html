<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários e Acessos - Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.300.0"></script>
    <script type="module">
        import { requireAuth, isAdmin } from './js/auth.js';
        try {
            // Garante que o usuário está logado e ativo
            await requireAuth();
            // Garante que apenas administradores acessem esta página
            if (!isAdmin()) window.location.replace('index.html');
        } catch (error) {
            // O próprio requireAuth já redireciona para o login em caso de falha.
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #334155; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .table-custom { font-size: 0.8rem; }
        .table-custom th { padding: 8px 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.025em; }
        .table-custom td { padding: 8px 12px; border-bottom: 1px solid #e2e8f0; }
        .nome-style { font-weight: 700; color: #1e293b; }
    </style>
</head>
<body>

    <!-- CABEÇALHO -->
    <header class="w-full shadow-sm bg-white border-b">
        <div class="max-w-5xl mx-auto px-4 py-1.5">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo.png" alt="Logo IEQ" class="h-8 w-auto object-contain" onerror="this.src='https://via.placeholder.com/32?text=IEQ'">
                    <div class="border-l border-gray-200 pl-2">
                        <div class="text-xs font-bold text-slate-800 leading-none">Região 655</div>
                        <div class="text-[9px] font-medium text-slate-500 uppercase leading-none mt-0.5">Londrina/PR</div>
                    </div>
                </a>
                <a href="index.html" class="text-[10px] font-semibold text-slate-500 hover:text-blue-600 flex items-center gap-1 uppercase tracking-wider">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Painel Admin
                </a>
            </div>
        </div>

        <div class="header-gradient py-3 px-4">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <h1 class="text-sm md:text-base font-bold text-white tracking-wide uppercase">
                    Gestão de Usuários e Acessos
                </h1>
                <button onclick="abrirModal()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] md:text-xs font-bold px-3 py-1.5 rounded flex items-center gap-1 transition-colors uppercase shadow-md">
                    <i data-lucide="user-plus" class="w-3 h-3"></i> Novo Usuário
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto py-6 px-4">
        
        <!-- Tabela de Usuários -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse table-custom whitespace-nowrap">
                    <thead>
                        <tr class="bg-slate-50 text-slate-600 border-b border-slate-200">
                            <th>Nome</th>
                            <th>Permissões Autorizadas</th>
                            <th>Status</th>
                            <th class="w-16 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-usuarios" class="divide-y divide-slate-100">
                        <tr class="animate-pulse"><td><div class="h-4 bg-slate-200 rounded w-48"></div></td><td><div class="h-4 bg-slate-200 rounded w-32"></div></td><td><div class="h-4 bg-slate-200 rounded w-20"></div></td><td><div class="h-4 bg-slate-200 rounded w-12 mx-auto"></div></td></tr>
                        <tr class="animate-pulse"><td><div class="h-4 bg-slate-200 rounded w-40"></div></td><td><div class="h-4 bg-slate-200 rounded w-28"></div></td><td><div class="h-4 bg-slate-200 rounded w-16"></div></td><td><div class="h-4 bg-slate-200 rounded w-12 mx-auto"></div></td></tr>
                        <tr class="animate-pulse"><td><div class="h-4 bg-slate-200 rounded w-52"></div></td><td><div class="h-4 bg-slate-200 rounded w-36"></div></td><td><div class="h-4 bg-slate-200 rounded w-24"></div></td><td><div class="h-4 bg-slate-200 rounded w-12 mx-auto"></div></td></tr>
                        <tr class="animate-pulse"><td><div class="h-4 bg-slate-200 rounded w-36"></div></td><td><div class="h-4 bg-slate-200 rounded w-30"></div></td><td><div class="h-4 bg-slate-200 rounded w-18"></div></td><td><div class="h-4 bg-slate-200 rounded w-12 mx-auto"></div></td></tr>
                        <tr class="animate-pulse"><td><div class="h-4 bg-slate-200 rounded w-44"></div></td><td><div class="h-4 bg-slate-200 rounded w-24"></div></td><td><div class="h-4 bg-slate-200 rounded w-22"></div></td><td><div class="h-4 bg-slate-200 rounded w-12 mx-auto"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Modal de Cadastro/Edição -->
        <div id="modal-usuario" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
                <div class="bg-slate-800 px-5 py-4 flex justify-between items-center">
                    <h2 id="modal-titulo" class="text-white font-bold text-sm uppercase tracking-wide flex items-center gap-2">
                        <i data-lucide="user-plus" class="w-4 h-4"></i> Novo Usuário
                    </h2>
                    <button onclick="fecharModal()" class="text-slate-400 hover:text-white transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <form id="form-usuario" class="p-6 space-y-4">
                    <input type="hidden" id="usuario-id">

                    <!-- Importar de Pastor (somente novo usuário) -->
                    <div id="bloco-importar-pastor">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Importar de Pastor <span class="font-normal text-slate-400 normal-case">(opcional)</span></label>
                        <select id="select-pastor-importar" class="w-full p-2 bg-slate-50 border border-slate-200 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm font-semibold text-slate-700">
                            <option value="">— Preencher manualmente —</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nome Completo</label>
                        <input type="text" id="usuario-nome" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm font-bold text-slate-800" placeholder="Nome do usuário">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">E-mail (Login)</label>
                        <input type="email" id="usuario-email" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm font-semibold" placeholder="usuario@email.com">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nível de Acesso (Hierarquia)</label>
                        <select id="usuario-nivel" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm font-semibold text-slate-700">
                            <option value="admin">Gestor Master</option>
                            <option value="secretario" selected>Secretário Regional</option>
                            <option value="superintendente">Superintendente</option>
                            <option value="pastor_titular">Pastor Titular</option>
                            <option value="coordenador">Coordenador</option>
                            <option value="obreiro">Obreiros</option>
                            <option value="membro">Membros</option>
                        </select>
                    </div>

                    <!-- Igreja Vinculada -->
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Igreja Vinculada <span class="text-slate-400 normal-case font-normal">(opcional — restringe acesso aos dados dessa igreja)</span></label>
                        <select id="usuario-igreja" class="w-full p-2 bg-slate-50 border border-slate-200 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm font-semibold text-slate-700">
                            <option value="">— Sem restrição de igreja (vê tudo) —</option>
                        </select>
                    </div>

                    <!-- Senha (só para novos usuários) -->
                    <div id="bloco-senha">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Senha de Acesso</label>
                        <input type="password" id="usuario-senha" class="w-full p-2 bg-slate-50 border border-slate-200 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm font-semibold" placeholder="Mínimo 6 caracteres">
                    </div>
                    <div id="bloco-confirmar-senha">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Confirmar Senha</label>
                        <input type="password" id="usuario-confirmar-senha" class="w-full p-2 bg-slate-50 border border-slate-200 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm font-semibold" placeholder="Repita a senha">
                    </div>

                    <!-- Redefinição de senha (só para edição) -->
                    <div id="bloco-reset-senha" class="hidden">
                        <button type="button" id="btn-reset-senha" class="w-full bg-slate-100 hover:bg-amber-50 border border-slate-200 hover:border-amber-300 text-slate-600 hover:text-amber-700 font-bold py-2 rounded text-[11px] uppercase flex items-center justify-center gap-2 transition-colors">
                            <i data-lucide="mail" class="w-3.5 h-3.5"></i> Enviar Email de Redefinição de Senha
                        </button>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Status</label>
                        <select id="usuario-status" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm font-semibold">
                            <option value="Ativo">Ativo</option>
                            <option value="Inativo">Inativo</option>
                        </select>
                    </div>

                    <div class="pt-5 flex gap-3">
                        <button type="button" onclick="fecharModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-2.5 rounded uppercase text-[11px] hover:bg-slate-200 transition-colors">Cancelar</button>
                        <button type="submit" id="btn-salvar" class="flex-1 bg-blue-600 text-white font-bold py-2.5 rounded uppercase text-[11px] hover:bg-blue-700 transition-colors shadow-md">Salvar Usuário</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        window.abrirModal = () => {
            document.getElementById('form-usuario').reset();
            document.getElementById('usuario-id').value = '';
            document.getElementById('usuario-nivel').value = 'secretario';
            document.getElementById('modal-titulo').innerHTML = '<i data-lucide="user-plus" class="w-4 h-4"></i> Novo Usuário';
            document.getElementById('bloco-senha').classList.remove('hidden');
            document.getElementById('bloco-confirmar-senha').classList.remove('hidden');
            document.getElementById('bloco-reset-senha').classList.add('hidden');
            document.getElementById('usuario-email').readOnly = false;
            // Exibe e popula o seletor de pastor
            document.getElementById('bloco-importar-pastor').classList.remove('hidden');
            document.getElementById('select-pastor-importar').value = '';
            if (window.popularPastorSelect) window.popularPastorSelect();
            document.getElementById('modal-usuario').classList.remove('hidden');
            if (window.lucide) window.lucide.createIcons();
        };
        window.fecharModal = () => {
            document.getElementById('modal-usuario').classList.add('hidden');
        };
    </script>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        // App secundário para criar usuários sem deslogar o admin
        const firebaseConfig = {
            apiKey: "AIzaSyBTjxxbYqsSVPN_BhsA__gMtTseSn9_Tr0",
            authDomain: "regiao655-admin.firebaseapp.com",
            projectId: "regiao655-admin",
            storageBucket: "regiao655-admin.firebasestorage.app",
            messagingSenderId: "739836894724",
            appId: "1:739836894724:web:b8580a4984c1ba6e781f51"
        };
        const secondaryApp = initializeApp(firebaseConfig, "secondaryForUserCreation");
        const secondaryAuth = getAuth(secondaryApp);

        let usuariosList = [];
        if (window.lucide) lucide.createIcons();

        const tabela = document.getElementById('tabela-usuarios');
        const form = document.getElementById('form-usuario');

        // Pastores para importação no modal
        let pastoresList = [];
        async function carregarPastores() {
            try {
                const snap = await getDocs(collection(db, "pastores"));
                pastoresList = [];
                snap.forEach(d => pastoresList.push({ id: d.id, ...d.data() }));
                pastoresList.sort((a, b) => (a.nome || '').localeCompare(b.nome || ''));
            } catch(e) { console.error("Erro ao carregar pastores:", e); }
        }
        carregarPastores();

        window.popularPastorSelect = () => {
            const sel = document.getElementById('select-pastor-importar');
            sel.innerHTML = '<option value="">— Preencher manualmente —</option>';
            const emailsUsados = new Set(usuariosList.map(u => (u.email || '').toLowerCase()));
            const disponiveis = pastoresList.filter(p => !emailsUsados.has((p.email || '').toLowerCase()));
            disponiveis.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.nome || p.id;
                sel.appendChild(opt);
            });
        };

        document.getElementById('select-pastor-importar').addEventListener('change', function() {
            if (!this.value) return;
            const pastor = pastoresList.find(p => p.id === this.value);
            if (!pastor) return;
            document.getElementById('usuario-nome').value = pastor.nome || '';
            document.getElementById('usuario-email').value = pastor.email || '';
            const cpf = (pastor.cpf || '').replace(/\D/g, '');
            const senha = cpf.slice(0, 6);
            document.getElementById('usuario-senha').value = senha;
            document.getElementById('usuario-confirmar-senha').value = senha;
        });

        // Carregar igrejas no select
        async function carregarIgrejasSelect() {
            const sel = document.getElementById('usuario-igreja');
            try {
                const snap = await getDocs(collection(db, "igrejas"));
                const igrejas = [];
                snap.forEach(d => igrejas.push(d.data()));
                igrejas.sort((a, b) => parseInt(a.codigo || 0) - parseInt(b.codigo || 0));
                igrejas.forEach(ig => {
                    const opt = document.createElement('option');
                    opt.value = ig.nome;
                    opt.textContent = `${ig.codigo} - ${ig.nome}`;
                    sel.appendChild(opt);
                });
            } catch(e) { console.error("Erro ao carregar igrejas:", e); }
        }
        carregarIgrejasSelect();
        
        const niveisLabels = {
            'admin': 'Gestor Master', 'secretario': 'Secretário Regional',
            'superintendente': 'Superintendente', 'pastor_titular': 'Pastor Titular',
            'coordenador': 'Coordenador', 'obreiro': 'Obreiros', 'membro': 'Membros'
        };

        async function carregarUsuarios() {
            try {
                const querySnapshot = await getDocs(collection(db, "usuarios"));
                usuariosList = [];
                
                querySnapshot.forEach((doc) => {
                    usuariosList.push({ id: doc.id, ...doc.data() });
                });

                usuariosList.sort((a, b) => {
                    return a.nome.localeCompare(b.nome);
                });
                renderizarTabela();
            } catch (error) {
                console.error("Erro ao carregar usuários:", error);
                tabela.innerHTML = '<tr><td colspan="4" class="text-center py-6 text-red-500 font-bold">Erro ao carregar dados do servidor.</td></tr>';
            }
        }

        function renderizarTabela() {
            tabela.innerHTML = '';
            if (usuariosList.length === 0) {
                tabela.innerHTML = '<tr><td colspan="4" class="text-center py-6 text-slate-400">Nenhum usuário cadastrado.</td></tr>';
                return;
            }

            usuariosList.forEach(u => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50/50 transition-colors group";
                
                let permsHtml = '<span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-[10px] font-bold uppercase tracking-wider">Secretário Regional</span>';
                if (u.permissoes && u.permissoes.length > 0) {
                    const role = u.permissoes[0];
                    if (u.permissoes.includes('admin')) {
                        permsHtml = '<span class="px-2 py-1 bg-red-100 text-red-700 rounded text-[10px] font-bold uppercase tracking-wider">Gestor Master</span>';
                    } else if (niveisLabels[role]) {
                        permsHtml = `<span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-[10px] font-bold uppercase tracking-wider">${niveisLabels[role]}</span>`;
                    }
                }

                const statusBadge = u.status === 'Ativo' 
                    ? '<span class="px-2 py-1 bg-green-100 text-green-700 rounded text-[10px] font-bold uppercase tracking-wider">ATIVO</span>' 
                    : '<span class="px-2 py-1 bg-slate-100 text-slate-500 rounded text-[10px] font-bold uppercase tracking-wider">INATIVO</span>';

                const igrejaTexto = u.igrejaNome || 'sem restrição';

                tr.innerHTML = `
                    <td>
                        <div class="nome-style leading-tight">${u.nome}</div>
                        <div class="text-[10px] text-slate-400 mt-0.5">${u.email}</div>
                        <div class="text-[10px] text-slate-400 italic mt-0.5">${igrejaTexto}</div>
                    </td>
                    <td class="max-w-[200px] whitespace-normal">${permsHtml}</td>
                    <td>${statusBadge}</td>
                    <td class="text-center">
                        <div class="flex items-center justify-center gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="editarUsuario('${u.id}')" class="text-blue-500 hover:text-blue-700 transition-colors" title="Editar">
                                <i data-lucide="edit" class="w-4 h-4"></i>
                            </button>
                            <button onclick="excluirUsuario('${u.id}')" class="text-red-400 hover:text-red-600 transition-colors" title="Excluir">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </td>
                `;
                tabela.appendChild(tr);
            });
            lucide.createIcons();
        }

        window.editarUsuario = (id) => {
            const u = usuariosList.find(i => i.id === id);
            if(!u) return;

            // Edição não usa o seletor de pastor
            document.getElementById('bloco-importar-pastor').classList.add('hidden');

            document.getElementById('usuario-id').value = u.id;
            document.getElementById('usuario-nome').value = u.nome;
            document.getElementById('usuario-email').value = u.email;
            document.getElementById('usuario-email').readOnly = true;
            document.getElementById('usuario-status').value = u.status || 'Ativo';
            document.getElementById('usuario-igreja').value = u.igrejaNome || '';

            let currentRole = 'secretario';
            if (u.permissoes && u.permissoes.length > 0) {
                if (Object.keys(niveisLabels).includes(u.permissoes[0])) {
                    currentRole = u.permissoes[0];
                } else if (u.permissoes.includes('admin')) {
                    currentRole = 'admin';
                }
            }
            document.getElementById('usuario-nivel').value = currentRole;

            // Em edição: esconde senha, exibe botão de reset
            document.getElementById('bloco-senha').classList.add('hidden');
            document.getElementById('bloco-confirmar-senha').classList.add('hidden');
            document.getElementById('bloco-reset-senha').classList.remove('hidden');
            document.getElementById('usuario-senha').value = '';
            document.getElementById('usuario-confirmar-senha').value = '';

            // Botão de reset de senha
            document.getElementById('btn-reset-senha').onclick = async () => {
                if(!confirm(`Enviar email de redefinição de senha para ${u.email}?`)) return;
                try {
                    const { auth: mainAuth } = await import('./firebase-config.js');
                    await sendPasswordResetEmail(mainAuth, u.email);
                    alert(`Email de redefinição enviado para ${u.email}!`);
                } catch(e) {
                    alert("Erro ao enviar email: " + e.message);
                }
            };

            document.getElementById('modal-titulo').innerHTML = '<i data-lucide="edit" class="w-4 h-4"></i> Editar Usuário';
            document.getElementById('modal-usuario').classList.remove('hidden');
            if (window.lucide) window.lucide.createIcons();
        };

        window.excluirUsuario = async (id) => {
            if(confirm("Tem certeza que deseja excluir este usuário? O acesso dele será removido.")) {
                try {
                    await deleteDoc(doc(db, "usuarios", id));
                    carregarUsuarios();
                } catch(e) {
                    alert("Erro ao excluir!");
                    console.error(e);
                }
            }
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-salvar');
            btn.textContent = "Salvando...";
            btn.disabled = true;

            try {
                const id = document.getElementById('usuario-id').value;
                const email = document.getElementById('usuario-email').value.trim().toLowerCase();
                const nivelSelecionado = document.getElementById('usuario-nivel').value;
                const permsArr = [nivelSelecionado];

                const igrejaNome = document.getElementById('usuario-igreja').value;
                const payload = {
                    nome: document.getElementById('usuario-nome').value.trim(),
                    email,
                    permissoes: permsArr,
                    status: document.getElementById('usuario-status').value,
                    igrejaNome: igrejaNome || '',
                    updatedAt: serverTimestamp()
                };

                if (id) {
                    // Edição: apenas atualiza Firestore
                    await updateDoc(doc(db, "usuarios", id), payload);
                } else {
                    // Novo usuário: valida senha e cria no Firebase Auth primeiro
                    const senha = document.getElementById('usuario-senha').value;
                    const confirmar = document.getElementById('usuario-confirmar-senha').value;

                    if (!senha || senha.length < 6) {
                        alert("A senha deve ter no mínimo 6 caracteres.");
                        return;
                    }
                    if (senha !== confirmar) {
                        alert("As senhas não coincidem.");
                        return;
                    }

                    // Cria no Firebase Auth usando app secundário (não desloga o admin)
                    await createUserWithEmailAndPassword(secondaryAuth, email, senha);
                    await secondaryAuth.signOut();

                    // Salva no Firestore
                    payload.createdAt = serverTimestamp();
                    await addDoc(collection(db, "usuarios"), payload);
                }

                window.fecharModal();
                carregarUsuarios();
            } catch (error) {
                console.error("Erro ao salvar:", error);
                let msg = "Erro ao salvar o usuário.";
                if (error.code === 'auth/email-already-in-use') msg = "Este e-mail já possui uma conta cadastrada no sistema.";
                else if (error.code === 'auth/invalid-email') msg = "E-mail inválido.";
                else if (error.code === 'auth/weak-password') msg = "Senha muito fraca. Use no mínimo 6 caracteres.";
                alert(msg);
            } finally {
                btn.textContent = "Salvar Usuário";
                btn.disabled = false;
            }
        });

        // Inicia carregando a lista
        carregarUsuarios();
    </script>
</body>
</html>
