<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio de Igrejas — Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.300.0"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f1f5f9;
        }

        .header-gradient {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .roulette-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #fff;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0,0,0,0.05);
            transition: transform 6s cubic-bezier(0.12, 0, 0.12, 1);
        }

        .pointer {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 32px;
            background: #4f46e5;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
            filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.15));
        }

        .church-card {
            transition: all 0.15s ease;
            user-select: none;
        }

        .church-card:hover {
            transform: translateX(4px);
        }

        .church-card.active {
            border-color: #4f46e5;
            background-color: #fff;
        }

        .church-card.inactive {
            opacity: 0.45;
            background-color: #f8fafc;
            border-color: #e2e8f0;
        }

        @keyframes confetti {
            0% { transform: translateY(0) rotate(0); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            z-index: 100;
            animation: confetti 3s linear forwards;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- CABEÇALHO -->
    <header class="w-full shadow-sm bg-white border-b sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 py-1.5">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo.png" alt="Logo IEQ" class="h-8 w-auto object-contain" onerror="this.src='https://via.placeholder.com/32?text=IEQ'">
                    <div class="border-l border-gray-200 pl-2">
                        <div class="text-xs font-bold text-slate-800 leading-none">Região 655</div>
                        <div class="text-[9px] font-medium text-slate-500 uppercase leading-none mt-0.5">Londrina/PR</div>
                    </div>
                </a>
                <a href="index.html" class="text-[10px] font-semibold text-slate-500 hover:text-blue-600 flex items-center gap-1 uppercase tracking-wider">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Painel Admin
                </a>
            </div>
        </div>

        <div class="header-gradient py-3 px-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-sm md:text-base font-bold text-white tracking-wide uppercase">
                    🎯 Sorteio de Igrejas — Reunião de Oração
                </h1>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
            
            <!-- COLUNA ESQUERDA: Roleta -->
            <div class="lg:col-span-3">
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 md:p-8">
                    <div class="flex flex-col items-center">
                        <div class="text-center mb-6">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Gire a Roleta</p>
                            <h2 class="text-lg font-extrabold text-slate-800">Sortear Igreja da Semana</h2>
                        </div>

                        <div class="roulette-container mb-8">
                            <div class="pointer"></div>
                            <canvas id="wheel"></canvas>
                        </div>

                        <button id="spinBtn" class="w-full max-w-sm py-4 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-95 text-sm uppercase tracking-wider">
                            Sortear Agora
                        </button>

                        <p id="wheelHint" class="text-[10px] text-slate-400 mt-4 text-center">
                            Selecione as igrejas participantes ao lado e clique para sortear
                        </p>
                    </div>
                </div>
            </div>

            <!-- COLUNA DIREITA: Lista de Igrejas -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <h3 class="font-bold text-slate-800 text-sm">Igrejas Participantes</h3>
                            <p class="text-[10px] text-slate-400 mt-0.5">
                                Ativas: <span id="activeCount" class="font-bold text-indigo-600">0</span> de <span id="totalCount" class="font-bold text-slate-600">0</span>
                            </p>
                        </div>
                        <div class="flex flex-col text-right gap-1">
                            <button onclick="toggleAll(true)" class="text-[10px] font-bold text-indigo-600 hover:underline uppercase">Ativar Todas</button>
                            <button onclick="toggleAll(false)" class="text-[10px] font-bold text-slate-400 hover:text-red-500 transition-colors uppercase">Desmarcar Todas</button>
                        </div>
                    </div>
                    
                    <div id="churchListContainer" class="max-h-[480px] overflow-y-auto pr-1 space-y-1.5">
                        <div id="churchList" class="space-y-1.5"></div>
                        <div id="churchLoading" class="flex items-center justify-center py-12 gap-3">
                            <div class="animate-spin rounded-full h-5 w-5 border-2 border-indigo-600 border-t-transparent"></div>
                            <span class="text-xs text-slate-400">Carregando igrejas...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL VENCEDOR -->
    <div id="winnerModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform transition-all scale-110">
            <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="sparkles" class="w-10 h-10"></i>
            </div>
            <h3 class="text-slate-500 font-bold uppercase text-[10px] tracking-widest mb-2">Igreja Sorteada!</h3>
            <h2 id="modalWinnerName" class="text-xl font-extrabold text-slate-800 mb-1 leading-tight"></h2>
            <p id="modalWinnerAddress" class="text-slate-500 text-xs mb-0.5"></p>
            <p class="text-indigo-600 font-bold text-sm mb-6">Sexta-feira · 22:30h às 23:30h</p>
            
            <div class="space-y-3">
                <button onclick="shareToWhatsApp()" class="w-full py-3.5 bg-emerald-500 text-white font-bold rounded-xl hover:bg-emerald-600 transition-colors flex items-center justify-center gap-2 shadow-lg shadow-emerald-100 text-sm">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347"/></svg>
                    Compartilhar no WhatsApp
                </button>
                <button onclick="closeModal()" class="w-full py-3 text-slate-400 font-semibold hover:text-slate-600 transition-colors text-sm">
                    Fechar
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        let churches = [];
        let lastWinner = "";
        let lastWinnerAddress = "";

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const churchListEl = document.getElementById('churchList');
        const churchLoadingEl = document.getElementById('churchLoading');
        const activeCountEl = document.getElementById('activeCount');
        const totalCountEl = document.getElementById('totalCount');
        const winnerModal = document.getElementById('winnerModal');
        const modalWinnerName = document.getElementById('modalWinnerName');
        const modalWinnerAddress = document.getElementById('modalWinnerAddress');

        let currentRotation = 0;
        let isSpinning = false;

        async function loadChurches() {
            try {
                const snap = await getDocs(collection(db, "igrejas"));
                const loaded = [];
                snap.forEach(doc => {
                    const d = doc.data();
                    const cod = String(d.codigo || '');
                    const nome = d.nome || '';
                    const endereco = d.endereco || '';
                    if (nome) {
                        const isRegiao = cod === '655' || nome.toUpperCase().includes('REGIÃO');
                        loaded.push({
                            id: doc.id,
                            code: cod,
                            name: nome,
                            fullName: cod ? `${cod} - ${nome}` : nome,
                            address: endereco,
                            active: !isRegiao,
                            locked: isRegiao,
                            color: `hsl(${(loaded.length * 360) / Math.max(loaded.length + 1, 1)}, 65%, 50%)`
                        });
                    }
                });

                loaded.sort((a, b) => {
                    const ca = parseInt(a.code) || 0;
                    const cb = parseInt(b.code) || 0;
                    return ca - cb;
                });

                loaded.forEach((c, i) => {
                    c.color = `hsl(${(i * 360) / Math.max(loaded.length, 1)}, 65%, 50%)`;
                });

                churches = loaded;
                churchLoadingEl.style.display = 'none';
                renderList();
                drawWheel();
                updateCount();
            } catch (e) {
                churchLoadingEl.innerHTML = `<p class="text-rose-500 text-xs">Erro ao carregar igrejas: ${e.message}</p>`;
            }
        }

        function getNextFridayMeetingDate() {
            const now = new Date();
            const target = new Date();
            target.setDate(now.getDate() + (7 + 5 - now.getDay()) % 7);
            const limitTime = new Date(target);
            limitTime.setHours(22, 35, 0, 0);
            if (now.getTime() > limitTime.getTime()) {
                target.setDate(target.getDate() + 7);
            }
            return target;
        }

        function playVictorySound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                function playNote(freq, startTime, duration) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, startTime);
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.1, startTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(startTime);
                    osc.stop(startTime + duration);
                }
                const now = audioCtx.currentTime;
                playNote(261.63, now, 0.5);
                playNote(329.63, now + 0.1, 0.5);
                playNote(392.00, now + 0.2, 0.5);
                playNote(523.25, now + 0.3, 0.8);
            } catch(e) {}
        }

        function renderList() {
            churchListEl.innerHTML = '';
            churches.forEach(church => {
                const locked = church.locked;
                const clickable = !locked && !isSpinning;
                const div = document.createElement('div');
                div.className = `church-card flex items-center justify-between p-2.5 rounded-xl border-2 ${clickable ? 'cursor-pointer' : 'cursor-not-allowed'} ${church.active ? 'active' : 'inactive'} ${locked ? 'opacity-60' : ''}`;
                if (clickable) div.onclick = () => toggleChurch(church.id);
                
                div.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden min-w-0">
                        <div class="w-1.5 h-6 rounded-full flex-shrink-0" style="background-color: ${church.color}"></div>
                        <div class="min-w-0">
                            <span class="text-xs font-bold truncate block ${church.active ? 'text-slate-700' : 'text-slate-400'}">${escHtml(church.fullName)}</span>
                            ${church.address ? `<span class="text-[9px] text-slate-400 truncate block">${escHtml(church.address)}</span>` : ''}
                        </div>
                    </div>
                    ${locked ? '<span class="text-[8px] font-bold text-slate-400 uppercase tracking-wider flex-shrink-0 ml-2">Fixo</span>' : `
                    <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-all ml-2 ${church.active ? 'bg-indigo-500 border-indigo-500' : 'border-slate-300 bg-white'}">
                        ${church.active ? '<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                    </div>`}
                `;
                churchListEl.appendChild(div);
            });
        }

        function escHtml(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        window.toggleChurch = function(id) {
            if (isSpinning) return;
            const church = churches.find(c => c.id === id);
            if (!church || church.locked) return;
            church.active = !church.active;
            renderList();
            drawWheel();
            updateCount();
        };

        window.toggleAll = function(status) {
            if (isSpinning) return;
            churches.forEach(c => { if (!c.locked) c.active = status; });
            renderList();
            drawWheel();
            updateCount();
        };

        function updateCount() {
            const active = churches.filter(c => c.active);
            activeCountEl.innerText = active.length;
            totalCountEl.innerText = churches.length;
            spinBtn.disabled = active.length === 0;
        }

        function drawWheel() {
            const activeChurches = churches.filter(c => c.active);
            const size = 320;
            canvas.width = size * 2;
            canvas.height = size * 2;
            canvas.style.width = `${size}px`;
            canvas.style.height = `${size}px`;
            ctx.scale(2, 2);

            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2 - 6;

            ctx.clearRect(0, 0, size, size);

            if (activeChurches.length === 0) {
                ctx.beginPath(); ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fillStyle = '#f1f5f9'; ctx.fill();
                ctx.fillStyle = '#94a3b8'; ctx.textAlign = 'center'; ctx.font = 'bold 13px Plus Jakarta Sans';
                ctx.fillText('Nenhuma igreja ativa', centerX, centerY);
                return;
            }

            const sliceAngle = (2 * Math.PI) / activeChurches.length;

            activeChurches.forEach((church, i) => {
                const startAngle = i * sliceAngle;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
                ctx.closePath();
                ctx.fillStyle = church.color;
                ctx.fill();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = 'right'; ctx.fillStyle = '#fff'; ctx.font = 'bold 9px Plus Jakarta Sans';
                const displayName = church.name.length > 20 ? church.name.substring(0, 18) + '…' : church.name;
                ctx.fillText(displayName, radius - 18, 3);
                ctx.restore();
            });

            ctx.beginPath(); ctx.arc(centerX, centerY, 12, 0, 2 * Math.PI);
            ctx.fillStyle = '#fff'; ctx.fill();
        }

        window.spin = function() {
            if (isSpinning) return;
            const activeChurches = churches.filter(c => c.active);
            if (activeChurches.length === 0) return;

            isSpinning = true;
            spinBtn.disabled = true;
            
            const extraDegrees = 2880 + Math.floor(Math.random() * 360);
            currentRotation += extraDegrees;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;
                
                const actualDegrees = (currentRotation % 360);
                const sliceSize = 360 / activeChurches.length;
                let index = Math.floor(((360 - actualDegrees + 270) % 360) / sliceSize);
                index = index % activeChurches.length;
                
                const winner = activeChurches[index];
                lastWinner = winner.fullName;
                lastWinnerAddress = winner.address || '';
                showWinner(winner.fullName, winner.address);
            }, 6000);
        };

        function showWinner(name, address) {
            modalWinnerName.innerText = name;
            modalWinnerAddress.innerText = address || '';
            winnerModal.classList.remove('hidden');
            playVictorySound();
            for(let i = 0; i < 50; i++) createConfetti();
        }

        window.closeModal = function() {
            winnerModal.classList.add('hidden');
        };

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
            confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
            confetti.style.width = Math.random() * 8 + 4 + 'px';
            confetti.style.height = confetti.style.width;
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 4000);
        }

        window.shareToWhatsApp = function() {
            const meetingDate = getNextFridayMeetingDate();
            const dataFormatada = meetingDate.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
            const cleanChurchName = lastWinner.split(' - ').slice(1).join(' - ') || lastWinner;

            const year = meetingDate.getFullYear();
            const month = String(meetingDate.getMonth() + 1).padStart(2, '0');
            const day = String(meetingDate.getDate()).padStart(2, '0');
            const startStr = `${year}${month}${day}T223000`;
            const endStr = `${year}${month}${day}T233000`;
            
            const gCalTitle = encodeURIComponent(`Oração Região 655 - ${cleanChurchName}`);
            const gCalLocation = encodeURIComponent(lastWinnerAddress || cleanChurchName);
            const gCalDetails = encodeURIComponent(`Reunião Regional de Oração — Região 655\nLocal: ${cleanChurchName}${lastWinnerAddress ? ' — ' + lastWinnerAddress : ''}`);

            const calendarUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${gCalTitle}&dates=${startStr}/${endStr}&details=${gCalDetails}&location=${gCalLocation}&sf=true&output=xml`;

            const addressLine = lastWinnerAddress ? `\n📍 *Endereço:* ${lastWinnerAddress}` : '';
            const message = `🙌 *REUNIÃO DE ORAÇÃO* 🙌\n\nOlá, Pastores! Conforme sorteio regional, a nossa oração desta semana (${dataFormatada}) será na:\n\n⛪ *${cleanChurchName}*${addressLine}\n⏰ *Horário: 22:30h às 23:30h*\n\n📅 *Adicionar à sua agenda:*\n${calendarUrl}\n\nAguardamos todos vocês para este momento de comunhão!`;
            
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`, '_blank');
        };

        document.getElementById('spinBtn').addEventListener('click', () => window.spin());

        window.onload = () => {
            loadChurches();
            if (window.lucide) window.lucide.createIcons();
        };
    </script>
</body>
</html>
