<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Portal — Região 655</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .wrap {
            max-width: 700px;
            margin: 0 auto;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .section-label::before,
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .section-label span {
            font-family: 'Sora', sans-serif;
            font-size: 9px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            white-space: nowrap;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }
        @media (max-width: 540px) { .cards-grid { grid-template-columns: 1fr; } }

        .page-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 18px;
            background: rgba(255,255,255,0.025);
            border: 1px solid var(--border);
            border-radius: 16px;
            text-decoration: none;
            transition: all 0.22s;
            position: relative;
            overflow: hidden;
        }
        .page-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 60%, rgba(99,179,237,0.03));
            pointer-events: none;
        }
        .page-card:hover {
            border-color: var(--border-hover);
            background: rgba(99,179,237,0.05);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .card-icon-wrap {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 1px solid;
        }
        .card-text { flex: 1; min-width: 0; }
        .card-title {
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
        .card-arrow {
            flex-shrink: 0;
            font-size: 14px;
            color: var(--text-muted);
            transition: transform 0.2s, color 0.2s;
        }
        .page-card:hover .card-arrow { transform: translate(2px,-2px); color: var(--accent); }

        /* Avisos */
        .aviso-box {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid;
            margin-bottom: 8px;
        }
        .aviso-box p {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.5;
        }

        /* Loading */
        .spin-ring {
            width: 32px; height: 32px;
            border: 2px solid rgba(99,179,237,0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 14px;
        }

        .header-entrar {
            background: linear-gradient(135deg, rgba(99,179,237,0.25), rgba(99,179,237,0.1));
            border: 1.5px solid rgba(99,179,237,0.5);
            color: #63b3ed;
            padding: 10px 22px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 800;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 20px rgba(99,179,237,0.15), 0 4px 12px rgba(0,0,0,0.3);
            margin-top: 14px;
        }
        .header-entrar:hover {
            background: linear-gradient(135deg, rgba(99,179,237,0.4), rgba(99,179,237,0.2));
            color: #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header class="brand-header">
        <div class="header-glow"></div>
        <div class="header-ring"></div>
        <div class="fade-in" style="animation-delay:.05s">
            <div class="logo-wrap">
                <picture>
                    <source srcset="logo.webp" type="image/webp">
                    <img src="logo.png" alt="Logo Região 655" onerror="this.style.display='none'">
                </picture>
            </div>
        </div>
        <div class="fade-in" style="animation-delay:.12s">
            <div class="badge-regional">
                <div class="badge-dot"></div>Escritório Regional
            </div>
        </div>
        <h1 class="portal-title fade-in" style="animation-delay:.18s">Mini Portal</h1>
        <p class="portal-subtitle fade-in" style="animation-delay:.24s">Região 655 · Londrina/PR</p>
        <a href="login.html" class="header-entrar fade-in" style="animation-delay:.30s">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                <polyline points="10 17 15 12 10 7"/>
                <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Painel Admin
        </a>
    </header>

    <main>
        <div class="wrap">

            <!-- Loading -->
            <div id="loading-state" style="text-align:center;padding:60px 16px;">
                <div class="spin-ring"></div>
                <p style="font-family:'Sora',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);">Carregando...</p>
            </div>

            <!-- Conteúdo dinâmico -->
            <div id="portal-content" style="display:none;">
                <div id="avisos-section" style="margin-bottom:24px;display:none;"></div>
                <div class="section-label"><span>Acesso Rápido</span></div>
                <div id="cards-grid" class="cards-grid"></div>
            </div>

        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <p class="footer-brand">Região 655 — Londrina / PR</p>
            <div class="footer-names">
                <p class="footer-item">Superintendente: <span>Rev. Valdir Ávila Ramos</span></p>
                <p class="footer-item">Secretário Regional: <span>Pr. Eduardo Silva</span></p>
            </div>
            <p class="footer-copy">© 2026 · Todos os direitos reservados</p>
        </div>
    </footer>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js';

        const COR_STYLES = {
            blue:    ['rgba(59,130,246,0.12)',  'rgba(59,130,246,0.25)'],
            emerald: ['rgba(16,185,129,0.12)',  'rgba(16,185,129,0.25)'],
            amber:   ['rgba(245,158,11,0.12)',  'rgba(245,158,11,0.25)'],
            purple:  ['rgba(139,92,246,0.12)',  'rgba(139,92,246,0.25)'],
            rose:    ['rgba(244,63,94,0.12)',   'rgba(244,63,94,0.25)'],
            slate:   ['rgba(100,116,139,0.12)', 'rgba(100,116,139,0.25)'],
        };

        const DEFAULT_CARDS = [
            { id:'c1', ativo:true, titulo:'Registro de Presença', descricao:'Confirme sua presença em eventos e reuniões', icone:'✅', cor:'emerald', url:'presencareg655.html', externo:false },
            { id:'c2', ativo:true, titulo:'Agenda Completa',      descricao:'Visualização completa de todos os eventos',  icone:'🗓️', cor:'slate',   url:'agenda_completa.html', externo:false },
            { id:'c3', ativo:true, titulo:'Gestão da Agenda',     descricao:'Adicionar e editar eventos da agenda regional', icone:'✏️', cor:'amber', url:'gestao_agenda.html', externo:false },
            { id:'c4', ativo:true, titulo:'Contas Correntes',     descricao:'Contas correntes das igrejas da região',    icone:'💰', cor:'purple', url:'s_contasreg655.html', externo:false },
            { id:'c5', ativo:true, titulo:'Sorteio de Igrejas',   descricao:'Sorteio entre as igrejas da região',        icone:'🎲', cor:'rose',   url:'sorteio.html', externo:false },
            { id:'c6', ativo:true, titulo:'Pauta 09/05',          descricao:'Pauta da reunião ministerial de 09/05/2026', icone:'📋', cor:'slate',  url:'pauta_0905.html', externo:false },
        ];

        function renderAvisos(avisos) {
            const section = document.getElementById('avisos-section');
            const ativos = (avisos || []).filter(a => a.ativo);
            if (!ativos.length) { section.style.display = 'none'; return; }

            const estilos = {
                info:    { bg:'rgba(59,130,246,0.08)',  border:'rgba(59,130,246,0.3)',  color:'#60a5fa',  icon:'ℹ️' },
                alerta:  { bg:'rgba(245,158,11,0.08)',  border:'rgba(245,158,11,0.3)',  color:'#fbbf24',  icon:'⚠️' },
                urgente: { bg:'rgba(244,63,94,0.08)',   border:'rgba(244,63,94,0.3)',   color:'#fb7185',  icon:'🚨' },
            };

            section.innerHTML = ativos.map(a => {
                const s = estilos[a.tipo] || estilos.info;
                return `<div class="aviso-box" style="background:${s.bg};border-color:${s.border};color:${s.color};">
                    <span style="font-size:16px;flex-shrink:0;">${s.icon}</span>
                    <p>${a.texto}</p>
                </div>`;
            }).join('');
            section.style.display = 'block';
        }

        function renderCards(cards) {
            const grid = document.getElementById('cards-grid');
            const ativos = (cards || []).filter(c => c.ativo);
            if (!ativos.length) {
                grid.innerHTML = `<p style="font-size:13px;color:var(--text-muted);text-align:center;padding:40px 0;">Nenhum link cadastrado.</p>`;
                return;
            }
            grid.innerHTML = ativos.map((card, i) => {
                const [bg, border] = COR_STYLES[card.cor] || COR_STYLES.slate;
                const target = card.externo ? ' target="_blank" rel="noopener noreferrer"' : '';
                return `<a href="${card.url}"${target} class="page-card fade-in" style="animation-delay:${i * 0.05}s">
                    <div class="card-icon-wrap" style="background:${bg};border-color:${border};">${card.icone || '🔗'}</div>
                    <div class="card-text">
                        <div class="card-title">${card.titulo}</div>
                        <div class="card-desc">${card.descricao || ''}</div>
                    </div>
                    <span class="card-arrow">↗</span>
                </a>`;
            }).join('');
        }

        async function init() {
            let cards = DEFAULT_CARDS;
            let avisos = [];

            try {
                const snap = await getDoc(doc(db, 'configuracoes', 'mini_portal'));
                if (snap.exists()) {
                    const d = snap.data();
                    if (d.cards && d.cards.length) cards = d.cards;
                    if (d.avisos) avisos = d.avisos;
                }
            } catch (e) {
                console.error('Erro ao carregar configuração:', e);
            }

            renderAvisos(avisos);
            renderCards(cards);

            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('portal-content').style.display = 'block';
        }

        init();
    </script>

</body>
</html>
