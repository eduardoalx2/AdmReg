<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendências Rápidas - Região 655</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        let perms = [];
        try { perms = JSON.parse(localStorage.getItem('userPerms') || '[]'); } catch(e) {}
        if (!perms.includes('admin')) {
            window.location.replace('index.html');
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #334155; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="w-full shadow-sm bg-white border-b sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 py-1.5">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo.png" alt="Logo IEQ" class="h-8 w-auto object-contain" onerror="this.src='https://via.placeholder.com/32?text=IEQ'">
                    <div class="border-l border-gray-200 pl-2">
                        <div class="text-xs font-bold text-slate-800 leading-none">Região 655</div>
                        <div class="text-[9px] font-medium text-slate-500 uppercase leading-none mt-0.5">Londrina/PR</div>
                    </div>
                </a>
                <a href="index.html" class="text-[10px] font-semibold text-slate-500 hover:text-blue-600 flex items-center gap-1 uppercase tracking-wider">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Painel Admin
                </a>
            </div>
        </div>
        <div class="header-gradient py-3 px-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-sm md:text-base font-bold text-white tracking-wide uppercase flex items-center gap-2">
                    <i data-lucide="alert-octagon" class="w-5 h-5 text-red-400"></i> Pendências Rápidas
                </h1>
                <button onclick="carregarDados()" class="p-2 text-white/70 hover:text-white hover:bg-white/10 rounded-lg transition-colors" title="Atualizar Dados">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-6 space-y-6">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Igrejas c/ Pendências</p>
                <h3 class="text-2xl font-black text-slate-800" id="kpi-igrejas">0</h3>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm border-b-4 border-b-amber-500">
                <p class="text-[10px] font-bold text-amber-600 uppercase tracking-widest mb-1">Saldos Atrasados</p>
                <h3 class="text-2xl font-black text-slate-800" id="kpi-saldos">0</h3>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm border-b-4 border-b-red-500">
                <p class="text-[10px] font-bold text-red-600 uppercase tracking-widest mb-1">Valores em Aberto</p>
                <h3 class="text-2xl font-black text-slate-800 tracking-tight" id="kpi-valores">R$ 0,00</h3>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm border-b-4 border-b-purple-500">
                <p class="text-[10px] font-bold text-purple-600 uppercase tracking-widest mb-1">Ausências Recentes</p>
                <h3 class="text-2xl font-black text-slate-800" id="kpi-ausencias">0</h3>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm mb-2">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Filtrar Igreja</label>
                    <select id="filtroIgreja" onchange="window.renderizarTabela()" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg outline-none text-xs font-semibold text-slate-700 shadow-sm">
                        <option value="Todas">Todas as Igrejas</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Filtrar Mês</label>
                    <select id="filtroMes" onchange="window.renderizarTabela()" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg outline-none text-xs font-semibold text-slate-700 shadow-sm">
                        <option value="Todos">Todos os Meses</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Tipo de Pendência</label>
                    <select id="filtroTipo" onchange="window.renderizarTabela()" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg outline-none text-xs font-semibold text-slate-700 shadow-sm">
                        <option value="Todos">Todas as Pendências</option>
                        <option value="Saldos">Apenas Saldos Atrasados</option>
                        <option value="Taxas">Apenas Taxas Pendentes</option>
                        <option value="Ausencias">Apenas Ausências</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="window.limparFiltros()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 rounded-lg text-xs uppercase transition-colors shadow-sm h-[34px]">Limpar Filtros</button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
            <div class="bg-slate-50 p-4 border-b border-slate-100 flex items-center justify-between">
                <h2 class="text-xs font-black uppercase tracking-widest text-slate-600 flex items-center gap-2">
                    <i data-lucide="list-x" class="w-4 h-4 text-red-500"></i> Detalhamento por Igreja
                </h2>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="checkApenasPendentes" checked onchange="window.renderizarTabela()" class="w-4 h-4 rounded text-blue-600 border-slate-300 focus:ring-blue-500">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider hidden sm:block">Apenas com pendências</span>
                </label>
            </div>
            
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left whitespace-nowrap">
                    <thead>
                        <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                            <th class="px-4 py-3">Igreja / Pastor</th>
                            <th class="px-4 py-3 text-center">Saldos Atrasados</th>
                            <th class="px-4 py-3 text-center">Taxas Pendentes</th>
                            <th class="px-4 py-3 text-right">Aberto Estimado</th>
                            <th class="px-4 py-3 text-center">Ausências</th>
                            <th class="px-4 py-3 text-center">Cobrança</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo" class="text-sm divide-y divide-slate-50">
                        <tr><td colspan="6" class="text-center py-10 text-slate-400 text-xs font-bold uppercase tracking-wider">Sincronizando dados globais...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        lucide.createIcons();

        let dadosOriginais = [];
        window.formatMoeda = (val) => (parseFloat(val) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        // Converte "MM/AAAA" → "AAAA-MM" para comparar com periodoChave
        function mesStrToChave(mesStr) {
            if (!mesStr) return null;
            const [mm, yyyy] = mesStr.split('/');
            return (mm && yyyy) ? `${yyyy}-${mm}` : null;
        }

        window.carregarDados = async () => {
            const tbody = document.getElementById('tabela-corpo');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-blue-500 text-xs font-bold uppercase tracking-wider"><div class="animate-spin inline-block w-5 h-5 border-2 border-blue-600 border-t-transparent rounded-full mr-2 align-middle"></div> Buscando informações...</td></tr>';
            
            try {
                const configSnap = await getDoc(doc(db, "configuracoes", "painel_pastores"));
                const config = configSnap.exists() ? configSnap.data() : { valorSeguro: 45 };
                const valorSeguro = config.valorSeguro || 45;

                const [igrejasSnap, pastoresSnap, saldosSnap, recibosSnap, presencasSnap] = await Promise.all([
                    getDocs(collection(db, "igrejas")), getDocs(collection(db, "pastores")),
                    getDocs(collection(db, "saldos_virada")), getDocs(collection(db, "recibos")), getDocs(collection(db, "presencas"))
                ]);

                const igrejas = []; igrejasSnap.forEach(d => igrejas.push(d.data()));
                const pastores = []; pastoresSnap.forEach(d => pastores.push(d.data()));
                const saldos = []; saldosSnap.forEach(d => saldos.push(d.data()));
                const recibos = []; recibosSnap.forEach(d => recibos.push(d.data()));
                const presencas = []; presencasSnap.forEach(d => presencas.push(d.data()));

                const hoje = new Date();
                const limiteDebito = new Date(hoje.getFullYear(), hoje.getMonth() - 1, 1);
                dadosOriginais = [];

                const mesesSet = new Set();
                igrejas.forEach(ig => {
                    const cod = String(ig.codigo).padStart(4, '0');
                    const titular = pastores.find(p => p.funcao === 'Pastor Titular' && (Array.isArray(p.igreja) ? p.igreja.includes(ig.nome) : p.igreja === ig.nome));
                    const nomePastor = titular ? titular.nome : 'Sem Titular';
                    const celPastor = titular ? titular.telefone : '';
                    
                    let saldosPendentes = []; let taxasPendentes = [];
                    let valorEmAberto = 0; let temValorDesconhecido = false;

                    let cursor = new Date(2026, 0, 1);
                    while (cursor <= limiteDebito) {
                        const mm = String(cursor.getMonth() + 1).padStart(2, '0');
                        const yyyy = cursor.getFullYear();
                        const mesStr = `${mm}/${yyyy}`;
                        mesesSet.add(mesStr);
                        
                        const recibo = recibos.find(r => r.referenceDate === mesStr && (r.igrejaCodigo === cod || r.igrejaNome === ig.nome));
                        if (!recibo) {
                            taxasPendentes.push(mesStr);
                            const chave = mesStrToChave(mesStr);
                        const saldo = saldos.find(s => (s.igrejaCodigo === cod || s.igrejaNome === ig.nome) && (s.periodoChave === chave));
                            if (!saldo) {
                                saldosPendentes.push(mesStr);
                                valorEmAberto += (100 + ((ig.seguros || 0) * valorSeguro));
                                temValorDesconhecido = true;
                            } else {
                                valorEmAberto += (saldo.entradasTaxadas * 0.04) + 100 + ((ig.seguros || 0) * valorSeguro);
                            }
                        }
                        cursor.setMonth(cursor.getMonth() + 1);
                    }
                    const ausenciasLista = presencas.filter(p => p.status === 'Ausente' && (p.igreja || '').includes(ig.nome));
                    const totalPendencias = saldosPendentes.length + taxasPendentes.length + ausenciasLista.length;
                    
                    dadosOriginais.push({ igrejaNome: `${cod} - ${ig.nome}`, pastor: nomePastor, celPastor, saldosPendentes, taxasPendentes, valorEmAberto, temValorDesconhecido, ausencias: ausenciasLista.length, ausenciasLista, totalPendencias });
                });
                dadosOriginais.sort((a,b) => parseInt(a.igrejaNome) - parseInt(b.igrejaNome));

                const selectIgreja = document.getElementById('filtroIgreja');
                selectIgreja.innerHTML = '<option value="Todas">Todas as Igrejas</option>';
                dadosOriginais.forEach(d => {
                    selectIgreja.innerHTML += `<option value="${d.igrejaNome}">${d.igrejaNome}</option>`;
                });

                const selectMes = document.getElementById('filtroMes');
                selectMes.innerHTML = '<option value="Todos">Todos os Meses</option>';
                Array.from(mesesSet).sort((a,b) => {
                    const [mA, yA] = a.split('/');
                    const [mB, yB] = b.split('/');
                    return new Date(yB, mB - 1) - new Date(yA, mA - 1);
                }).forEach(m => {
                    selectMes.innerHTML += `<option value="${m}">${m}</option>`;
                });

                window.renderizarTabela();
            } catch (e) {
                console.error(e);
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-red-500 text-xs font-bold uppercase tracking-wider">Erro ao sincronizar dados: ${e.message || e}</td></tr>`;
            }
        };

        window.renderizarTabela = () => {
            const tbody = document.getElementById('tabela-corpo');
            const apenasPendentes = document.getElementById('checkApenasPendentes').checked;
            const filtroIgreja = document.getElementById('filtroIgreja').value;
            const filtroMes = document.getElementById('filtroMes').value;
            const filtroTipo = document.getElementById('filtroTipo').value;

            const filtrados = dadosOriginais.filter(d => {
                if (apenasPendentes && d.totalPendencias === 0) return false;
                if (filtroIgreja !== 'Todas' && d.igrejaNome !== filtroIgreja) return false;
                
                if (filtroTipo !== 'Todos') {
                    if (filtroTipo === 'Saldos' && d.saldosPendentes.length === 0) return false;
                    if (filtroTipo === 'Taxas' && d.taxasPendentes.length === 0) return false;
                    if (filtroTipo === 'Ausencias' && d.ausencias === 0) return false;
                }

                if (filtroMes !== 'Todos') {
                    const temSaldoNoMes = d.saldosPendentes.includes(filtroMes);
                    const temTaxaNoMes = d.taxasPendentes.includes(filtroMes);
                    const temAusenciaNoMes = d.ausenciasLista.some(a => {
                        if(!a.dataEvento) return false;
                        const [y, m] = a.dataEvento.split('-');
                        return `${m}/${y}` === filtroMes;
                    });
                    if (!temSaldoNoMes && !temTaxaNoMes && !temAusenciaNoMes) return false;
                }
                return true;
            });

            let stSaldos = 0, stValores = 0, stAusencias = 0;
            tbody.innerHTML = '';

            if (filtrados.length === 0) tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-slate-400 text-xs font-bold uppercase tracking-wider">Nenhuma pendência encontrada! 🎉</td></tr>';
            else {
                filtrados.forEach(d => {
                    stSaldos += d.saldosPendentes.length; stValores += d.valorEmAberto; stAusencias += d.ausencias;
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-4 py-3"><div class="text-xs font-bold text-slate-800">${d.igrejaNome}</div><div class="text-[10px] text-slate-500 font-medium">${d.pastor}</div></td>
                            <td class="px-4 py-3 text-center">${d.saldosPendentes.length > 0 ? `<span class="bg-amber-100 text-amber-700 px-2 py-0.5 rounded font-bold text-[10px]">${d.saldosPendentes.length} meses</span>` : `<span class="text-slate-300 text-xl leading-none">&bull;</span>`}</td>
                            <td class="px-4 py-3 text-center">${d.taxasPendentes.length > 0 ? `<span class="bg-red-100 text-red-700 px-2 py-0.5 rounded font-bold text-[10px]">${d.taxasPendentes.length} taxas</span>` : `<span class="text-slate-300 text-xl leading-none">&bull;</span>`}</td>
                            <td class="px-4 py-3 text-right text-xs ${d.valorEmAberto > 0 ? 'text-red-600 font-bold' : 'text-slate-400'}">${window.formatMoeda(d.valorEmAberto)}${d.temValorDesconhecido && d.valorEmAberto > 0 ? '*' : ''}</td>
                            <td class="px-4 py-3 text-center">${d.ausencias > 0 ? `<span class="bg-purple-100 text-purple-700 px-2 py-0.5 rounded font-bold text-[10px]">${d.ausencias} faltas</span>` : `<span class="text-slate-300 text-xl leading-none">&bull;</span>`}</td>
                            <td class="px-4 py-3 text-center"><button onclick="window.enviarCobranca('${d.igrejaNome}')" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-600 p-1.5 rounded-lg transition-colors" title="Cobrar no WhatsApp"><i data-lucide="message-circle" class="w-4 h-4"></i></button></td>
                        </tr>`;
                });
            }
            document.getElementById('kpi-igrejas').textContent = filtrados.length; document.getElementById('kpi-saldos').textContent = stSaldos;
            document.getElementById('kpi-valores').textContent = window.formatMoeda(stValores); document.getElementById('kpi-ausencias').textContent = stAusencias;
            lucide.createIcons();
        };

        window.limparFiltros = () => {
            document.getElementById('filtroIgreja').value = 'Todas';
            document.getElementById('filtroMes').value = 'Todos';
            document.getElementById('filtroTipo').value = 'Todos';
            document.getElementById('checkApenasPendentes').checked = true;
            window.renderizarTabela();
        };

        window.enviarCobranca = (n) => {
            const d = dadosOriginais.find(i => i.igrejaNome === n);
            if (!d) return;
            let msg = `A paz, Pr. ${d.pastor.split(' ')[0]}!\n\nSou da Secretaria Regional e notamos algumas *pendências* referentes à ${d.igrejaNome}:\n\n`;
            if (d.saldosPendentes.length > 0) msg += `📊 *Saldos não enviados:* ${d.saldosPendentes.join(', ')}\n`;
            if (d.taxasPendentes.length > 0) msg += `🧾 *Taxas em aberto:* ${d.taxasPendentes.join(', ')}\n`;
            if (d.valorEmAberto > 0) msg += `💰 *Valor estimado:* ${window.formatMoeda(d.valorEmAberto)}\n`;
            if (d.ausencias > 0) msg += `👤 *Ausências em reuniões:* ${d.ausencias}\n`;
            msg += `\nPor favor, acesse o *Painel do Pastor* para regularizar ou entre em contato caso tenha dúvidas.\n\nDeus abençoe!`;
            
            let num = (d.celPastor || '').replace(/\D/g, '');
            if (num.length >= 10) {
                if (num.length === 10 || num.length === 11) num = '55' + num;
                window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
            } else {
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            }
        };
        window.onload = window.carregarDados;
    </script>
</body>
</html>
