<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Como — Região 655</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module">
        import { requireAuth } from './js/auth.js';
        try {
            const authData = await requireAuth();
            const isRealAdmin = (authData.rawData?.permissoes || authData.permissoes || []).includes('admin');
            if (!isRealAdmin) window.location.replace('index.html');
        } catch (error) {}
    </script>
    <style>
        :root { --bg:#0c0f1a; --surface:#111827; --border:rgba(255,255,255,0.07); --accent:#63b3ed; --text-primary:#e2e8f0; --text-secondary:#94a3b8; --text-muted:#4a5568; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text-primary); min-height:100vh; }
        .topbar { position:sticky; top:0; z-index:40; background:rgba(12,15,26,0.96); backdrop-filter:blur(8px); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; gap:16px; }
        .banner-sim { background:rgba(245,158,11,0.1); border-bottom:1px solid rgba(245,158,11,0.25); padding:10px 20px; display:flex; align-items:center; gap:12px; }
        .section-label { display:flex; align-items:center; gap:12px; margin-bottom:14px; margin-top:32px; }
        .section-label-line { flex:1; height:1px; background:var(--border); }
        .section-label span { font-family:'Sora',sans-serif; font-size:9px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.2em; white-space:nowrap; }
        .preset-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:8px; }
        .preset-btn {
            display:flex; flex-direction:column; align-items:flex-start; gap:6px;
            padding:16px; border-radius:14px; border:1px solid var(--border);
            background:rgba(255,255,255,0.02); cursor:pointer; text-align:left;
            color:var(--text-primary); font-family:'DM Sans',sans-serif; transition:all 0.2s; width:100%;
        }
        .preset-btn:hover { border-color:rgba(99,179,237,0.4); background:rgba(99,179,237,0.06); transform:translateY(-1px); box-shadow:0 6px 20px rgba(0,0,0,0.3); }
        .preset-icone { font-size:24px; }
        .preset-nome { font-size:13px; font-weight:700; color:var(--text-primary); line-height:1.3; }
        .preset-desc { font-size:10px; color:var(--text-muted); }
        .users-wrap { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; }
        th { text-align:left; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.15em; color:var(--text-muted); padding:10px 16px; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.02); }
        tr.user-row { border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; }
        tr.user-row:last-child { border-bottom:none; }
        tr.user-row:hover td { background:rgba(99,179,237,0.05); }
        td { padding:12px 16px; font-size:13px; }
        .tag { display:inline-block; padding:3px 9px; border-radius:100px; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; }
        .tag-pastor  { background:rgba(139,92,246,0.15); color:#a78bfa; border:1px solid rgba(139,92,246,0.25); }
        .tag-admin   { background:rgba(239,68,68,0.15);  color:#f87171; border:1px solid rgba(239,68,68,0.25); }
        .tag-equipe  { background:rgba(59,130,246,0.15); color:#60a5fa; border:1px solid rgba(59,130,246,0.25); }
        .tag-outro   { background:rgba(100,116,139,0.15);color:#94a3b8; border:1px solid rgba(100,116,139,0.25); }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <div class="topbar">
        <a href="index.html" style="color:var(--text-secondary);font-size:13px;font-weight:600;text-decoration:none;flex-shrink:0;">← Painel</a>
        <div style="flex:1;">
            <p style="font-size:13px;font-weight:700;color:white;line-height:1.2;">Visualizar Como</p>
            <p style="font-size:10px;color:var(--text-muted);margin-top:2px;">Simule a visão de qualquer nível de acesso ou usuário específico</p>
        </div>
    </div>

    <!-- BANNER SIMULAÇÃO ATIVA -->
    <div id="banner-sim-ativa" class="banner-sim" style="display:none;">
        <span style="font-size:16px;flex-shrink:0;">⚠️</span>
        <span style="font-size:12px;color:rgba(245,158,11,0.9);">Simulando atualmente: <strong id="banner-sim-label"></strong></span>
        <button onclick="encerrarSimulacao()" style="margin-left:auto;flex-shrink:0;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);color:#fbbf24;font-size:11px;font-weight:700;padding:7px 16px;border-radius:8px;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;">✕ Encerrar Simulação</button>
    </div>

    <main style="max-width:860px;margin:0 auto;padding:0 16px 64px;">

        <!-- SEÇÃO 1: PRESETS -->
        <div class="section-label" style="margin-top:28px;">
            <div class="section-label-line"></div>
            <span>Simular por nível de acesso</span>
            <div class="section-label-line"></div>
        </div>
        <div class="preset-grid" id="preset-grid"></div>

        <!-- SEÇÃO 2: USUÁRIOS REAIS -->
        <div class="section-label">
            <div class="section-label-line"></div>
            <span>Simular por usuário real</span>
            <div class="section-label-line"></div>
        </div>
        <div class="users-wrap">
            <div id="users-loading" style="display:flex;align-items:center;justify-content:center;padding:48px;gap:12px;">
                <div style="width:20px;height:20px;border:2px solid rgba(99,179,237,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;"></div>
                <span style="color:var(--text-muted);font-size:13px;">Carregando usuários...</span>
            </div>
            <table id="users-table" style="display:none;">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Nível</th>
                        <th>Igreja</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="users-tbody"></tbody>
            </table>
            <p id="users-empty" style="display:none;text-align:center;padding:40px;color:var(--text-muted);font-size:13px;font-style:italic;">Nenhum usuário encontrado.</p>
            <p id="users-error" style="display:none;text-align:center;padding:40px;color:#f87171;font-size:13px;"></p>
        </div>

    </main>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const viewAs = localStorage.getItem('__view_as__');

        if (viewAs) {
            document.getElementById('banner-sim-ativa').style.display = 'flex';
            document.getElementById('banner-sim-label').textContent = viewAs;
        }

        await carregarUsuarios();

        // Presets de nível
        const PRESETS = [
            { nome: 'Secretário Regional', perms: ['secretario'],      igrejaNome: '', icone: '🖊️', desc: 'Equipe do escritório — sem acesso de admin' },
            { nome: 'Superintendente',      perms: ['superintendente'], igrejaNome: '', icone: '🏛️', desc: 'Visão do superintendente regional' },
            { nome: 'Coordenador',          perms: ['coordenador'],     igrejaNome: '', icone: '🤝', desc: 'Coordenador de departamento' },
            { nome: 'Obreiro',              perms: ['obreiro'],         igrejaNome: '', icone: '👤', desc: 'Nível de obreiro sem função especial' },
            { nome: 'Pastor (sem igreja)',  perms: ['pastor_titular'],  igrejaNome: '', icone: '⛪', desc: 'Pastor titular sem igreja vinculada' },
        ];

        const grid = document.getElementById('preset-grid');
        PRESETS.forEach(p => {
            const btn = document.createElement('button');
            btn.className = 'preset-btn';
            btn.innerHTML = `<span class="preset-icone">${p.icone}</span><span class="preset-nome">${esc(p.nome)}</span><span class="preset-desc">${esc(p.desc)}</span>`;
            btn.onclick = () => simularComo(p.nome, p.perms, p.igrejaNome);
            grid.appendChild(btn);
        });

        async function carregarUsuarios() {
            try {
                const snap = await getDocs(collection(db, 'usuarios'));
                const usuarios = [];
                snap.forEach(d => {
                    const data = d.data();
                    if (data.status === 'Ativo' && data.nome) usuarios.push(data);
                });
                usuarios.sort((a, b) => (a.nome || '').localeCompare(b.nome || '', 'pt-BR'));

                document.getElementById('users-loading').style.display = 'none';

                if (!usuarios.length) {
                    document.getElementById('users-empty').style.display = 'block';
                    return;
                }

                const tbody = document.getElementById('users-tbody');
                usuarios.forEach(u => {
                    const perms = u.permissoes || [];
                    const isAdminUser  = perms.includes('admin');
                    const isPastorUser = !!u.igrejaNome || perms.includes('pastor_titular');

                    let tagClass = 'tag-outro', tagLabel = perms[0] || 'sem nível';
                    if (isAdminUser)  { tagClass = 'tag-admin';  tagLabel = 'admin'; }
                    else if (isPastorUser) { tagClass = 'tag-pastor'; tagLabel = 'pastor_titular'; }
                    else if (perms.length) { tagClass = 'tag-equipe'; tagLabel = perms[0]; }

                    const tr = document.createElement('tr');
                    tr.className = 'user-row';
                    tr.innerHTML = `
                        <td style="font-weight:600;color:var(--text-primary);">${esc(u.nome)}</td>
                        <td><span class="tag ${tagClass}">${esc(tagLabel)}</span></td>
                        <td style="color:var(--text-muted);font-size:12px;">${esc(u.igrejaNome || '—')}</td>
                        <td style="text-align:right;"><span style="font-size:11px;color:var(--accent);font-weight:700;white-space:nowrap;">Simular →</span></td>
                    `;
                    tr.onclick = () => simularComo(u.nome, perms, u.igrejaNome || '');
                    tbody.appendChild(tr);
                });

                document.getElementById('users-table').style.display = 'table';
            } catch(e) {
                document.getElementById('users-loading').style.display = 'none';
                const el = document.getElementById('users-error');
                el.textContent = `Erro ao carregar usuários: ${e.message}`;
                el.style.display = 'block';
            }
        }

        window.simularComo = function(nome, perms, igrejaNome) {
            // Guarda backup apenas se não estiver já em simulação
            if (!localStorage.getItem('__view_as__')) {
                localStorage.setItem('__view_as_backup__', JSON.stringify({
                    userEmail:  localStorage.getItem('userEmail'),
                    userName:   localStorage.getItem('userName'),
                    userPerms:  localStorage.getItem('userPerms'),
                    userIgreja: localStorage.getItem('userIgreja')
                }));
            }
            localStorage.setItem('userName',    nome);
            localStorage.setItem('userPerms',   JSON.stringify(perms));
            localStorage.setItem('userIgreja',  igrejaNome || '');
            localStorage.setItem('__view_as__', `${nome} · ${(perms || []).join(', ')}`);
            window.location.href = 'index.html';
        };

        window.encerrarSimulacao = function() {
            const bk = JSON.parse(localStorage.getItem('__view_as_backup__') || '{}');
            if (bk.userEmail) {
                localStorage.setItem('userEmail',  bk.userEmail);
                localStorage.setItem('userName',   bk.userName   || '');
                localStorage.setItem('userPerms',  bk.userPerms  || '[]');
                localStorage.setItem('userIgreja', bk.userIgreja || '');
            }
            localStorage.removeItem('__view_as__');
            localStorage.removeItem('__view_as_backup__');
            window.location.href = 'index.html';
        };

        function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    </script>
</body>
</html>
